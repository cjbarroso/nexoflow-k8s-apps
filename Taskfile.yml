# https://taskfile.dev — install on Windows: `winget install Task.Task`.
# Wraps the existing Makefile + adds HHCCIA v2-specific Argo / rollout ops.
#
# kubeconfig: the cluster lives at C:\Users\Usuario\.kube\nexoflow.config — set
# KUBECONFIG to it before running kubectl tasks here so you don't clobber your
# default (GKE) context. Override with `KUBECONFIG=... task <name>`.
version: '3'

vars:
  # Argo
  ARGOCD_NAMESPACE: argocd
  ARGOCD_SERVICE: argocd-server
  ARGOCD_LOCAL_PORT: '8080'
  ARGOCD_SERVICE_PORT: '443'
  ARGOCD_USERNAME: admin
  # HHCCIA v2
  V2_NAMESPACE: hhccia-v2
  V2_APP: hhccia-v2

tasks:
  default:
    cmds:
      - task -l
    silent: true

  # --- Argo CD ---------------------------------------------------------- #
  argo:connect:
    desc: Port-forward argocd-server to localhost (foreground)
    cmds:
      - 'kubectl -n {{.ARGOCD_NAMESPACE}} port-forward svc/{{.ARGOCD_SERVICE}} {{.ARGOCD_LOCAL_PORT}}:{{.ARGOCD_SERVICE_PORT}}'

  argo:login:
    desc: 'argocd login localhost (needs argo:connect running in another shell)'
    cmds:
      - 'argocd login localhost:{{.ARGOCD_LOCAL_PORT}} --username {{.ARGOCD_USERNAME}} --grpc-web --insecure'

  argo:sync:
    desc: 'Sync an Argo app: APP=<name> task argo:sync (defaults to hhccia-v2)'
    vars:
      APP: '{{.APP | default .V2_APP}}'
    cmds:
      - 'argocd app sync {{.APP}}'

  argo:diff:
    desc: 'Show pending Argo diff for an app (APP=<name>, default hhccia-v2)'
    vars:
      APP: '{{.APP | default .V2_APP}}'
    cmds:
      - 'argocd app diff {{.APP}}'

  # --- HHCCIA v2 image bumps -------------------------------------------- #
  # Images are pinned to immutable git-SHA tags in src/hhccia-v2/*.yaml.
  # Deploy flow: get the SHA below, edit the manifest, commit — Argo rolls it.
  # (The old rollout:* tasks are gone: with pinned tags a restart pulls the
  # same image; deploys happen through Git now.)
  images:latest:
    desc: Show the git SHA of the last successful image publish for each hhccia repo
    cmds:
      - 'gh api "repos/irupe-consultores/hhccia-core/actions/workflows/publish.yml/runs?branch=main&status=success&per_page=1" --jq "\"hhccia-core:             \" + .workflow_runs[0].head_sha + \"  (\" + .workflow_runs[0].updated_at + \")\""'
      - 'gh api "repos/irupe-consultores/hhccia-front/actions/workflows/deploy.yml/runs?branch=main&status=success&per_page=1" --jq "\"hhccia-front:            \" + .workflow_runs[0].head_sha + \"  (\" + .workflow_runs[0].updated_at + \")\""'
      - 'gh api "repos/irupe-consultores/hhccia-adapter-datatech/actions/workflows/publish.yml/runs?branch=main&status=success&per_page=1" --jq "\"hhccia-adapter-datatech: \" + .workflow_runs[0].head_sha + \"  (\" + .workflow_runs[0].updated_at + \")\""'

  pods:
    desc: List pods in the v2 namespace
    cmds:
      - 'kubectl -n {{.V2_NAMESPACE}} get pods -o wide'

  logs:core:
    desc: Tail core logs
    cmds:
      - 'kubectl -n {{.V2_NAMESPACE}} logs deploy/hhccia-core -f --tail=200'

  logs:adapter:
    desc: Tail adapter logs
    cmds:
      - 'kubectl -n {{.V2_NAMESPACE}} logs deploy/hhccia-adapter-datatech -f --tail=200'

  kctx:argo:
    desc: Focus kubectl on the argocd namespace
    cmds:
      - 'kubectl config set-context --current --namespace={{.ARGOCD_NAMESPACE}}'

  kctx:v2:
    desc: Focus kubectl on the hhccia-v2 namespace
    cmds:
      - 'kubectl config set-context --current --namespace={{.V2_NAMESPACE}}'
