apiVersion: v1
kind: ServiceAccount
metadata:
  name: calcom-secret-sync
  namespace: calcom
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: calcom-secret-sync
  namespace: calcom
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: calcom-secret-sync
  namespace: calcom
subjects:
  - kind: ServiceAccount
    name: calcom-secret-sync
    namespace: calcom
roleRef:
  kind: Role
  name: calcom-secret-sync
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: calcom-secret-sync
  namespace: calcom
spec:
  replicas: 1
  selector:
    matchLabels:
      app: calcom-secret-sync
  template:
    metadata:
      labels:
        app: calcom-secret-sync
    spec:
      serviceAccountName: calcom-secret-sync
      containers:
        - name: sync
          image: bitnami/kubectl:latest
          command:
            - /bin/bash
            - -c
            - |
              while true; do
                # Fetch the URI from CNPG secret
                DB_URI=$(kubectl get secret calcom-cluster-app -n calcom -o jsonpath='{.data.uri}')
                
                # Patch the runtime secret with the mapped key DATABASE_URL
                if [ ! -z "$DB_URI" ]; then
                   kubectl patch secret calcom-runtime-secrets -n calcom -p "{\"data\":{\"DATABASE_URL\":\"$DB_URI\"}}"
                fi
                
                sleep 60
              done
