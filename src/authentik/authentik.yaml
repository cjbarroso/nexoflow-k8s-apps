# Authentik server + worker. Test-grade single replica each.
# Docs: https://goauthentik.io/docs/installation/kubernetes
#
# Note: the OIDC application for HHCCIA is configured AFTER Authentik is up
# (via the admin UI or API), not via blueprint mount — the kubelet on this
# k3s node has a persistent ConfigMap-visibility issue for /blueprints/custom
# that we couldn't work around in the manifest.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
  labels:
    app: authentik-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      automountServiceAccountToken: false
      containers:
        - name: server
          image: ghcr.io/goauthentik/server:2024.10.5
          args: ["server"]
          ports:
            - { containerPort: 9000, name: http }
            - { containerPort: 9443, name: https }
          envFrom:
            - secretRef: { name: authentik-secrets }
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-pg
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_USER } }
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_PASSWORD } }
            - name: AUTHENTIK_REDIS__HOST
              value: authentik-redis
            - name: AUTHENTIK_DISABLE_UPDATE_CHECK
              value: "true"
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_LOG_LEVEL
              value: info
          readinessProbe:
            httpGet: { path: /-/health/ready/, port: 9000 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/health/live/, port: 9000 }
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: authentik
spec:
  selector:
    app: authentik-server
  ports:
    - { name: http, port: 80, targetPort: 9000 }
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: authentik
  labels:
    app: authentik-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-worker
  template:
    metadata:
      labels:
        app: authentik-worker
    spec:
      automountServiceAccountToken: false
      containers:
        - name: worker
          image: ghcr.io/goauthentik/server:2024.10.5
          args: ["worker"]
          envFrom:
            - secretRef: { name: authentik-secrets }
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-pg
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_USER } }
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_PASSWORD } }
            - name: AUTHENTIK_REDIS__HOST
              value: authentik-redis
            - name: AUTHENTIK_DISABLE_UPDATE_CHECK
              value: "true"
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_LOG_LEVEL
              value: info
