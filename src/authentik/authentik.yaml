# Authentik server + worker. Test-grade single replica each.
# Docs: https://goauthentik.io/docs/installation/kubernetes
#
# Blueprints: the HHCCIA OIDC application (provider + redirect_uris) is defined
# declaratively in the `authentik-blueprints` ConfigMap (blueprints.yaml) and
# mounted at /blueprints/custom on BOTH server and worker as a whole-directory
# volume (NOT subPath — subPath mounts don't receive ConfigMap updates, which
# was the original "/blueprints/custom visibility" problem). The worker
# auto-discovers and applies *.yaml there. After editing the blueprint, restart
# the worker (or wait for its discovery cycle) to re-apply.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-server
  namespace: authentik
  labels:
    app: authentik-server
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-server
  template:
    metadata:
      labels:
        app: authentik-server
    spec:
      automountServiceAccountToken: false
      volumes:
        - name: custom-blueprints
          configMap:
            name: authentik-blueprints
        # Custom login/flow assets (logo, favicon). Served unauthenticated from
        # /media/public. Whole-dir mount (not subPath) so Argo updates propagate.
        - name: branding
          configMap:
            name: authentik-branding
      containers:
        - name: server
          image: ghcr.io/goauthentik/server:2026.2.4
          args: ["server"]
          ports:
            - { containerPort: 9000, name: http }
            - { containerPort: 9443, name: https }
          volumeMounts:
            - name: custom-blueprints
              mountPath: /blueprints/custom
            - name: branding
              mountPath: /media/public
          envFrom:
            - secretRef: { name: authentik-secrets }
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-pg
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_USER } }
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_PASSWORD } }
            - name: AUTHENTIK_REDIS__HOST
              value: authentik-redis
            - name: AUTHENTIK_DISABLE_UPDATE_CHECK
              value: "true"
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_LOG_LEVEL
              value: info
          readinessProbe:
            httpGet: { path: /-/health/ready/, port: 9000 }
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /-/health/live/, port: 9000 }
            initialDelaySeconds: 60
            periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-server
  namespace: authentik
spec:
  selector:
    app: authentik-server
  ports:
    - { name: http, port: 80, targetPort: 9000 }
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-worker
  namespace: authentik
  labels:
    app: authentik-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: authentik-worker
  template:
    metadata:
      labels:
        app: authentik-worker
    spec:
      automountServiceAccountToken: false
      volumes:
        - name: custom-blueprints
          configMap:
            name: authentik-blueprints
      containers:
        - name: worker
          image: ghcr.io/goauthentik/server:2026.2.4
          args: ["worker"]
          volumeMounts:
            - name: custom-blueprints
              mountPath: /blueprints/custom
          envFrom:
            - secretRef: { name: authentik-secrets }
          env:
            - name: AUTHENTIK_POSTGRESQL__HOST
              value: authentik-pg
            - name: AUTHENTIK_POSTGRESQL__NAME
              value: authentik
            - name: AUTHENTIK_POSTGRESQL__USER
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_USER } }
            - name: AUTHENTIK_POSTGRESQL__PASSWORD
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_PASSWORD } }
            - name: AUTHENTIK_REDIS__HOST
              value: authentik-redis
            - name: AUTHENTIK_DISABLE_UPDATE_CHECK
              value: "true"
            - name: AUTHENTIK_ERROR_REPORTING__ENABLED
              value: "false"
            - name: AUTHENTIK_LOG_LEVEL
              value: info
