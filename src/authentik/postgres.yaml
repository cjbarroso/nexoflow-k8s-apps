# Dedicated Postgres for Authentik (test-grade, single replica + PVC).
# Production-grade would use CNPG cluster.
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: authentik-pg
  namespace: authentik
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 5Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: authentik-pg
  namespace: authentik
  labels:
    app: authentik-pg
spec:
  replicas: 1
  strategy: { type: Recreate }
  selector:
    matchLabels:
      app: authentik-pg
  template:
    metadata:
      labels:
        app: authentik-pg
    spec:
      automountServiceAccountToken: false
      containers:
        - name: postgres
          image: postgres:16-alpine
          ports:
            - { containerPort: 5432, name: pg }
          env:
            - name: POSTGRES_DB
              value: authentik
            - name: POSTGRES_USER
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_USER } }
            - name: POSTGRES_PASSWORD
              valueFrom: { secretKeyRef: { name: authentik-secrets, key: PG_PASSWORD } }
            - name: PGDATA
              value: /var/lib/postgresql/data/pgdata
          volumeMounts:
            - { name: data, mountPath: /var/lib/postgresql/data }
          readinessProbe:
            exec:
              command: ["pg_isready", "-U", "authentik", "-d", "authentik"]
            initialDelaySeconds: 5
            periodSeconds: 5
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: authentik-pg
---
apiVersion: v1
kind: Service
metadata:
  name: authentik-pg
  namespace: authentik
spec:
  selector:
    app: authentik-pg
  ports:
    - { name: pg, port: 5432, targetPort: 5432 }
  type: ClusterIP
