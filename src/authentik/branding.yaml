# Custom login/flow branding asset for Authentik, served from /media/public.
#
# WHY a ConfigMap (not a PVC or `kubectl cp`):
#   Authentik serves everything under /media/, and /media/public/ is served
#   WITHOUT authentication -- perfect for a pre-login logo. Shipping the file as
#   a ConfigMap keeps it in Git (GitOps-reproducible) and Argo reconciles it,
#   instead of a file hand-copied into a volume that nothing tracks.
#
# HOW IT'S WIRED:
#   authentik.yaml mounts this ConfigMap (whole-directory, NOT subPath, so Argo
#   updates propagate) at /media/public on authentik-server. The file then
#   resolves at https://<authentik-host>/media/public/irupe-logo.jpeg
#
# THE POINTER that tells authentik to USE this file is set declaratively by the
#   brand blueprint in blueprints.yaml (model authentik_brands.brand,
#   branding_logo: /media/public/irupe-logo.jpeg) -- blueprints are confirmed
#   applying on this instance. No admin-UI step required.
#
# The logo is a 36 KB JPEG, embedded below as base64 under binaryData. To swap
#   it later, re-run: [Convert]::ToBase64String([IO.File]::ReadAllBytes(<path>))
#   and replace the value (an optimized SVG under `data:` would be smaller and
#   diffable, if you ever get a vector version).
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-branding
  namespace: authentik
binaryData:
  irupe-logo.jpeg: 
