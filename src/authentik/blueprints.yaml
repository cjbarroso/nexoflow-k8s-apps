        attrs:
          name: Prestaciones OH/ON export
          slug: hhccia-prestaciones
          provider: !KeyOf prestaciones-provider
          meta_launch_url: https://prestaciones.irupeconsultores.com/
          open_in_new_tab: false
      # NEW access group. Declared idempotently; MEMBERSHIP is managed in the UI/DB.
      - model: authentik_core.group
        id: prestaciones-group
        identifiers:
          name: hhccia-prestaciones
        attrs:
          is_superuser: false
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, hhccia-prestaciones]]
          group: !Find [authentik_core.group, [name, hhccia-prestaciones]]
          order: 0
        attrs:
          enabled: true         # ENFORCED: only hhccia-prestaciones members may SSO in
          negate: false
          timeout: 30
          failure_result: false
  # ===========================================================================
  # MedAudit IA STAGING — its OWN OIDC application/provider, isolated from prod.
  #
  # Prod (slug `hhccia`, client_id `hhccia-front`) and staging now have separate
  # OIDC clients so staging auth config (redirect URIs, app-access group, the
  # application/provider objects) can change WITHOUT touching prod. What is still
  # SHARED on purpose: the 3 custom scope mappings (prf/service/voice_enabled —
  # global objects, referenced by !Find) and the role groups (hhccia-superadmins,
  # hhccia-admin, hhccia-readonly, hhccia-voice-enabled), which are identity/role
  # data, not per-app. To also sandbox a claim-mapping change, duplicate the
  # mapping here with an hhccia-staging- prefix (not done — claims rarely change).
  #
  # Issuer is per-application-slug: tokens minted via this app carry
  #   iss = https://auth.irupeconsultores.com/application/o/hhccia-staging/
  # so the staging core's AUTHENTIK_ISSUER/JWKS_URL and the staging front's
  # AUTHENTIK_AUTHORITY/CLIENT_ID point here (src/hhccia-staging/*.yaml). Public
  # client (PKCE) → no client_secret → nothing to seal.
  #
  # After editing, restart the authentik worker (or wait for its discovery cycle).
  hhccia-staging.yaml: |
    version: 1
    metadata:
      name: MedAudit IA staging OIDC application
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: hhccia-staging-provider
        identifiers:
          name: hhccia-staging-provider
        attrs:
          name: hhccia-staging-provider
          client_id: hhccia-front-staging
          client_type: public                       # Angular SPA -> PKCE, no secret stored
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          # Same invalidation fix as the prod provider: point at the flow that
          # actually has a UserLogoutStage so RP-initiated logout kills the SSO session.
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          # Staging + local-dev origins ONLY (prod lives in hhccia.yaml).
          redirect_uris:
            - matching_mode: strict
              url: https://medaudit-staging.irupeconsultores.com/callback
            - matching_mode: strict
              url: http://localhost:4200/callback
            - matching_mode: strict
              url: https://medaudit-staging.irupeconsultores.com/auth/login
            - matching_mode: strict
              url: http://localhost:4200/auth/login
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          # A blueprint-created provider defaults grant_types to [] (authentik only
          # sets the full set for UI-created providers), and then rejects every
          # authorize request as invalid_request / "request is otherwise malformed".
          # The prod hhccia-provider was created in the UI so it dodged this; this
          # one must declare them. The SPA uses the authorization-code flow + refresh
          # tokens (offline_access / useRefreshToken:true).
          grant_types:
            - authorization_code
            - refresh_token
          # Built-ins by `managed` (unique); the 3 custom mappings live in the
          # hhccia.yaml blueprint, so reference them across blueprints by !Find on
          # their (unique) name — !KeyOf only resolves within the same blueprint.
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, hhccia-prf-claim]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, hhccia-service-claim]]
            - !Find [authentik_providers_oauth2.scopemapping, [name, hhccia-voice-enabled-claim]]
      - model: authentik_core.application
        id: hhccia-staging-app
        identifiers:
          slug: hhccia-staging
        attrs:
          name: MedAudit IA (staging)
          slug: hhccia-staging
          provider: !KeyOf hhccia-staging-provider
          meta_launch_url: https://medaudit-staging.irupeconsultores.com/
          open_in_new_tab: false
      # App-access group for staging — distinct from prod's hhccia-users so the
      # staging user set is managed independently. Add test users here in the
      # admin UI (membership is runtime data, NOT in Git). The role/claim groups
      # (hhccia-superadmins/-admin/-readonly/-voice-enabled) are shared and still
      # drive service_admin/audit_admin/read_admin/voice_enabled in staging too.
      - model: authentik_core.group
        id: hhccia-staging-users-group
        identifiers:
          name: hhccia-staging-users
        attrs:
          is_superuser: false
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, hhccia-staging]]
          group: !Find [authentik_core.group, [name, hhccia-staging-users]]
