# Declarative configuration of the HHCCIA OIDC application, picked up by
# Authentik on startup (server + worker mount this at /blueprints/custom).
# Docs: https://goauthentik.io/docs/customize/blueprints
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  hhccia.yaml: |
    version: 1
    metadata:
      name: HHCCIA OIDC application
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_oauth2.oauth2provider
        id: hhccia-provider
        identifiers:
          name: hhccia-provider
        attrs:
          name: hhccia-provider
          client_id: hhccia-front
          client_type: public                       # Angular SPA -> PKCE, no secret stored
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-provider-invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          # Structured form (this instance stores redirect_uris as objects, not a
          # newline string). Matches the live provider exactly so the first apply
          # is a no-op. silent-renew URLs are intentionally absent — the SPA runs
          # silentRenew:false. To add a host, add a {matching_mode, url} entry here
          # and restart the worker; do NOT edit it in the admin UI anymore.
          redirect_uris:
            - matching_mode: strict
              url: https://medaudit.irupeconsultores.com/callback
            - matching_mode: strict
              url: http://localhost:4200/callback
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          # offline_access is required for refresh tokens — the SPA requests it
          # (useRefreshToken:true). Without this mapping Authentik silently drops
          # the scope and issues no refresh token, capping sessions at the 1h
          # access-token lifetime.
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, email]]
            - !Find [authentik_providers_oauth2.scopemapping, [scope_name, offline_access]]
      - model: authentik_core.application
        id: hhccia-app
        identifiers:
          slug: hhccia
        attrs:
          name: HHCCIA
          slug: hhccia
          provider: !KeyOf hhccia-provider
          meta_launch_url: https://medaudit.irupeconsultores.com/
          open_in_new_tab: false
  # Declarative branding for the login/flow page. Sets the DB pointer to the
  # custom logo served from /media/public (file shipped by branding.yaml's
  # authentik-branding ConfigMap). Safe to own these fields: the built-in
  # `Default - Brand` blueprint is `state: created` + a "no default brand
  # exists" condition, so it seeded the brand once and never re-touches it.
  brand.yaml: |
    version: 1
    metadata:
      name: HHCCIA brand customization
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_brands.brand
        identifiers:
          domain: authentik-default          # the existing default brand
        state: present                        # update-in-place, don't recreate
        attrs:
          branding_title: Irupé Apps          # preserved (already set in DB)
          branding_logo: /media/public/irupe-logo.jpeg
          # branding_favicon left untouched (still the authentik default icon).
          # Add a small icon to the authentik-branding ConfigMap and point here
          # if you want a custom favicon too.
  # Per-application access control for HHCCIA. The idiomatic authentik pattern:
  # a PolicyBinding ON THE APPLICATION (not a separate login flow), so other
  # apps on this instance are unaffected. Binds the hhccia-users group to the
  # HHCCIA app -> only members may use it.
  #
  # STAGED ON PURPOSE: the binding ships `enabled: false`, so committing this
  # changes nothing (app stays open to all authenticated users). To turn it on:
  #   1. add the clinicians to the `hhccia-users` group in the admin UI
  #      (membership is identity data -> managed in the UI/DB, NOT in Git)
  #   2. flip `enabled: true` below (or toggle the binding in the UI) and let
  #      the worker re-apply.
  # Even at worst there's no hard lockout: admins reach the admin UI regardless
  # of this app binding.
  access.yaml: |
    version: 1
    metadata:
      name: HHCCIA access control
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.group
        id: hhccia-users-group
        identifiers:
          name: hhccia-users
        attrs:
          is_superuser: false
      # Role group for HHCCIA admins. No policy binding here -- it exists so the
      # app can branch on it: authentik's default `profile` scope mapping emits
      # the user's DIRECT group names in the `groups` claim, so a member shows
      # up as {"groups": ["hhccia-admins", ...]} in the ID token / userinfo.
      #
      # `parent: hhccia-users` makes admins a CHILD of the users group. authentik
      # group membership cascades UP the tree for policy/access checks, so an
      # admin automatically satisfies the hhccia-users access binding (no need to
      # double-add them) -- WITHOUT the `groups` claim listing hhccia-users
      # (the claim reports direct memberships only).
      - model: authentik_core.group
        identifiers:
          name: hhccia-admins
        attrs:
          is_superuser: false
          parent: !KeyOf hhccia-users-group
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, hhccia]]
          group: !Find [authentik_core.group, [name, hhccia-users]]
          order: 0
        attrs:
          enabled: true         # ENFORCED: only hhccia-users (+ child hhccia-admins) members may use HHCCIA
          negate: false
          timeout: 30
          failure_result: false
  # Self-service signup for physicians. Creates an Authentik user and NOTHING
  # else: the new account is NOT added to any group, so the hhccia app policy
  # binding above ("only hhccia-users may use HHCCIA") leaves it with zero
  # access until an admin adds it to `hhccia-users` in the UI. Physicians log
  # in afterwards via Google; the source's `email_link` matching mode links the
  # Google identity to the account created here (matching on email), so no
  # password is collected.
  #
  # HARDENED WITH AN INVITATION STAGE: the bare flow URL
  #   https://auth.irupeconsultores.com/if/flow/hhccia-signup/
  # is a dead end on its own (continue_flow_without_invitation: false). It only
  # proceeds with a valid ?itoken=<uuid>. The reusable invitation TOKEN is
  # runtime data (a shareable secret link) and is intentionally NOT stored in
  # Git -- it is created out-of-band against the live instance.
  enrollment.yaml: |
    version: 1
    metadata:
      name: HHCCIA physician self-signup
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # ----- prompt fields. Unique labels keep these distinct from the
      # default-source-enrollment prompt fields that share these field_keys. -----
      - model: authentik_stages_prompt.prompt
        id: signup-field-username
        identifiers:
          name: hhccia-signup-username
        attrs:
          name: hhccia-signup-username
          field_key: username
          label: Usuario (HHCCIA signup)
          type: username
          required: true
          order: 0
      - model: authentik_stages_prompt.prompt
        id: signup-field-name
        identifiers:
          name: hhccia-signup-name
        attrs:
          name: hhccia-signup-name
          field_key: name
          label: Nombre completo (HHCCIA signup)
          type: text
          required: true
          order: 1
      - model: authentik_stages_prompt.prompt
        id: signup-field-email
        identifiers:
          name: hhccia-signup-email
        attrs:
          name: hhccia-signup-email
          field_key: email
          label: Email (HHCCIA signup)
          type: email
          required: true
          order: 2
      - model: authentik_stages_prompt.prompt
        id: signup-field-prf
        identifiers:
          name: hhccia-signup-prf
        attrs:
          name: hhccia-signup-prf
          # field_key prefixed with "attributes." -> user_write stores it in
          # user.attributes.prf, queryable later and emittable as an OIDC claim
          # via a custom scope mapping if the app ever needs it.
          field_key: attributes.prf
          label: Matrícula profesional (PRF)
          type: text          # text, not number: preserves leading zeros / alphanumerics
          required: true
          placeholder: "N° de matrícula"
          order: 3
      # ----- stages -----
      - model: authentik_stages_invitation.invitationstage
        id: signup-invitation-stage
        identifiers:
          name: hhccia-signup-invitation
        attrs:
          name: hhccia-signup-invitation
          continue_flow_without_invitation: false   # bare URL is dead without a valid token
      - model: authentik_stages_prompt.promptstage
        id: signup-prompt-stage
        identifiers:
          name: hhccia-signup-prompt
        attrs:
          name: hhccia-signup-prompt
          fields:
            - !KeyOf signup-field-username
            - !KeyOf signup-field-name
            - !KeyOf signup-field-email
            - !KeyOf signup-field-prf
      - model: authentik_stages_user_write.userwritestage
        id: signup-write-stage
        identifiers:
          name: hhccia-signup-write
        attrs:
          name: hhccia-signup-write
          user_creation_mode: always_create
          create_users_as_inactive: false
          user_type: internal
          # Auto-enroll new sign-ups into hhccia-users so they get HHCCIA access
          # on their next Google login WITHOUT a manual group-add. This makes the
          # invitation link itself the authorization gate -- guard/rotate it
          # accordingly. !Find (not !KeyOf): the group is declared in access.yaml,
          # a separate blueprint.
          create_users_group: !Find [authentik_core.group, [name, hhccia-users]]
      # ----- flow -----
      - model: authentik_flows.flow
        id: signup-flow
        identifiers:
          slug: hhccia-signup
        attrs:
          name: HHCCIA - Solicitar acceso
          title: Registro de profesionales — HHCCIA
          slug: hhccia-signup
          designation: enrollment
          authentication: require_unauthenticated
      # ----- bindings: invitation (5) -> prompt (10) -> user_write (20) -----
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf signup-flow
          order: 5
        attrs:
          stage: !KeyOf signup-invitation-stage
          evaluate_on_plan: true
          re_evaluate_policies: false
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf signup-flow
          order: 10
        attrs:
          stage: !KeyOf signup-prompt-stage
          evaluate_on_plan: true
          re_evaluate_policies: false
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf signup-flow
          order: 20
        attrs:
          stage: !KeyOf signup-write-stage
          evaluate_on_plan: true
          re_evaluate_policies: false
