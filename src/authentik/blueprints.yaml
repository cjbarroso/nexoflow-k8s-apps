# Declarative configuration of the HHCCIA OIDC application, picked up by
# Authentik on startup (server + worker mount this at /blueprints/custom).
# Docs: https://goauthentik.io/docs/customize/blueprints
apiVersion: v1
kind: ConfigMap
metadata:
  name: authentik-blueprints
  namespace: authentik
data:
  hhccia.yaml: |
    version: 1
    metadata:
      name: HHCCIA OIDC application
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Custom scope mapping: emit the physician's PRF (matrícula) as a `prf`
      # claim. Attached to the `profile` scope, which the SPA already requests,
      # so no front change is needed -- the claim appears in the ID token /
      # userinfo alongside name/email. Sourced from user.attributes.prf (set by
      # the hhccia-signup enrollment flow).
      - model: authentik_providers_oauth2.scopemapping
        id: hhccia-prf-mapping
        identifiers:
          name: hhccia-prf-claim
        attrs:
          name: hhccia-prf-claim
          scope_name: profile
          description: "HHCCIA: PRF (matrícula) del profesional, sobre el scope profile."
          expression: |
            return {"prf": user.attributes.get("prf")}
      # Custom scope mapping: emit the physician's authorized Service(s) (Datatech
      # SER codes) as a `service` claim (always a list) plus three admin booleans:
      #   - `service_admin` (members of hhccia-superadmins): see/edit every service
      #     AND may approve.
      #   - `audit_admin` (members of hhccia-admin): see every record but may ONLY
      #     reject — never approve (a supervisor/auditor; reject has no effect on the
      #     origin clinical DB).
      #   - `read_admin` (members of hhccia-readonly): see every record but STRICTLY
      #     read-only — may neither approve nor reject (a global observer/auditor).
      # The core enforces visibility/editing from these claims. Sourced from
      # user.attributes.service (a list, or a comma-separated string from the signup
      # form). Rides the `profile` scope, so no front change is needed.
      - model: authentik_providers_oauth2.scopemapping
        id: hhccia-service-mapping
        identifiers:
          name: hhccia-service-claim
        attrs:
          name: hhccia-service-claim
          scope_name: profile
          description: "HHCCIA: Service(s) (SER) del profesional + flag admin, sobre el scope profile."
          expression: |
            raw = user.attributes.get("service")
            if raw is None:
                services = []
            elif isinstance(raw, list):
                services = [str(s).strip() for s in raw if str(s).strip()]
            else:
                services = [s.strip() for s in str(raw).split(",") if s.strip()]
            return {
                "service": services,
                "service_admin": ak_is_group_member(user, name="hhccia-superadmins"),
                "audit_admin": ak_is_group_member(user, name="hhccia-admin"),
                "read_admin": ak_is_group_member(user, name="hhccia-readonly"),
            }
      # Custom scope mapping: emit a `voice_enabled` boolean (members of
      # hhccia-voice-enabled) that gates the voice-dictation feature ("evolución por
      # voz"). The core's ServiceScope.can_dictate requires this claim + a `service`
      # claim and is INDEPENDENT of the admin role (directive 2026-06-18): a plain
      # physician, a service_admin and an audit_admin alike may dictate IF in this
      # group; read_admin is excluded by the core regardless. Rides the `profile`
      # scope (same as the others), so no front change is needed.
      - model: authentik_providers_oauth2.scopemapping
        id: hhccia-voice-enabled-mapping
        identifiers:
          name: hhccia-voice-enabled-claim
        attrs:
          name: hhccia-voice-enabled-claim
          scope_name: profile
          description: "HHCCIA: permiso de dictado por voz (voice_enabled), sobre el scope profile."
          expression: |
            return {"voice_enabled": ak_is_group_member(user, name="hhccia-voice-enabled")}
      - model: authentik_providers_oauth2.oauth2provider
        id: hhccia-provider
        identifiers:
          name: hhccia-provider
        attrs:
          name: hhccia-provider
          client_id: hhccia-front
          client_type: public                       # Angular SPA -> PKCE, no secret stored
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          # NOTE: `default-provider-invalidation-flow` is EMPTY on this instance (no
          # stages), so RP-initiated OIDC logout (the SPA's logoff() -> end_session_endpoint)
          # ran a no-op flow and never terminated the Authentik SSO session — the user
          # was silently single-signed-on right back in ("doesn't fully log out").
          # Point at `default-invalidation-flow`, which contains default-invalidation-logout
          # (UserLogoutStage) and actually kills the session. (2026-06-08)
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          # Structured form (this instance stores redirect_uris as objects, not a
          # newline string). Matches the live provider exactly so the first apply
          # is a no-op. silent-renew URLs are intentionally absent — the SPA runs
          # silentRenew:false. To add a host, add a {matching_mode, url} entry here
          # and restart the worker; do NOT edit it in the admin UI anymore.
          # Staging is NO LONGER here: it has its OWN provider/application
          # (hhccia-staging.yaml, client_id hhccia-front-staging) so prod auth
          # config is isolated from staging. This list is prod + local-dev only.
          redirect_uris:
            - matching_mode: strict
              url: https://medaudit.irupeconsultores.com/callback
            - matching_mode: strict
              url: http://localhost:4200/callback
            # post_logout_redirect_uri targets (the SPA sends origin + /auth/login on
            # logoff). Authentik validates the post-logout redirect against this list,
            # so without these the redirect back after logout is silently dropped.
            - matching_mode: strict
              url: https://medaudit.irupeconsultores.com/auth/login
            - matching_mode: strict
              url: http://localhost:4200/auth/login
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          # Machine-to-machine (M2M) access. This provider was created in the UI, so until
          # now the blueprint left grant_types UNSET (the DB kept the UI's default set).
          # Declaring it here takes ownership of the field, so the list MUST stay a
          # superset of what the SPA needs (authorization_code + refresh_token — see the
          # offline_access note below). Adding client_credentials lets the svc-hhccia
          # service account (machine-user.yaml) mint a JWT for the core via
          # `grant_type=client_credentials`. That token carries THIS provider's issuer
          # (.../application/o/hhccia/), exactly what the core validates — a separate
          # provider would NOT be trusted by the core.
          grant_types:
            - authorization_code
            - refresh_token
            - client_credentials
          # offline_access is required for refresh tokens — the SPA requests it
          # (useRefreshToken:true). Without this mapping Authentik silently drops
          # the scope and issues no refresh token, capping sessions at the 1h
          # access-token lifetime.
          # Built-ins referenced by `managed` (unique): adding hhccia-prf-claim
          # with scope_name `profile` makes a !Find by [scope_name, profile]
          # ambiguous (UUID PKs -> non-deterministic .first()), which could drop
          # the built-in profile claims. `managed` is stable and unique.
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-offline_access]]
            - !KeyOf hhccia-prf-mapping
            - !KeyOf hhccia-service-mapping
            - !KeyOf hhccia-voice-enabled-mapping
      - model: authentik_core.application
        id: hhccia-app
        identifiers:
          slug: hhccia
        attrs:
          name: HHCCIA
          slug: hhccia
          provider: !KeyOf hhccia-provider
          meta_launch_url: https://medaudit.irupeconsultores.com/
          open_in_new_tab: false
  # ===========================================================================
  # Machine-to-machine (M2M) service account for the HHCCIA core. A NON-HUMAN user
  # (type: service_account) that CANNOT do the Google browser login. It authenticates
  # to the core's API by minting a JWT via the OAuth2 client_credentials grant against
  # the hhccia provider (grant_types in hhccia.yaml). The credential is an APP PASSWORD
  # created in the admin UI (Directory -> Service Accounts -> svc-hhccia -> Credentials
  # -> App passwords), shown ONCE, then sealed into a SealedSecret for the consumer —
  # the same generate-then-seal pattern used for OIDC client_secrets. The app password
  # is runtime data, NOT in Git.
  #
  # Token exchange (the consumer does this, NOT a browser):
  #   POST https://auth.irupeconsultores.com/application/o/hhccia/token/
  #     grant_type=client_credentials&client_id=hhccia-front
  #     &username=svc-hhccia&password=<app_password>&scope=profile
  #   -> { "access_token": "<JWT>" }   then   Authorization: Bearer <JWT>   to the core.
  #
  # BEFORE FIRST USE (admin UI):
  #   1. set attributes.service below to the real Datatech SER code(s) the machine may
  #      access (case-sensitive: IN / TI / in) — it drives the `service` claim the core
  #      scopes records by;
  #   2. add svc-hhccia to the `hhccia-users` group (the app-access binding) — membership
  #      is identity data managed in the UI, like every other member;
  #   3. create the app password and seal it for the consumer.
  machine-user.yaml: |
    version: 1
    metadata:
      name: HHCCIA machine (M2M) service account
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.user
        id: hhccia-machine-user
        identifiers:
          username: svc-hhccia
        attrs:
          name: HHCCIA machine user
          type: service_account
          is_active: true
          path: service-accounts
          # `service` is read by the hhccia-service-claim scope mapping and emitted as
          # the `service` claim the core scopes record access by. Set to ALL in-scope
          # SER codes (case-sensitive: IN / TI / in) so the machine can reach every
          # service's records; the mapping normalizes a single code or a list to a list.
          # The machine gets NO admin flag (not in hhccia-superadmins/-admin/-readonly)
          # -> physician-level access scoped to these services. `prf` is unset -> the prf
          # claim is null; add attributes.prf here if the core needs a professional
          # number for this account.
          attributes:
            service:
              - IN
              - in
              - TI
  # Declarative branding for the login/flow page. Points the DB logo pointer at
  # the absolute R2-hosted logo (https://pub-...r2.dev/irupe-logo.jpeg) instead
  # of the self-hosted /media/public copy: the 2024.10.5 -> 2026.5.2 upgrade
  # (2026-06-03) broke unauthenticated /media/public serving, so the mounted
  # ConfigMap file 404s. An absolute URL sidesteps authentik's internal media
  # serving entirely. (branding.yaml's authentik-branding ConfigMap + its mount
  # in authentik.yaml are now dead weight -- safe to remove later.)
  # Safe to own these fields: the built-in `Default - Brand` blueprint is
  # `state: created` + a "no default brand exists" condition, so it seeded the
  # brand once and never re-touches it.
  brand.yaml: |
    version: 1
    metadata:
      name: HHCCIA brand customization
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_brands.brand
        identifiers:
          domain: authentik-default          # the existing default brand
        state: present                        # update-in-place, don't recreate
        attrs:
          branding_title: Irupé Apps          # preserved (already set in DB)
          branding_logo: https://pub-291a2932ec3c4b0482850436b8218e9b.r2.dev/irupe-logo.jpeg
          # Shrink the login-page logo to 50% of its default size. The flow CSS
          # sizes the logo by max-width: clamp(75%, var(--ak-c-login--MaxWidth)/2, 90%)
          # on .branding-logo; halving every term of that clamp halves the rendered
          # width (height follows the JPEG aspect ratio). !important so it wins
          # regardless of injection order vs the bundled flow stylesheet.
          branding_custom_css: |
            .branding-logo {
              max-width: clamp(37.5%, calc(var(--ak-c-login--MaxWidth) / 4), 45%) !important;
            }
          # branding_favicon left untouched (still the authentik default icon).
          # Add a small icon to the authentik-branding ConfigMap and point here
          # if you want a custom favicon too.
  # Per-application access control for HHCCIA. The idiomatic authentik pattern:
  # a PolicyBinding ON THE APPLICATION (not a separate login flow), so other
  # apps on this instance are unaffected. Binds the hhccia-users group to the
  # HHCCIA app -> only members may use it.
  #
  # STAGED ON PURPOSE: the binding ships `enabled: false`, so committing this
  # changes nothing (app stays open to all authenticated users). To turn it on:
  #   1. add the clinicians to the `hhccia-users` group in the admin UI
  #      (membership is identity data -> managed in the UI/DB, NOT in Git)
  #   2. flip `enabled: true` below (or toggle the binding in the UI) and let
  #      the worker re-apply.
  # Even at worst there's no hard lockout: admins reach the admin UI regardless
  # of this app binding.
  access.yaml: |
    version: 1
    metadata:
      name: HHCCIA access control
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_core.group
        id: hhccia-users-group
        identifiers:
          name: hhccia-users
        attrs:
          is_superuser: false
      # Full service-admins (see/edit every service AND may approve) are the members
      # of the PRE-EXISTING `hhccia-superadmins` group — the `hhccia-service-claim`
      # mapping above emits service_admin = member-of it. That group is intentionally
      # NOT defined/managed here: it already exists in the cluster and a blueprint
      # upsert must not clobber its is_superuser / parent. (authentik group membership
      # cascades UP the parent tree for policy checks; app access is governed by the
      # hhccia-users binding below.)
      #
      # Role group for HHCCIA AUDIT admins (supervisors). Members are SERVICE-scoped
      # (see records in their assigned Service(s), case-sensitive; no author-PRF
      # restriction) but may ONLY reject — never approve (the core enforces this;
      # approve -> 403). The `hhccia-service-claim` mapping emits audit_admin =
      # member-of this group. As a CHILD of hhccia-users, an audit admin automatically
      # satisfies the hhccia-users app-access binding. Distinct from hhccia-superadmins
      # (who see everything and may approve / write back to the clinical DB).
      - model: authentik_core.group
        identifiers:
          name: hhccia-admin
        attrs:
          is_superuser: false
          parent: !KeyOf hhccia-users-group
      # Role group for HHCCIA READ-ONLY admins (global observers). Members see EVERY
      # record (no service filter, like a superadmin) but have NO write power — the
      # `hhccia-service-claim` mapping emits read_admin = member-of this group, and the
      # core blocks both approve AND reject (-> 403). As a CHILD of hhccia-users they
      # satisfy the app-access binding. Distinct from hhccia-admin (service-scoped, may
      # reject) and hhccia-superadmins (see-all + may approve).
      - model: authentik_core.group
        identifiers:
          name: hhccia-readonly
        attrs:
          is_superuser: false
          parent: !KeyOf hhccia-users-group
      # Voice-dictation grant group. Members get voice_enabled=true (emitted by the
      # hhccia-voice-enabled-claim mapping) and, IF they also have a `service` claim
      # and are NOT read_admin, may dictate new evolutions ("evolución por voz"). This
      # is an ORTHOGONAL capability flag, not a role: it composes with whatever role
      # (plain physician / hhccia-admin auditor / hhccia-superadmins) the user already
      # has. As a CHILD of hhccia-users they satisfy the app-access binding. Membership
      # is identity data managed in the UI/DB, NOT in Git.
      - model: authentik_core.group
        identifiers:
          name: hhccia-voice-enabled
        attrs:
          is_superuser: false
          parent: !KeyOf hhccia-users-group
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, hhccia]]
          group: !Find [authentik_core.group, [name, hhccia-users]]
          order: 0
        attrs:
          enabled: true         # ENFORCED: only hhccia-users (+ child groups) members may use HHCCIA
          negate: false
          timeout: 30
          failure_result: false
  # Self-service signup for physicians. Creates an Authentik user and NOTHING
  # else: the new account is NOT added to any group, so the hhccia app policy
  # binding above ("only hhccia-users may use HHCCIA") leaves it with zero
  # access until an admin adds it to `hhccia-users` in the UI. Physicians log
  # in afterwards via Google; the source's `email_link` matching mode links the
  # Google identity to the account created here (matching on email), so no
  # password is collected.
  #
  # HARDENED WITH AN INVITATION STAGE: the bare flow URL
  #   https://auth.irupeconsultores.com/if/flow/hhccia-signup/
  # is a dead end on its own (continue_flow_without_invitation: false). It only
  # proceeds with a valid ?itoken=<uuid>. The reusable invitation TOKEN is
  # runtime data (a shareable secret link) and is intentionally NOT stored in
  # Git -- it is created out-of-band against the live instance.
  enrollment.yaml: |
    version: 1
    metadata:
      name: HHCCIA physician self-signup
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Validation policy bound to the PRF prompt field: accept only a positive
      # integer (digits, > 0). Empty is left to the field's `required` flag.
      - model: authentik_policies_expression.expressionpolicy
        id: prf-positive-int-policy
        identifiers:
          name: hhccia-prf-positive-int
        attrs:
          name: hhccia-prf-positive-int
          expression: |
            value = request.context.get("prompt_data", {}).get("attributes.prf")
            if value in (None, ""):
                return True
            text = str(value).strip()
            if not text.isdigit() or int(text) <= 0:
                ak_message("El número de profesional debe ser un número entero mayor que 0.")
                return False
            return True
      # ----- prompt fields. Unique labels keep these distinct from the
      # default-source-enrollment prompt fields that share these field_keys. -----
      - model: authentik_stages_prompt.prompt
        id: signup-field-username
        identifiers:
          name: hhccia-signup-username
        attrs:
          name: hhccia-signup-username
          field_key: username
          label: Usuario (HHCCIA signup)
          type: username
          required: true
          order: 0
      - model: authentik_stages_prompt.prompt
        id: signup-field-name
        identifiers:
          name: hhccia-signup-name
        attrs:
          name: hhccia-signup-name
          field_key: name
          label: Nombre completo (HHCCIA signup)
          type: text
          required: true
          order: 1
      - model: authentik_stages_prompt.prompt
        id: signup-field-email
        identifiers:
          name: hhccia-signup-email
        attrs:
          name: hhccia-signup-email
          field_key: email
          label: Email (HHCCIA signup)
          type: email
          required: true
          order: 2
      - model: authentik_stages_prompt.prompt
        id: signup-field-prf
        identifiers:
          name: hhccia-signup-prf
        attrs:
          name: hhccia-signup-prf
          # field_key prefixed with "attributes." -> user_write stores it in
          # user.attributes.prf, queryable later and emittable as an OIDC claim
          # via a custom scope mapping if the app ever needs it.
          field_key: attributes.prf
          # Datatech "professional number" — the internal Datatech ID used to link
          # the Google user to the clinical-system record. Stored as user.attributes.prf
          # (key kept as `prf` so the OIDC claim + validation policy keep working).
          label: Número de profesional
          type: number        # numeric input; stage-level validation policy enforces integer > 0
          required: true
          placeholder: "N° de profesional (Datatech)"
          order: 3
      - model: authentik_stages_prompt.prompt
        id: signup-field-service
        identifiers:
          name: hhccia-signup-service
        attrs:
          name: hhccia-signup-service
          # Stored in user.attributes.service and emitted as the `service` OIDC
          # claim by hhccia-service-mapping. Datatech Service code (SER) the
          # physician belongs to — the core scopes the worklist to it.
          field_key: attributes.service
          label: Servicio
          # Constrained single-choice picker: the physician selects exactly one
          # of the in-scope services. radio-button-group + a fixed choice set means
          # only "IN", "TI" or "in" can ever be submitted (no free text), so the
          # stored attribute always matches a real Datatech SER.
          #
          # CASE-SENSITIVE (Dirección 2026-06-08): "IN" and "in" are DISTINCT services
          # (the core matches SER case-sensitively and the adapter ingests them
          # separately — keep this list in sync with adapter SERVICES_IN_SCOPE). The
          # value is stored/emitted verbatim, so the case here is load-bearing.
          type: radio-button-group
          required: true
          # placeholder holds the choice list, evaluated as an expression because
          # placeholder_expression is true. In authentik 2024.10 a radio-button-group
          # choice list is FLAT: each item is BOTH the submitted value and its label
          # (no (value, label) tuples — those get stringified to "('IN', '…')" and
          # then fail validation as "not a valid choice"). So the items are the bare
          # SER codes, which is exactly what lands in user.attributes.service and the
          # `service` claim. The human-readable meaning is carried in sub_text below.
          # A doctor covering both services is handled by an admin editing the
          # attribute to a list/CSV later (the claim mapping accepts both).
          placeholder_expression: true
          placeholder: |
            return ["IN", "TI", "in"]
          # `in` (lowercase) is a DISTINCT service from `IN` — the case is load-bearing.
          # The radio shows the bare SER code; sub_text carries the human name.
          sub_text: "IN — Internación General · TI — Terapia Intensiva · in — Internación CS"
          order: 4
      # ----- stages -----
      - model: authentik_stages_invitation.invitationstage
        id: signup-invitation-stage
        identifiers:
          name: hhccia-signup-invitation
        attrs:
          name: hhccia-signup-invitation
          continue_flow_without_invitation: false   # bare URL is dead without a valid token
      - model: authentik_stages_prompt.promptstage
        id: signup-prompt-stage
        identifiers:
          name: hhccia-signup-prompt
        attrs:
          name: hhccia-signup-prompt
          # Stage-level validation: the policy scopes itself to the PRF field via
          # prompt_data["attributes.prf"]. (Validation policies bind to the stage,
          # not to individual prompt fields.)
          validation_policies:
            - !KeyOf prf-positive-int-policy
          fields:
            - !KeyOf signup-field-username
            - !KeyOf signup-field-name
            - !KeyOf signup-field-email
            - !KeyOf signup-field-prf
            - !KeyOf signup-field-service
      - model: authentik_stages_user_write.userwritestage
        id: signup-write-stage
        identifiers:
          name: hhccia-signup-write
        attrs:
          name: hhccia-signup-write
          user_creation_mode: always_create
          create_users_as_inactive: false
          user_type: internal
          # Auto-enroll new sign-ups into hhccia-users so they get HHCCIA access
          # on their next Google login WITHOUT a manual group-add. This makes the
          # invitation link itself the authorization gate -- guard/rotate it
          # accordingly. !Find (not !KeyOf): the group is declared in access.yaml,
          # a separate blueprint.
          create_users_group: !Find [authentik_core.group, [name, hhccia-users]]
      # Final stage: after the account is created, send the new physician to the
      # app's task list instead of the bare login page. They aren't logged in yet
      # (signup collects no password — auth is via Google afterwards), so the SPA
      # will see no session and bounce them through the Google-only login, then
      # land them back on /lista-tareas. keep_context:false => clean external URL,
      # no flow-context query params appended. Redirect stage requires authentik
      # 2024.12+ (live is 2026.5.2).
      - model: authentik_stages_redirect.redirectstage
        id: signup-redirect-stage
        identifiers:
          name: hhccia-signup-redirect
        attrs:
          name: hhccia-signup-redirect
          mode: static
          target_static: https://medaudit.irupeconsultores.com/lista-tareas
          keep_context: false
      # ----- flow -----
      - model: authentik_flows.flow
        id: signup-flow
        identifiers:
          slug: hhccia-signup
        attrs:
          name: HHCCIA - Solicitar acceso
          title: Registro de profesionales — HHCCIA
          slug: hhccia-signup
          designation: enrollment
          authentication: require_unauthenticated
      # ----- bindings: invitation (5) -> prompt (10) -> user_write (20) -> redirect (30) -----
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf signup-flow
          order: 5
        attrs:
          stage: !KeyOf signup-invitation-stage
          evaluate_on_plan: true
          re_evaluate_policies: false
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf signup-flow
          order: 10
        attrs:
          stage: !KeyOf signup-prompt-stage
          evaluate_on_plan: true
          re_evaluate_policies: false
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf signup-flow
          order: 20
        attrs:
          stage: !KeyOf signup-write-stage
          evaluate_on_plan: true
          re_evaluate_policies: false
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf signup-flow
          order: 30
        attrs:
          stage: !KeyOf signup-redirect-stage
          evaluate_on_plan: true
          re_evaluate_policies: false
  # Hermes Agent — Authentik fronts the dashboard (Hermes has no native auth and
  # exposes API keys). A PROXY provider in "proxy" mode makes the EMBEDDED OUTPOST
  # reverse-proxy to the in-cluster Hermes service after authenticating. The public
  # host hermes.cjbarroso.com is routed to authentik-server (the embedded outpost)
  # in src/authentik/ingress.yaml; the outpost matches this provider by external_host.
  #
  # Access is gated to the `hermes-users` group (policy binding, ENABLED below).
  # ⚠ Group MEMBERSHIP is identity data managed in the UI/DB, NOT in Git — add your
  # own account to `hermes-users` in the admin UI or the app is inaccessible to all.
  # (Admins still reach the admin UI regardless of this app binding.)
  #
  # After editing, restart the authentik worker (or wait for its discovery cycle).
  hermes-proxy.yaml: |
    version: 1
    metadata:
      name: Hermes proxy access
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      - model: authentik_providers_proxy.proxyprovider
        id: hermes-proxy-provider
        identifiers:
          name: hermes-proxy
        attrs:
          name: hermes-proxy
          mode: proxy
          external_host: https://hermes.cjbarroso.com
          internal_host: http://hermes.hermes.svc.cluster.local:9119
          internal_host_ssl_validation: false
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          # Same fix as hhccia-provider: default-provider-invalidation-flow is EMPTY on
          # this instance (no UserLogoutStage), so logout never terminated the SSO
          # session. Point at default-invalidation-flow (has UserLogoutStage). (2026-06-08)
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
      - model: authentik_core.application
        id: hermes-app
        identifiers:
          slug: hermes
        attrs:
          name: Hermes
          slug: hermes
          provider: !KeyOf hermes-proxy-provider
          # HIDDEN FROM THE LAUNCHER for everyone: authentik's documented way to
          # keep an app out of every user's "My applications" library is the
          # sentinel launch URL `blank://blank`. This only hides the card -- the
          # proxy still serves https://hermes.cjbarroso.com by direct URL for
          # members of `hermes-users` (the access binding below is unchanged).
          meta_launch_url: blank://blank
          open_in_new_tab: false
      # Assign the proxy provider to the built-in embedded outpost so it actually
      # serves hermes.cjbarroso.com. NOTE: this sets the embedded outpost's provider
      # list — confirm it has no other proxy providers before applying (currently
      # none; hhccia uses OIDC, which needs no outpost).
      - model: authentik_outposts.outpost
        identifiers:
          name: authentik Embedded Outpost
        attrs:
          providers:
            - !KeyOf hermes-proxy-provider
      # Access control: only `hermes-users` members may reach Hermes. Mirrors the
      # hhccia-users binding. Hermes can execute code/terminal/browser tools, so keep
      # this enabled and the group membership tight.
      - model: authentik_core.group
        id: hermes-users-group
        identifiers:
          name: hermes-users
        attrs:
          is_superuser: false
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, hermes]]
          group: !Find [authentik_core.group, [name, hermes-users]]
          order: 0
        attrs:
          enabled: true
          negate: false
          timeout: 30
          failure_result: false
  # Google-only login. Repoints the brand's *authentication* (login) flow to a
  # dedicated flow whose identification stage exposes ONLY the Google source —
  # no username/email field, so there is no password path. The login screen
  # shows just a "Sign in with Google" button for every consumer of this
  # Authentik (the medaudit SPA AND the auth.irupeconsultores.com admin UI; one
  # brand serves both).
  #
  # The stock `default-authentication-flow` ("Irupé Apps") is LEFT INTACT and
  # still reachable by direct URL as an admin BREAK-GLASS for password login if
  # Google is ever unavailable:
  #   https://auth.irupeconsultores.com/if/flow/default-authentication-flow/
  # Normal users never see it — the brand default is the Google-only flow below.
  #
  # ⚠ PREREQ before this bites: every admin must already have a linked Google
  # identity (the Google source links accounts by email). Verify in the admin UI
  # (Directory → Users → <user> → linked sources) BEFORE the worker applies this,
  # or admins lose UI access and must recover via the break-glass URL above.
  #
  # The Google OAuth source (slug `google`) is runtime config in the DB —
  # intentionally NOT in Git because it carries a client_secret — so it is
  # referenced here by !Find, never redefined.
  google-only-login.yaml: |
    version: 1
    metadata:
      name: HHCCIA Google-only login
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Identification stage: social-login-only. Empty user_fields => no
      # username/email textbox => the bound source renders as the only option.
      - model: authentik_stages_identification.identificationstage
        id: google-identification
        identifiers:
          name: hhccia-google-identification
        attrs:
          name: hhccia-google-identification
          user_fields: []                    # no username/email entry => no password path
          password_stage: null
          case_insensitive_matching: true
          show_source_labels: true
          pretend_user_exists: false
          sources:
            - !Find [authentik_sources_oauth.oauthsource, [slug, google]]
      # Session-creating stage. The Google source flow creates its own session on
      # the social path; this is the stock-equivalent finalizer for completeness.
      # session_duration "seconds=0" = session cookie, matching default-authentication-login.
      - model: authentik_stages_user_login.userloginstage
        id: google-login
        identifiers:
          name: hhccia-google-login
        attrs:
          name: hhccia-google-login
          session_duration: "seconds=0"
      # The Google-only authentication (login) flow.
      - model: authentik_flows.flow
        id: google-auth-flow
        identifiers:
          slug: hhccia-google-auth
        attrs:
          name: Irupé Apps — Ingreso con Google
          title: Ingresá con Google
          slug: hhccia-google-auth
          designation: authentication
          authentication: require_unauthenticated
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf google-auth-flow
          order: 10
        attrs:
          stage: !KeyOf google-identification
          evaluate_on_plan: true
          re_evaluate_policies: false
      - model: authentik_flows.flowstagebinding
        identifiers:
          target: !KeyOf google-auth-flow
          order: 30
        attrs:
          stage: !KeyOf google-login
          evaluate_on_plan: true
          re_evaluate_policies: false
      # Repoint ONLY the brand's login flow at the Google-only flow. This is a
      # partial update of the SAME brand managed in brand.yaml: that file owns
      # branding_title/branding_logo, this owns flow_authentication — disjoint
      # fields, so the two state:present entries never clobber each other.
      # !KeyOf (same blueprint) guarantees the flow exists before this resolves;
      # using !Find from a separate file could race on first apply.
      - model: authentik_brands.brand
        identifiers:
          domain: authentik-default
        state: present
        attrs:
          flow_authentication: !KeyOf google-auth-flow
  # Per-application access control for Grafana. The Grafana OIDC provider +
  # application (slug `grafana`) are runtime config in the DB — they carry an
  # OIDC client_secret — so they are referenced here by !Find, never redefined.
  # This blueprint only adds a PolicyBinding gating the app to `Grafana Admins`,
  # so only its members see Grafana in the launcher AND can log in via SSO.
  #
  # ⚠ This restricts SSO to `Grafana Admins` ONLY. Previously ANY authenticated
  # user got the Viewer role just by being logged in (see role_attribute_path in
  # grafana-values.yaml); after this they lose access. Editors lose it too — to
  # readmit them, add a second policybinding for the `Grafana Editors` group.
  # NOT a hard lockout: the local Grafana admin login still works
  # (oauth_auto_login:false + /login?disableLoginForm; creds in grafana-secrets).
  #
  # Group MEMBERSHIP is identity data managed in the UI/DB, NOT in Git.
  grafana-access.yaml: |
    version: 1
    metadata:
      name: Grafana access control
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Declared idempotently so the !Find below always resolves. state:present
      # creates it if missing, else updates in place — it never touches the
      # group's membership (a separate relation owned by the UI/DB). Name must
      # match the `groups` claim value used in grafana-values.yaml's
      # role_attribute_path ('Grafana Admins').
      - model: authentik_core.group
        identifiers:
          name: Grafana Admins
        attrs:
          is_superuser: false
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, grafana]]
          group: !Find [authentik_core.group, [name, Grafana Admins]]
          order: 0
        attrs:
          enabled: true
          negate: false
          timeout: 30
          failure_result: false
  # Planka (kanban board, planka.irupeconsultores.com) OIDC application. Unlike
  # hhccia (a PUBLIC SPA using PKCE), Planka is a CONFIDENTIAL server-side client:
  # it holds a client_secret. We DELIBERATELY omit client_secret here so Authentik
  # GENERATES one — committing a secret to this (plaintext) ConfigMap would leak
  # it. After this applies, read the generated secret from the admin UI
  # (Applications -> Providers -> planka-provider) and seal it into the
  # `planka-oidc` SealedSecret (src/planka) as keys clientId + clientSecret.
  #
  # Planka maps admin rights from a `groups` claim (OIDC_ROLES_ATTRIBUTE=groups,
  # OIDC_ADMIN_ROLES="Planka Admins"), so we add a custom scope mapping that emits
  # the user's group names on the `groups` scope, and a `Planka Admins` group.
  #
  # After editing, restart the authentik worker (or wait for its discovery cycle).
  planka-oidc.yaml: |
    version: 1
    metadata:
      name: Planka OIDC application
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Emit the user's group names as a `groups` claim on a dedicated `groups`
      # scope, so Planka's OIDC_ROLES_ATTRIBUTE=groups admin mapping works. Planka
      # reads claims from userinfo by default; authentik includes a scope's mapping
      # in userinfo when that scope is requested (Planka requests `groups`).
      - model: authentik_providers_oauth2.scopemapping
        id: planka-groups-mapping
        identifiers:
          name: planka-groups-claim
        attrs:
          name: planka-groups-claim
          scope_name: groups
          description: "Planka: nombres de los grupos del usuario, sobre el scope groups."
          expression: |
            return {"groups": [group.name for group in user.ak_groups.all()]}
      - model: authentik_providers_oauth2.oauth2provider
        id: planka-provider
        identifiers:
          name: planka-provider
        attrs:
          name: planka-provider
          client_id: planka
          client_type: confidential                  # server-side client, holds a secret
          # client_secret intentionally omitted -> authentik generates it.
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          # Same fix as hhccia/hermes: default-provider-invalidation-flow is EMPTY
          # on this instance, so logout never terminated the SSO session. Point at
          # default-invalidation-flow (has the UserLogoutStage).
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://planka.irupeconsultores.com/oidc-callback
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          # Authentik defaults grant_types to the full set ONLY when a provider is
          # created in the UI; a blueprint-created provider defaults to [] and then
          # rejects every authorize request ("Invalid grant_type for provider" ->
          # invalid_request/malformed). Planka uses the authorization-code flow plus
          # refresh tokens (refresh_token_validity above), so enable exactly those.
          grant_types:
            - authorization_code
            - refresh_token
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !KeyOf planka-groups-mapping
      - model: authentik_core.application
        id: planka-app
        identifiers:
          slug: planka
        attrs:
          name: Planka
          slug: planka
          provider: !KeyOf planka-provider
          meta_launch_url: https://planka.irupeconsultores.com/
          open_in_new_tab: false
      # The group whose members Planka grants admin (OIDC_ADMIN_ROLES). Declared
      # idempotently; MEMBERSHIP is identity data managed in the UI/DB, NOT in Git.
      - model: authentik_core.group
        identifiers:
          name: Planka Admins
        attrs:
          is_superuser: false
      # OPTIONAL app-access gate, STAGED DISABLED (mirrors hhccia): committing this
      # changes nothing (Planka stays open to all authenticated users). To restrict
      # who may SSO into Planka: add members to `planka-users` in the admin UI, then
      # flip enabled: true.
      - model: authentik_core.group
        id: planka-users-group
        identifiers:
          name: planka-users
        attrs:
          is_superuser: false
      - model: authentik_policies.policybinding
        identifiers:
          target: !Find [authentik_core.application, [slug, planka]]
          group: !Find [authentik_core.group, [name, planka-users]]
          order: 0
        attrs:
          enabled: false        # staged off — no access restriction until opted in
          negate: false
          timeout: 30
          failure_result: false
  # ===========================================================================
  # Prestaciones export UI — its OWN confidential OIDC app + a NEW group that
  # gates access. Server-side app (Authlib session), so confidential client with
  # a generated secret (sealed into src/hhccia-v2/hhccia-prestaciones-ui-oidc).
  # Access is ENFORCED: only members of `hhccia-prestaciones` may SSO in.
  # After editing, restart the authentik worker (or wait for its discovery cycle).
  hhccia-prestaciones-oidc.yaml: |
    version: 1
    metadata:
      name: Prestaciones export UI OIDC application
      labels:
        blueprints.goauthentik.io/instantiate: "true"
    entries:
      # Emit the user's group names as a `groups` claim (on the `groups` scope);
      # the UI checks membership of `hhccia-prestaciones` from this claim.
      - model: authentik_providers_oauth2.scopemapping
        id: prestaciones-groups-mapping
        identifiers:
          name: hhccia-prestaciones-groups-claim
        attrs:
          name: hhccia-prestaciones-groups-claim
          scope_name: groups
          description: "Prestaciones UI: nombres de los grupos del usuario, sobre el scope groups."
          expression: |
            return {"groups": [group.name for group in user.ak_groups.all()]}
      - model: authentik_providers_oauth2.oauth2provider
        id: prestaciones-provider
        identifiers:
          name: hhccia-prestaciones-provider
        attrs:
          name: hhccia-prestaciones-provider
          client_id: hhccia-prestaciones
          client_type: confidential                  # server-side; secret generated by authentik
          authorization_flow: !Find [authentik_flows.flow, [slug, default-provider-authorization-implicit-consent]]
          invalidation_flow: !Find [authentik_flows.flow, [slug, default-invalidation-flow]]
          access_code_validity: minutes=1
          access_token_validity: hours=1
          refresh_token_validity: days=30
          signing_key: !Find [authentik_crypto.certificatekeypair, [name, authentik Self-signed Certificate]]
          redirect_uris:
            - matching_mode: strict
              url: https://prestaciones.irupeconsultores.com/auth/callback
            - matching_mode: strict
              url: https://guardia-pediatria.irupeconsultores.com/auth/callback
          sub_mode: hashed_user_id
          include_claims_in_id_token: true
          grant_types:
            - authorization_code
            - refresh_token
          property_mappings:
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-openid]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-profile]]
            - !Find [authentik_providers_oauth2.scopemapping, [managed, goauthentik.io/providers/oauth2/scope-email]]
            - !KeyOf prestaciones-groups-mapping
      - model: authentik_core.application
        id: prestaciones-app
        identifiers:
