# PLACEHOLDER secret — DO NOT COMMIT REAL VALUES.
#
# This file is named `.example` and is intentionally NOT applied by Argo (the
# staging app excludes it). Only ONE SealedSecret must be created out-of-band and
# committed into this directory before the stack will start (see README.md):
#
#   hhccia-core-secrets  (this shape — only the genuinely external secrets)
#
# The Postgres credentials are NOT here: the CNPG operator generates the secret
# `hhccia-staging-db-app` (username/password) and the core builds DATABASE_URL
# from it (see hhccia-core.yaml + postgres.yaml). Nothing DB-related is sealed.
#
# SealedSecrets are namespace-scoped — the prod (hhccia-v2) sealed values CANNOT
# be reused here; this must be sealed for namespace `hhccia-staging`.
#
#   - MSSQL_USER/MSSQL_PASSWORD must be a login with SELECT + UPDATE on the
#     **HHCC** database (staging exercises write-back against HHCC).
apiVersion: v1
kind: Secret
metadata:
  name: hhccia-core-secrets
  namespace: hhccia-staging
type: Opaque
stringData:
  GEMINI_API_KEY: "REPLACE_ME"
  # Datatech HHCC (write-capable login for staging write-back rehearsal)
  MSSQL_USER: "REPLACE_ME"
  MSSQL_PASSWORD: "REPLACE_ME"
