# PLACEHOLDER secret — DO NOT COMMIT REAL VALUES.
#
# This file is named `.example` and is intentionally NOT applied by Argo (the
# staging app excludes it). Two real SealedSecrets must be created out-of-band
# and committed into this directory before the stack will start (see README.md):
#
#   1. hhccia-core-secrets        (this shape)
#   2. hhccia-staging-db-app       (CNPG role creds: username + password)
#
# SealedSecrets are namespace-scoped — the prod (hhccia-v2) sealed values CANNOT
# be reused here; they must be re-sealed for namespace `hhccia-staging`.
#
# Notes for the staging values:
#   - DATABASE_URL host stays `hhccia-core-pg` (ExternalName -> hhccia-staging-db).
#   - PG_USER/PG_PASSWORD must match the hhccia-staging-db-app secret.
#   - MSSQL_USER/MSSQL_PASSWORD must be a login with SELECT + UPDATE on the
#     **HHCC** database (staging exercises write-back against HHCC).
apiVersion: v1
kind: Secret
metadata:
  name: hhccia-core-secrets
  namespace: hhccia-staging
type: Opaque
stringData:
  PG_USER: "hhccia"
  PG_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql+asyncpg://hhccia:REPLACE_ME@hhccia-core-pg:5432/hhccia_core"
  GEMINI_API_KEY: "REPLACE_ME"
  # Datatech HHCC (write-capable login for staging write-back rehearsal)
  MSSQL_USER: "REPLACE_ME"
  MSSQL_PASSWORD: "REPLACE_ME"
