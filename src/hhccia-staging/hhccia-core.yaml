# AI Core Service (staging). Same image as prod, deployed to hhccia-staging.
# Uses the DEDICATED staging Authentik OIDC application (slug hhccia-staging,
# own issuer/JWKS) so staging auth is isolated from prod. App access is gated to
# the `hhccia-staging-users` group; the role/claim groups (and prf/service
# attributes) are shared with prod. Data store and clinical source also differ.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-core
  namespace: hhccia-staging
  labels:
    app: hhccia-core
spec:
  replicas: 1
  # Recreate: the core binds a single durable JetStream consumer; two
  # overlapping pods fight over it (see prod manifest).
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hhccia-core
  template:
    metadata:
      labels:
        app: hhccia-core
        logs.cjbarroso.com/collect: "true"
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: github-auth
      containers:
        - name: hhccia-core
          # Staging is SHA-pinned like prod, but to the `staging` branch builds.
          # The app repo's CI rewrites this tag to `:staging-<sha>` on every push
          # to `staging` (git write-back) — that manifest change is what Argo
          # detects and rolls. `:staging` here is the bootstrap placeholder before
          # the first write-back (a brief ImagePullBackOff until CI lands the SHA).
          image: ghcr.io/irupe-consultores/hhccia-core:staging-28d3719830aca8d1cea6aa6ec021ab557548db44
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8000, name: http }
            - { containerPort: 9100, name: metrics }
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: AI_MODE
              value: "gemini"          # real Gemini; low HHCC volume = low cost
            - name: GEMINI_MODEL
              value: "gemini-3.5-flash"
            - name: VOICE_EDIT_MODEL
              value: "gemini-flash-lite-latest"
            # DB credentials come from the secret the CNPG operator generates for
            # the cluster (hhccia-staging-db-app: keys username/password) — NOT a
            # hand-sealed secret. The asyncpg URL is assembled from them; kubelet
            # expands $(VAR) from env entries defined earlier in this container.
            - name: PG_USER
              valueFrom: { secretKeyRef: { name: hhccia-staging-db-app, key: username } }
            - name: PG_PASSWORD
              valueFrom: { secretKeyRef: { name: hhccia-staging-db-app, key: password } }
            - name: DATABASE_URL
              value: "postgresql+asyncpg://$(PG_USER):$(PG_PASSWORD)@hhccia-core-pg:5432/hhccia_core"
            - name: GEMINI_API_KEY
              valueFrom: { secretKeyRef: { name: hhccia-core-secrets, key: GEMINI_API_KEY } }
            # Dedicated staging OIDC application (slug hhccia-staging) — issuer is
            # per-app-slug, so tokens carry iss=.../application/o/hhccia-staging/.
            # Must match the staging provider in src/authentik/blueprints.yaml.
            # (aud is NOT enforced — AUTHENTIK_AUDIENCE unset — so the differing
            # client_id is fine; only iss/JWKS must point at the staging app.)
            - name: AUTH_DISABLED
              value: "false"
            - name: AUTHENTIK_ISSUER
              value: "https://auth.irupeconsultores.com/application/o/hhccia-staging/"
            - name: AUTHENTIK_JWKS_URL
              value: "http://authentik-server.authentik.svc.cluster.local/application/o/hhccia-staging/jwks/"
            # CORS: the staging front origin is NOT in the code defaults (those cover
            # the prod fronts only), so without this the browser preflight OPTIONS to
            # /records returns 400 and the SPA worklist never loads. Staging host only.
            - name: ALLOWED_ORIGINS
              value: "https://medaudit-staging.irupeconsultores.com,http://localhost:4200"
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          resources:
            requests: { cpu: 50m, memory: 192Mi }
            limits: { cpu: "1", memory: 768Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-core
  namespace: hhccia-staging
  labels:
    app: hhccia-core
spec:
  selector:
    app: hhccia-core
  ports:
    - { protocol: TCP, port: 8000, targetPort: 8000 }
  type: ClusterIP
