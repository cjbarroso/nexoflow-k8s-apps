# Exposes the staging frontend via the Cloudflare tunnel.
#   - medaudit-staging.irupeconsultores.com  (irupeconsultores.com zone)
# Single-level subdomain on purpose: Cloudflare Universal SSL covers
# `*.irupeconsultores.com` but NOT a nested `*.medaudit.irupeconsultores.com`,
# so a host like `staging.medaudit.…` has no edge cert and TLS fails. Mirrors the
# prod (`medaudit.`) and landing (`medaudit-landing.`) single-level pattern.
# DNS CNAME auto-created by the controller. The Angular SPA derives its OIDC
# redirect from window.location.origin, so this host's /callback + /auth/login
# must be allowlisted in the Authentik provider blueprint
# (src/authentik/blueprints.yaml — added alongside the prod medaudit host).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hhccia-front-ingress
  namespace: hhccia-staging
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: "medaudit-staging.irupeconsultores.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hhccia-front
                port:
                  number: 8080
