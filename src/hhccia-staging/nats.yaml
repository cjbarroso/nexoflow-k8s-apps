# NATS with JetStream — the event bus for the hhccia-staging pipeline.
# A SEPARATE instance from prod's NATS (different namespace) so staging streams
# and durable consumers never collide with production's. Durable file store on a
# PVC so streams/consumers survive pod restarts (see SIF 2026-06-05). Sized
# smaller than prod (staging is low-volume).
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: nats
  namespace: hhccia-staging
  labels:
    app: nats
spec:
  serviceName: nats-headless
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
        logs.cjbarroso.com/collect: "true"
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nats
          image: nats:2.14-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - { containerPort: 4222, name: client }
            - { containerPort: 8222, name: monitor }
          volumeMounts:
            - { name: js, mountPath: /data }
          readinessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /healthz, port: 8222 }
            initialDelaySeconds: 10
            periodSeconds: 20
          resources:
            requests: { cpu: 25m, memory: 48Mi }
            limits: { cpu: 250m, memory: 256Mi }
  volumeClaimTemplates:
    - metadata:
        name: js
      spec:
        accessModes: ["ReadWriteOnce"]
        storageClassName: local-path
        resources:
          requests:
            storage: 1Gi
---
# Stable client DNS: `nats.hhccia-staging.svc:4222`.
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: hhccia-staging
  labels:
    app: nats
spec:
  selector:
    app: nats
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
  type: ClusterIP
---
# Headless service governing the StatefulSet (required by `serviceName`).
apiVersion: v1
kind: Service
metadata:
  name: nats-headless
  namespace: hhccia-staging
  labels:
    app: nats
spec:
  clusterIP: None
  selector:
    app: nats
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
