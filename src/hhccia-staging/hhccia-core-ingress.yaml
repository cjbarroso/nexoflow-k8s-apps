# Exposes the staging core API via the Cloudflare tunnel.
#   - api-medaudit-staging.irupeconsultores.com
# Single-level subdomain on purpose: Universal SSL covers `*.irupeconsultores.com`
# but not a nested `*.medaudit.irupeconsultores.com`. DNS CNAME auto-created.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hhccia-core-ingress
  namespace: hhccia-staging
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: "api-medaudit-staging.irupeconsultores.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hhccia-core
                port:
                  number: 8000
