# Frontend (Angular) for staging — same image as prod, runtime-switched to the
# staging core via CORE_API_URL. Uses the DEDICATED staging OIDC client
# `hhccia-front-staging` (app slug `hhccia-staging`), isolated from prod — see
# the hhccia-staging.yaml blueprint in src/authentik/blueprints.yaml.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-front
  namespace: hhccia-staging
  labels:
    app: hhccia-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hhccia-front
  template:
    metadata:
      labels:
        app: hhccia-front
        logs.cjbarroso.com/collect: "true"
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: github-auth
      containers:
        - name: hhccia-front
          # SHA-pinned to staging-branch builds; CI git-write-back rewrites this
          # to `:staging-<sha>` per push (see hhccia-core.yaml for the full note).
          image: ghcr.io/irupe-consultores/hhccia-front:staging-da0c33e0db94b0fdaab7e52c1e2b9d00f5a9003a
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: API_URL
              value: "https://api-medaudit-staging.irupeconsultores.com"
            # The switch that flips ListService -> CoreApiService (staging core).
            - name: CORE_API_URL
              value: "https://api-medaudit-staging.irupeconsultores.com"
            # Dedicated staging OIDC application/client (hhccia-staging.yaml in
            # src/authentik/blueprints.yaml) — isolated from prod's hhccia client.
            - name: AUTHENTIK_AUTHORITY
              value: "https://auth.irupeconsultores.com/application/o/hhccia-staging/"
            - name: AUTHENTIK_CLIENT_ID
              value: "hhccia-front-staging"
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-front
  namespace: hhccia-staging
  labels:
    app: hhccia-front
spec:
  selector:
    app: hhccia-front
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
