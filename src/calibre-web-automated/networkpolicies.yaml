# Network segmentation for the calibre-web-automated namespace.
# Default-deny ingress, then only the flows CWA actually uses:
#   - cloudflared tunnel connectors terminate books_cwa.irupeconsultores.com
#     and connect to the CWA web pods on 8083.
#   - Kubelet probes from the CNI bridge (10.42.0.1).
#   - Intra-namespace communication for any future sidecars.
#
# Egress is intentionally unrestricted: CWA resolves and reaches metadata
# providers (Google Books, Amazon, ISBNdb, Hardcover) over the public internet.
apiVersion: v1
kind: Namespace
metadata:
  name: calibre-web-automated
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: calibre-web-automated
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: calibre-web-automated
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probes
  namespace: calibre-web-automated
spec:
  podSelector: {}
  ingress:
    - from:
        - ipBlock: { cidr: 10.42.0.1/32 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tunnel-to-web
  namespace: calibre-web-automated
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: cloudflared }
      ports:
        - { protocol: TCP, port: 8083 }
