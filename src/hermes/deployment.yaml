# Hermes Agent gateway + web dashboard (one s6-supervised process tree).
#
# Source of truth = the PVC (/opt/data). Hermes owns its own config.yaml, .env
# (API keys, bot tokens), sessions, memory and skills there, managed via the
# dashboard / `hermes gateway setup`. Git only defines the WORKLOAD — we do not
# inject app config or secrets via env/ConfigMap/Secret (that fought Hermes'
# own config and left secrets duplicated). Bootstrap on a fresh PVC is a one-time
# `hermes gateway setup`; the PVC is backed up by Velero.
#
# Recreate (not RollingUpdate): RWO PVC, single owner of /opt/data.
#
# Auth: the dashboard has NO native auth and exposes API keys, so it runs with
# HERMES_DASHBOARD_INSECURE=1 (native gate off) and Authentik's embedded outpost
# authenticates in front of it (see src/authentik). It must never be exposed
# without that proxy. These HERMES_DASHBOARD_* vars are container-runtime toggles
# (how we expose it in k8s), not app config — hence they stay in Git, not the PVC.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: hermes
  labels:
    app: hermes
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
        logs.cjbarroso.com/collect: "true"   # opt in to log aggregation
    spec:
      automountServiceAccountToken: false
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-data
      containers:
        - name: hermes
          image: nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          args: ["gateway", "run"]
          env:
            # Run the bundled web dashboard alongside the gateway, bound on all
            # interfaces with its native OAuth gate OFF (Authentik fronts it).
            - name: HERMES_DASHBOARD
              value: "1"
            - name: HERMES_DASHBOARD_HOST
              value: "0.0.0.0"
            - name: HERMES_DASHBOARD_PORT
              value: "9119"
            - name: HERMES_DASHBOARD_INSECURE
              value: "1"
          ports:
            - name: api
              containerPort: 8642
              protocol: TCP
            - name: dashboard
              containerPort: 9119
              protocol: TCP
          volumeMounts:
            - name: data
              mountPath: /opt/data
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: 1500m
              memory: 2Gi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false   # dashboard + gateway write at runtime
