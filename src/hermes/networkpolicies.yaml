# Network segmentation for the hermes namespace.
# hermes.cjbarroso.com terminates at authentik-server (proxy provider /
# embedded outpost), which forwards here — so ingress comes from the
# authentik namespace, NOT from cloudflared. The Telegram side is egress
# (long polling), unrestricted for now.
# See src/hhccia-v2/networkpolicies.yaml for pattern notes.
apiVersion: v1
kind: Namespace
metadata:
  name: hermes
  annotations:
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: hermes
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: hermes
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probes
  namespace: hermes
spec:
  podSelector: {}
  ingress:
    - from:
        - ipBlock: { cidr: 10.42.0.1/32 }
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-authentik-outpost
  namespace: hermes
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: authentik }
      ports:
        - { protocol: TCP, port: 8642 }
        - { protocol: TCP, port: 9119 }
