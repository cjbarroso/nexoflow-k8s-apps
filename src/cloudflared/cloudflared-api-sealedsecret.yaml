# Cloudflare credentials for the tunnel ingress controller, sealed for the
# `cloudflared` namespace (keys: api_token, account_id, tunnel_name). The chart
# reads them via cloudflare.secretRef in cloudflared-values-production.yaml;
# this file is applied by the same `cloudflared` Argo Application.
#
# Rotation: create a new token in the Cloudflare dashboard (Zone:Read,
# DNS:Edit, Cloudflare Tunnel:Edit), reseal with kubeseal (see
# apps/operators/sealed-secrets/README.md), commit, verify the tunnel,
# then delete the old token. Sealed 2026-06-11.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: cloudflare-api-credentials
  namespace: cloudflared
spec:
  encryptedData:
    account_id: 
    api_token: 
    tunnel_name: 
  template:
    metadata:
      name: cloudflare-api-credentials
      namespace: cloudflared
