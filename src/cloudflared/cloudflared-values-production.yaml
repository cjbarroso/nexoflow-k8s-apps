# Credentials live in the cloudflare-api-credentials SealedSecret
# (cloudflared-api-sealedsecret.yaml in this directory) — never put the
# apiToken here in plaintext: this repo is public and CI (gitleaks) will
# reject it. With secretRef set, the chart skips creating its own Secret
# and the controller reads everything from the sealed one.
cloudflare:
  secretRef:
    name: cloudflare-api-credentials
    apiTokenKey: api_token
    accountIDKey: account_id
    tunnelNameKey: tunnel_name
