# Alertmanager -> Hermes incident-response webhook auth adapter.
#
# Prometheus Alertmanager's webhook_configs can send a Bearer token (or basic
# auth) but cannot set custom headers or HMAC-sign the body. The Hermes webhook
# only accepts Svix / GitHub-HMAC / X-Gitlab-Token / generic-HMAC. This tiny
# adapter bridges the two: Alertmanager POSTs here with a standard Bearer token,
# and the adapter forwards the payload to the Hermes incident-alerts webhook with
# the X-Gitlab-Token header Hermes accepts.
#
# Standard-library Python only (no pip / no custom image build): it runs on a
# stock python:3.13-slim image with the script mounted from a ConfigMap.
#
# Before applying:
#   1. Replace the Secret placeholders below with a SealedSecret (see the repo's
#      cognee-*-sealedsecret.yaml pattern) or create it with kubectl. The
#      WEBHOOK_SECRET must match the incident-alerts route secret on the Hermes
#      PVC (webhook_subscriptions.json). ALERTMANAGER_BEARER_TOKEN is the token
#      you configure in Alertmanager's webhook_configs.http_config.authorization.
#   2. Adjust the NetworkPolicy namespace selector to the namespace where your
#      Alertmanager actually runs (default shown: monitoring).
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-incident-webhook
  namespace: hermes2
  labels:
    app: alertmanager-incident-webhook
data:
  adapter.py: |
    #!/usr/bin/env python3
    """Alertmanager -> Hermes incident-alerts webhook auth adapter (stdlib only)."""
    import json
    import os
    import sys
    import urllib.error
    import urllib.request
    from http.server import BaseHTTPRequestHandler, HTTPServer

    HERMES_WEBHOOK_URL = os.environ.get(
        "HERMES_WEBHOOK_URL",
        "http://hermes2-incident-response-webhook:8644/webhooks/incident-alerts",
    )
    WEBHOOK_SECRET = os.environ["WEBHOOK_SECRET"]            # sent as X-Gitlab-Token
    EXPECTED_BEARER = os.environ.get("ALERTMANAGER_BEARER_TOKEN", "")
    TIMEOUT = int(os.environ.get("FORWARD_TIMEOUT_SECONDS", "30"))
    PORT = int(os.environ.get("PORT", "9090"))


    class Handler(BaseHTTPRequestHandler):
        def _reply(self, code, payload):
            body = json.dumps(payload).encode()
            self.send_response(code)
            self.send_header("Content-Type", "application/json")
            self.send_header("Content-Length", str(len(body)))
            self.end_headers()
            self.wfile.write(body)

        def do_GET(self):
            if self.path in ("/health", "/healthz", "/"):
                self._reply(200, {"status": "ok"})
            else:
                self._reply(404, {"error": "not found"})

        def do_POST(self):
            length = int(self.headers.get("Content-Length", 0))
            body = self.rfile.read(length) if length else b""

            if EXPECTED_BEARER:
                auth = self.headers.get("Authorization", "")
                if auth != "Bearer " + EXPECTED_BEARER:
                    self._reply(401, {"error": "unauthorized"})
                    return

            req = urllib.request.Request(
                HERMES_WEBHOOK_URL,
                data=body,
                headers={
                    "Content-Type": "application/json",
                    "X-Gitlab-Token": WEBHOOK_SECRET,
                },
                method="POST",
            )
            try:
                with urllib.request.urlopen(req, timeout=TIMEOUT) as resp:
                    resp.read()
                    self._reply(resp.status, {"forwarded": True, "status": resp.status})
            except urllib.error.HTTPError as exc:
                self._reply(exc.code, {"error": "upstream error", "status": exc.code})
            except Exception as exc:  # noqa: BLE001 - report any forward failure
                self._reply(502, {"error": str(exc)})

        def log_message(self, fmt, *args):
            sys.stderr.write("[adapter] " + (fmt % args) + "\n")


    if __name__ == "__main__":
        print(f"[adapter] listening on :{PORT} -> {HERMES_WEBHOOK_URL}", flush=True)
        HTTPServer(("0.0.0.0", PORT), Handler).serve_forever()
---
# The Secret `alertmanager-incident-webhook` (keys WEBHOOK_SECRET and
# ALERTMANAGER_BEARER_TOKEN) is provided by the companion SealedSecret in
# alertmanager-incident-webhook-sealedsecret.yaml — sealed with kubeseal, never
# committed in plaintext. Create it before applying this Deployment.
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: alertmanager-incident-webhook
  namespace: hermes2
  labels:
    app: alertmanager-incident-webhook
spec:
  replicas: 1
  selector:
    matchLabels:
      app: alertmanager-incident-webhook
  template:
    metadata:
      labels:
        app: alertmanager-incident-webhook
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: adapter
          image: python:3.13-slim
          imagePullPolicy: IfNotPresent
          command: ["python", "/adapter/adapter.py"]
          env:
            - name: PORT
              value: "9090"
            - name: HERMES_WEBHOOK_URL
              value: "http://hermes2-incident-response-webhook:8644/webhooks/incident-alerts"
            - name: WEBHOOK_SECRET
              valueFrom:
                secretKeyRef:
                  name: alertmanager-incident-webhook
                  key: WEBHOOK_SECRET
            - name: ALERTMANAGER_BEARER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: alertmanager-incident-webhook
                  key: ALERTMANAGER_BEARER_TOKEN
          ports:
            - name: http
              containerPort: 9090
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 20
          resources:
            requests:
              cpu: 20m
              memory: 32Mi
            limits:
              cpu: 200m
              memory: 128Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: adapter
              mountPath: /adapter
              readOnly: true
      volumes:
        - name: adapter
          configMap:
            name: alertmanager-incident-webhook
---
apiVersion: v1
kind: Service
metadata:
  name: alertmanager-incident-webhook
  namespace: hermes2
  labels:
    app: alertmanager-incident-webhook
spec:
  type: ClusterIP
  selector:
    app: alertmanager-incident-webhook
  ports:
    - name: http
      port: 9090
      targetPort: http
      protocol: TCP
---
# Allow Prometheus Alertmanager to reach the adapter. Adjust the namespace
# selector to wherever your Alertmanager runs (this cluster: observability).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-alertmanager-to-incident-adapter
  namespace: hermes2
spec:
  podSelector:
    matchLabels:
      app: alertmanager-incident-webhook
  policyTypes: [Ingress]
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: observability
      ports:
        - protocol: TCP
          port: 9090
