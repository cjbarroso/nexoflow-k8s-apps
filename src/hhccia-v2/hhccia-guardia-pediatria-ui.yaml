apiVersion: v1
kind: ServiceAccount
metadata:
  name: hhccia-guardia-pediatria-ui
  namespace: hhccia-v2
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: hhccia-guardia-pediatria-ui
  namespace: hhccia-v2
rules:
  - apiGroups: ["batch"]
    resources: ["jobs"]
    verbs: ["create", "get", "list", "watch", "delete"]
  - apiGroups: ["batch"]
    resources: ["cronjobs"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list"]
  - apiGroups: [""]
    resources: ["pods/log"]
    verbs: ["get"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: hhccia-guardia-pediatria-ui
  namespace: hhccia-v2
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: hhccia-guardia-pediatria-ui
subjects:
  - kind: ServiceAccount
    name: hhccia-guardia-pediatria-ui
    namespace: hhccia-v2
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-guardia-pediatria-ui
  namespace: hhccia-v2
  labels:
    app: hhccia-guardia-pediatria-ui
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hhccia-guardia-pediatria-ui
  template:
    metadata:
      labels:
        app: hhccia-guardia-pediatria-ui
        logs.cjbarroso.com/collect: "true"
    spec:
      serviceAccountName: hhccia-guardia-pediatria-ui
      imagePullSecrets:
        - name: github-auth
      nodeSelector:
        kubernetes.io/hostname: homestation
      securityContext:
        runAsNonRoot: true
        runAsUser: 10001
        fsGroup: 10001
        seccompProfile: { type: RuntimeDefault }
      containers:
        - name: ui
          image: ghcr.io/irupe-consultores/hhccia-guardia-pediatria-ui:d6aa0d2ee6f42873c214ee5ae86a7b83d240b80d
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            capabilities: { drop: ["ALL"] }
          ports:
            - containerPort: 8080
          env:
            - { name: AUTH_DISABLED, value: "false" }
            - { name: ACCESS_GROUP, value: "hhccia-prestaciones" }
            - { name: PUBLIC_BASE_URL, value: "https://guardia-pediatria.irupeconsultores.com" }
            - { name: OIDC_AUTHORIZE_URL, value: "https://auth.irupeconsultores.com/application/o/authorize/" }
            - { name: OIDC_TOKEN_URL, value: "http://authentik-server.authentik.svc.cluster.local/application/o/token/" }
            - { name: OIDC_JWKS_URL, value: "http://authentik-server.authentik.svc.cluster.local/application/o/hhccia-prestaciones/jwks/" }
            - { name: AUTHENTIK_ISSUER, value: "http://authentik-server.authentik.svc.cluster.local/application/o/hhccia-prestaciones/" }
            - name: OIDC_CLIENT_ID
              valueFrom: { secretKeyRef: { name: hhccia-prestaciones-ui-oidc, key: OIDC_CLIENT_ID } }
            - name: OIDC_CLIENT_SECRET
              valueFrom: { secretKeyRef: { name: hhccia-prestaciones-ui-oidc, key: OIDC_CLIENT_SECRET } }
            - name: SESSION_SECRET
              valueFrom: { secretKeyRef: { name: hhccia-prestaciones-ui-oidc, key: SESSION_SECRET } }
            - { name: K8S_NAMESPACE, value: "hhccia-v2" }
            - { name: SOURCE_CRONJOB, value: "hhccia-guardia-pediatria-export-weekly" }
            - { name: OUTPUT_DIR, value: "/out" }
            - { name: GOOGLE_APPLICATION_CREDENTIALS, value: "/app/sa-key.json" }
            - { name: GOOGLE_IMPERSONATE_USER, value: "irupebot@cjbarroso.com" }
            - { name: GOOGLE_SPREADSHEET_ID, value: "1lq7xtf8yKfFldkKnuTwEveq5x6M4CDenYYVb-m0fw8Q" }
            - { name: GOOGLE_SHEET_NAME, value: "Datos" }
            - { name: LOG_LEVEL, value: "INFO" }
          readinessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet: { path: /health, port: 8080 }
            initialDelaySeconds: 15
            periodSeconds: 20
          volumeMounts:
            - { name: out, mountPath: /out, readOnly: true }
            - name: gdrive-credentials
              mountPath: /app/sa-key.json
              subPath: sa-key.json
              readOnly: true
          resources:
            requests: { cpu: 25m, memory: 128Mi }
            limits: { cpu: 500m, memory: 256Mi }
      volumes:
        - name: out
          persistentVolumeClaim:
            claimName: hhccia-guardia-pediatria-export-out
        - name: gdrive-credentials
          secret:
            secretName: hhccia-prestaciones-ui-gdrive
---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-guardia-pediatria-ui
  namespace: hhccia-v2
spec:
  selector:
    app: hhccia-guardia-pediatria-ui
  ports:
    - { protocol: TCP, port: 8080, targetPort: 8080 }
  type: ClusterIP
