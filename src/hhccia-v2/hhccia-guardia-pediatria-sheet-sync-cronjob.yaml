# Sunday 23:00 year-to-date refresh of the target Google Sheet. Both FEC and
# FCG default to Jan 1 through source-local now; origin is C, service is blank.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hhccia-guardia-pediatria-sheet-sync
  namespace: hhccia-v2
  labels:
    app: hhccia-guardia-pediatria-export
spec:
  timeZone: America/Argentina/Buenos_Aires
  schedule: "0 23 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: hhccia-guardia-pediatria-export
            role: exporter
            component: sheet-sync
            logs.cjbarroso.com/collect: "true"
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: github-auth
          nodeSelector:
            kubernetes.io/hostname: homestation
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
            seccompProfile: { type: RuntimeDefault }
          initContainers:
            - name: export-year-to-date
              image: ghcr.io/irupe-consultores/hhccia-guardia-pediatria-export:bfa3d982c3954616a100c7ae3b8d1afefcd05c72
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              env:
                - { name: MSSQL_HOST, value: "192.168.5.132" }
                - { name: MSSQL_PORT, value: "1433" }
                - { name: MSSQL_DATABASE, value: "SRN" }
                - name: MSSQL_USER
                  valueFrom: { secretKeyRef: { name: hhccia-prestaciones-export-db, key: MSSQL_USER } }
                - name: MSSQL_PASSWORD
                  valueFrom: { secretKeyRef: { name: hhccia-prestaciones-export-db, key: MSSQL_PASSWORD } }
                - { name: SOURCE_TIMEZONE, value: "America/Argentina/Buenos_Aires" }
                - { name: ORIGEN, value: "C" }
                - { name: OUT_DIR, value: "/out" }
                - { name: LOG_LEVEL, value: "INFO" }
              volumeMounts:
                - { name: out, mountPath: /out }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: 500m, memory: 512Mi }
          containers:
            - name: update-sheet
              image: ghcr.io/irupe-consultores/hhccia-guardia-pediatria-ui:d6aa0d2ee6f42873c214ee5ae86a7b83d240b80d
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.weekly_sync"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              env:
                - { name: OUTPUT_DIR, value: "/out" }
                - { name: GOOGLE_APPLICATION_CREDENTIALS, value: "/app/sa-key.json" }
                - { name: GOOGLE_IMPERSONATE_USER, value: "irupebot@cjbarroso.com" }
                - { name: GOOGLE_SPREADSHEET_ID, value: "1lq7xtf8yKfFldkKnuTwEveq5x6M4CDenYYVb-m0fw8Q" }
                - { name: GOOGLE_SHEET_NAME, value: "Datos" }
                - { name: LOG_LEVEL, value: "INFO" }
              volumeMounts:
                - { name: out, mountPath: /out, readOnly: true }
                - name: gdrive-credentials
                  mountPath: /app/sa-key.json
                  subPath: sa-key.json
                  readOnly: true
              resources:
                requests: { cpu: 25m, memory: 128Mi }
                limits: { cpu: 500m, memory: 256Mi }
          volumes:
            - name: out
              persistentVolumeClaim:
                claimName: hhccia-guardia-pediatria-export-out
            - name: gdrive-credentials
              secret:
                secretName: hhccia-prestaciones-ui-gdrive
