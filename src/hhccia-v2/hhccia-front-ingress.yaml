# Exposes the v2 frontend via the Cloudflare tunnel under two hostnames:
#   - hhccia-v2.cjbarroso.com        (cjbarroso.com zone)
#   - medaudit.irupeconsultores.com  (irupeconsultores.com zone, same CF account)
# Both zones are reachable by the controller's account-scoped API token, so the
# DNS CNAMEs are auto-created. The Angular SPA derives its OIDC redirect from
# window.location.origin, so the new host's /callback must also be allowlisted
# in the Authentik provider blueprint (src/authentik/blueprints.yaml).
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: hhccia-front-ingress
  namespace: hhccia-v2
spec:
  ingressClassName: cloudflare-tunnel
  rules:
    - host: "hhccia-v2.cjbarroso.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hhccia-front
                port:
                  number: 8080
    - host: "medaudit.irupeconsultores.com"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: hhccia-front
                port:
                  number: 8080
