# Read-only Datatech login (n8n) for the prestaciones-export job — least privilege
# (SELECT only), separate from the write-back hhccia-core-secrets. Sealed with the
# in-cluster sealed-secrets controller; safe to commit. To rotate:
#   kubectl -n hhccia-v2 create secret generic hhccia-prestaciones-export-db \
#     --from-literal=MSSQL_USER=n8n --from-literal=MSSQL_PASSWORD=... --dry-run=client -o yaml \
#   | kubeseal --controller-name sealed-secrets-controller --controller-namespace kube-system -o yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hhccia-prestaciones-export-db
  namespace: hhccia-v2
spec:
  encryptedData:
    MSSQL_PASSWORD: 
    MSSQL_USER: 
  template:
    metadata:
      name: hhccia-prestaciones-export-db
      namespace: hhccia-v2
