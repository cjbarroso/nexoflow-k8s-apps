# Datatech source adapter — the only workload with a route/credentials to the
# clinical DB. No Service (event-driven, no inbound HTTP). Establishing the MSSQL
# connection (driver, credentials, tunnel/keepalive) is the adapter's job; the
# cluster only guarantees routing to the MSSQL host exists.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-adapter-datatech
  namespace: hhccia-v2
  labels:
    app: hhccia-adapter-datatech
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the adapter binds durable JetStream consumers
  # ("adapter-changes", "adapter-refresh"). Two overlapping pods fight over them
  # and the new one crashes with "consumer is already bound to a subscription".
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hhccia-adapter-datatech
  template:
    metadata:
      labels:
        app: hhccia-adapter-datatech
        logs.cjbarroso.com/collect: "true"   # opt in to log aggregation
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: github-auth
      containers:
        - name: adapter
          image: ghcr.io/irupe-consultores/hhccia-adapter-datatech:latest
          imagePullPolicy: Always
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: SOURCE_SYSTEM
              value: "datatech"
            # Real Datatech path. The cluster reaches 192.168.5.132 on the LAN
            # (homestation node lives in that network); no SSH tunnel sidecar.
            # Incremental discovery: a persisted watermark (max FEC, in NATS KV)
            # drives the window, so polls/restarts no longer re-scan everything.
            # LOOKBACK is the *bootstrap-only* window (first run, no watermark
            # yet). Now pointed at the live SRN production DB (was SRNMULETO, a
            # pristine copy, until 2026-05-31), so the window backfills real data.
            # OVERLAP re-includes recent rows each poll (idempotency dedupes).
            # DISCOVERY_LIMIT is a per-poll paging cap (watermark advances only
            # to the max FEC emitted, so it never drops rows).
            - name: SOURCE_MODE
              value: "datatech"
            # Window is relative to "now". On live SRN, data is current, so a
            # ~30h lookback covers recent in-scope records; DISCOVERY_LIMIT=10
            # (earliest-first) caps each poll batch. Operator widens/changes per
            # environment.
            - name: DISCOVERY_LOOKBACK_HOURS
              value: "30"
            - name: DISCOVERY_OVERLAP_MINUTES
              value: "60"
            - name: DISCOVERY_LIMIT
              value: "10"
            - name: POLL_INTERVAL_SECONDS
              value: "300"
            - name: MSSQL_HOST
              value: "192.168.5.132"
            - name: MSSQL_PORT
              value: "1433"
            - name: MSSQL_DATABASE
              value: "SRN"
            - name: MSSQL_USER
              valueFrom: { secretKeyRef: { name: hhccia-core-secrets, key: MSSQL_USER } }
            - name: MSSQL_PASSWORD
              valueFrom: { secretKeyRef: { name: hhccia-core-secrets, key: MSSQL_PASSWORD } }
