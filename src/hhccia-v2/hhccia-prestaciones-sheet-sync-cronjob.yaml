# Weekly year-to-date refresh of the Google Sheet `Datos` tab.
# The init container exports Datatech to CSV; only on success does the main
# container apply the same projection/upload logic used by the UI button.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: hhccia-prestaciones-sheet-sync
  namespace: hhccia-v2
  labels:
    app: hhccia-prestaciones-export
spec:
  timeZone: America/Argentina/Buenos_Aires
  # Sundays at 23:00 local time.
  schedule: "0 23 * * 0"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 2
      activeDeadlineSeconds: 3600
      template:
        metadata:
          labels:
            app: hhccia-prestaciones-export
            role: exporter
            component: sheet-sync
            logs.cjbarroso.com/collect: "true"
        spec:
          restartPolicy: OnFailure
          automountServiceAccountToken: false
          imagePullSecrets:
            - name: github-auth
          nodeSelector:
            kubernetes.io/hostname: homestation
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            fsGroup: 10001
            seccompProfile: { type: RuntimeDefault }
          initContainers:
            - name: export-year-to-date
              image: ghcr.io/irupe-consultores/hhccia-prestaciones-export:cc06eb8de06b2afbb8d8c672b3e25acb0146872e
              imagePullPolicy: IfNotPresent
              command: ["/bin/sh", "-c"]
              args:
                - 'export DATE_FROM="$(TZ=America/Argentina/Buenos_Aires date +%Y)-01-01"; exec python -m export.main'
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              env:
                - { name: MSSQL_HOST, value: "192.168.5.132" }
                - { name: MSSQL_PORT, value: "1433" }
                - { name: MSSQL_DATABASE, value: "SRN" }
                - name: MSSQL_USER
                  valueFrom: { secretKeyRef: { name: hhccia-prestaciones-export-db, key: MSSQL_USER } }
                - name: MSSQL_PASSWORD
                  valueFrom: { secretKeyRef: { name: hhccia-prestaciones-export-db, key: MSSQL_PASSWORD } }
                - name: GEMINI_API_KEY
                  valueFrom: { secretKeyRef: { name: hhccia-core-secrets, key: GEMINI_API_KEY } }
                - { name: GEMINI_MODEL, value: "gemini-3.1-flash-lite" }
                - { name: GEMINI_BATCH_SIZE, value: "100" }
                - { name: GEMINI_TIMEOUT_SECONDS, value: "90" }
                - { name: SOURCE_TIMEZONE, value: "America/Argentina/Buenos_Aires" }
                - { name: CODES, value: "070864,145001,145002,145005,380103,430109,431205,450201,450301,450501,450503,450701" }
                - { name: ORIGENES, value: "Q,q,N,J,j" }
                - { name: SERVICIOS, value: "OH,ON,on" }
                - { name: OUT_DIR, value: "/out" }
                - { name: LOG_LEVEL, value: "INFO" }
              volumeMounts:
                - { name: out, mountPath: /out }
              resources:
                requests: { cpu: 50m, memory: 128Mi }
                limits: { cpu: 500m, memory: 512Mi }
          containers:
            - name: update-sheet
              image: ghcr.io/irupe-consultores/hhccia-prestaciones-ui:5c7da4700e7e1adfaa73e1c7d3ee1bcd03e21217
              imagePullPolicy: IfNotPresent
              command: ["python", "-m", "app.weekly_sync"]
              securityContext:
                allowPrivilegeEscalation: false
                capabilities: { drop: ["ALL"] }
              env:
                - { name: OUTPUT_DIR, value: "/out" }
                - { name: GOOGLE_APPLICATION_CREDENTIALS, value: "/app/sa-key.json" }
                - { name: GOOGLE_IMPERSONATE_USER, value: "irupebot@cjbarroso.com" }
                - { name: GOOGLE_SPREADSHEET_ID, value: "1wj3lGy_erzwSomNXhuVcyfDHLuk1Bxhaa6ySNHIUIpE" }
                - { name: GOOGLE_SHEET_NAME, value: "Datos" }
                - { name: LOG_LEVEL, value: "INFO" }
              volumeMounts:
                - { name: out, mountPath: /out, readOnly: true }
                - name: gdrive-credentials
                  mountPath: /app/sa-key.json
                  subPath: sa-key.json
                  readOnly: true
              resources:
                requests: { cpu: 25m, memory: 128Mi }
                limits: { cpu: 500m, memory: 256Mi }
          volumes:
            - name: out
              persistentVolumeClaim:
                claimName: hhccia-prestaciones-export-out
            - name: gdrive-credentials
              secret:
                secretName: hhccia-prestaciones-ui-gdrive
