# Frontend (Angular) for HHCCIA v2 — same image as the live v1 front, runtime-
# switched into v2 mode via CORE_API_URL. The CoreApiService kicks in only when
# CORE_API_URL is non-empty; with that set, ListService delegates all four
# endpoints to the core API instead of the legacy n8n webhooks.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-front
  namespace: hhccia-v2
  labels:
    app: hhccia-front
spec:
  # 2 replicas: stateless static server — rolling updates with zero downtime
  # even on the single node (one pod always serving while the other rolls).
  replicas: 2
  selector:
    matchLabels:
      app: hhccia-front
  template:
    metadata:
      labels:
        app: hhccia-front
        logs.cjbarroso.com/collect: "true"   # opt in to log aggregation
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: github-auth
      containers:
        - name: hhccia-front
          # Pinned to the git SHA of the last successful publish run (main).
          # To deploy a new build: update this tag to the new commit SHA and let Argo sync.
          image: ghcr.io/irupe-consultores/hhccia-front:c5c8803209b0fc072c63b3f53eb669f1d082a78e
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            # Legacy webhook (unused while CORE_API_URL is set — kept consistent
            # so any leak doesn't accidentally hit the live v1 backend).
            - name: API_URL
              value: "https://api-medaudit.irupeconsultores.com"
            # The switch that flips ListService -> CoreApiService.
            - name: CORE_API_URL
              value: "https://api-medaudit.irupeconsultores.com"
            # OIDC against self-hosted Authentik (replaces the old Clerk integration).
            - name: AUTHENTIK_AUTHORITY
              value: "https://auth.irupeconsultores.com/application/o/hhccia/"
            - name: AUTHENTIK_CLIENT_ID
              value: "hhccia-front"
          # Static SPA server (server.js): every path answers 200 with a file
          # or the index.html fallback, so GET / is a valid probe target.
          readinessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 3
            periodSeconds: 10
            timeoutSeconds: 3
          livenessProbe:
            httpGet: { path: /, port: 8080 }
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          # Sized from observed usage (~9Mi / ~0 CPU, 2026-06-11) — it only
          # serves static files; Node needs a little memory floor.
          resources:
            requests: { cpu: 10m, memory: 32Mi }
            limits: { cpu: 200m, memory: 128Mi }
---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-front
  namespace: hhccia-v2
  labels:
    app: hhccia-front
spec:
  selector:
    app: hhccia-front
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
---
# Inert until a second node exists (voluntary evictions on the only node take
# the whole cluster anyway), but correct from day one of multi-node.
apiVersion: policy/v1
kind: PodDisruptionBudget
metadata:
  name: hhccia-front
  namespace: hhccia-v2
spec:
  minAvailable: 1
  selector:
    matchLabels:
      app: hhccia-front
