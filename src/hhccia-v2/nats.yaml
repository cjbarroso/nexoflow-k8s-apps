# NATS with JetStream — the event bus for the HHCCIA v2 pipeline.
# Test-grade: JetStream uses an emptyDir (no durability across pod restarts).
# For production, switch to the official NATS Helm chart with a PVC / file store.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: nats
  namespace: hhccia-v2
  labels:
    app: nats
spec:
  replicas: 1
  selector:
    matchLabels:
      app: nats
  template:
    metadata:
      labels:
        app: nats
    spec:
      automountServiceAccountToken: false
      containers:
        - name: nats
          image: nats:2.10-alpine
          args: ["-js", "-sd", "/data", "-m", "8222"]
          ports:
            - { containerPort: 4222, name: client }
            - { containerPort: 8222, name: monitor }
          volumeMounts:
            - { name: js, mountPath: /data }
      volumes:
        - name: js
          emptyDir: {}
---
apiVersion: v1
kind: Service
metadata:
  name: nats
  namespace: hhccia-v2
  labels:
    app: nats
spec:
  selector:
    app: nats
  ports:
    - { name: client, port: 4222, targetPort: 4222 }
    - { name: monitor, port: 8222, targetPort: 8222 }
  type: ClusterIP
