# SealedSecret for hhccia-core-secrets, encrypted with the in-cluster
# sealed-secrets controller (kube-system) public key. Safe to commit.
# The managed annotation lets the controller adopt the pre-existing
# out-of-band Secret of the same name. To rotate a value, regenerate:
#   kubectl -n hhccia-v2 get secret hhccia-core-secrets -o yaml \
#     | kubeseal --controller-name sealed-secrets-controller \
#       --controller-namespace kube-system -o yaml
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  annotations:
    sealedsecrets.bitnami.com/managed: "true"
  name: hhccia-core-secrets
  namespace: hhccia-v2
spec:
  encryptedData:
    DATABASE_URL: 
    GEMINI_API_KEY: 
    MSSQL_PASSWORD: 
    MSSQL_USER: 
    PG_PASSWORD: 
    PG_USER: 
  template:
    metadata:
      name: hhccia-core-secrets
      namespace: hhccia-v2
    type: Opaque
