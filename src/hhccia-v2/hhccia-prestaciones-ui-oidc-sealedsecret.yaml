# OIDC client (authentik-generated for hhccia-prestaciones-provider) + session secret
# for the prestaciones-export UI. Sealed; safe to commit. Rotate: regenerate the
# client secret in the authentik admin UI, then re-seal the three keys.
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: hhccia-prestaciones-ui-oidc
  namespace: hhccia-v2
spec:
  encryptedData:
    OIDC_CLIENT_ID: 
    OIDC_CLIENT_SECRET: 
    SESSION_SECRET: 
  template:
    metadata:
      name: hhccia-prestaciones-ui-oidc
      namespace: hhccia-v2
