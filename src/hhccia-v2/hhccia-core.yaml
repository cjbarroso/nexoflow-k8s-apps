# AI Core Service — source-agnostic. Owns its store + REST API; the UI calls it.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-core
  namespace: hhccia-v2
  labels:
    app: hhccia-core
spec:
  replicas: 1
  # Recreate (not RollingUpdate): the core binds a single durable JetStream
  # consumer ("core-ingestor"). Two overlapping pods fight over it and the new
  # one crashes with "consumer is already bound to a subscription".
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hhccia-core
  template:
    metadata:
      labels:
        app: hhccia-core
        logs.cjbarroso.com/collect: "true"   # opt in to log aggregation
      annotations:
        # Prometheus auto-discovers via these annotations (same as nats-exporter).
        # The metrics server is a SEPARATE in-cluster port (app METRICS_PORT) —
        # deliberately not on :8000, which is published through the public ingress.
        prometheus.io/scrape: "true"
        prometheus.io/port: "9100"
        prometheus.io/path: "/metrics"
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: github-auth
      containers:
        - name: hhccia-core
          # Pinned to the git SHA of the last successful publish run (main).
          # To deploy a new build: update this tag to the new commit SHA and let Argo sync.
          image: ghcr.io/irupe-consultores/hhccia-core:108185a176f0cf4fe37123a5aaf4e3f9359a2a19
          imagePullPolicy: IfNotPresent
          ports:
            - { containerPort: 8000, name: http }
            - { containerPort: 9100, name: metrics }   # Prometheus scrape (cluster-internal)
          env:
            - name: NATS_URL
              value: "nats://nats:4222"
            - name: AI_MODE
              value: "gemini"          # real Gemini; requires GEMINI_API_KEY in hhccia-core-secrets
            - name: GEMINI_MODEL
              value: "gemini-3.5-flash"
            # Small/fast model for the /text-edit voice editor (reuses GEMINI_API_KEY).
            # Rolling alias: always the latest flash-lite without a manual bump.
            - name: VOICE_EDIT_MODEL
              value: "gemini-flash-lite-latest"
            - name: DATABASE_URL
              valueFrom: { secretKeyRef: { name: hhccia-core-secrets, key: DATABASE_URL } }
            - name: GEMINI_API_KEY
              valueFrom: { secretKeyRef: { name: hhccia-core-secrets, key: GEMINI_API_KEY } }
            # OIDC enforcement. Authentik is live, the hhccia OIDC app is
            # configured. Discovery uses /jwks/ (not /.well-known/jwks.json),
            # so AUTHENTIK_JWKS_URL is pinned explicitly.
            - name: AUTH_DISABLED
              value: "false"
            - name: AUTHENTIK_ISSUER
              value: "https://auth.irupeconsultores.com/application/o/hhccia/"
            # In-cluster JWKS lookup — going out through the Cloudflare tunnel
            # gets 403'd because the Python default User-Agent is filtered.
            # The `iss` claim in the JWT is still checked against AUTHENTIK_ISSUER
            # (the public URL); JWKS is just how we fetch the signing keys.
            - name: AUTHENTIK_JWKS_URL
              value: "http://authentik-server.authentik.svc.cluster.local/application/o/hhccia/jwks/"
            # Self-service user preferences (PATCH /me/profile) writes the user's
            # own name/prf/service back to Authentik via its MANAGEMENT API (the
            # reverse direction of the JWKS validation above). AUTHENTIK_API_TOKEN
            # is a service-account token scoped to core.view_user + core.change_user,
            # sealed into hhccia-core-secrets. `optional: true` so the pod still boots
            # BEFORE the token is sealed — until then /me/profile is read-only and a
            # write answers 503 (see app/authentik_client.configured()). The
            # authentik NetworkPolicy already allows hhccia-v2 -> authentik-server:9000.
            - name: AUTHENTIK_API_URL
              value: "http://authentik-server.authentik.svc.cluster.local"
            - name: AUTHENTIK_API_TOKEN
              valueFrom:
                secretKeyRef: { name: hhccia-core-secrets, key: AUTHENTIK_API_TOKEN, optional: true }
            # SER codes a user may self-assign (case-sensitive; "IN" != "in"). Keep
            # in sync with the adapter SERVICES_IN_SCOPE + the signup radio choices.
            - name: PROFILE_ALLOWED_SERVICES
              value: "TI,IN,in"
          # Readiness verifies the dependencies (Postgres SELECT 1 + NATS
          # connected): a pod that boots before them, or loses them, is pulled
          # from the Service instead of answering 500s.
          readinessProbe:
            httpGet: { path: /health/ready, port: 8000 }
            initialDelaySeconds: 5
            periodSeconds: 10
            timeoutSeconds: 5
          # Liveness restarts a wedged process. /health is a cheap in-process
          # check; failureThreshold*period = 60s of grace before the kill, so a
          # slow Gemini call can't trigger a restart (probes have their own
          # connection, but keep thresholds conservative on a Recreate deploy).
          livenessProbe:
            httpGet: { path: /health, port: 8000 }
            initialDelaySeconds: 15
            periodSeconds: 20
            timeoutSeconds: 5
            failureThreshold: 3
          # Sized from observed usage (~165Mi / ~0 CPU idle, 2026-06-11) with
          # headroom for document batches + Gemini calls. Guaranteed-ish QoS:
          # without requests this is the first pod evicted under node pressure.
          resources:
            requests: { cpu: 100m, memory: 256Mi }
            limits: { cpu: "1", memory: 1Gi }
---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-core
  namespace: hhccia-v2
  labels:
    app: hhccia-core
spec:
  selector:
    app: hhccia-core
  ports:
    - { protocol: TCP, port: 8000, targetPort: 8000 }
  type: ClusterIP
