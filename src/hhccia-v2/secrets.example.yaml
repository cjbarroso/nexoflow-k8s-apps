# PLACEHOLDER secret — DO NOT COMMIT REAL VALUES.
#
# Replace every REPLACE_ME before syncing, and prefer a real secret manager
# (sealed-secrets / vault) over a plain Secret in Git. This file is named
# `.example` and is intentionally NOT applied by Argo (the v2 app excludes it
# via the directory include below). Copy to `secrets.yaml` (gitignored) or wire
# a SealedSecret named `hhccia-core-secrets`.
#
# Keep PG_PASSWORD consistent between postgres.yaml (the pg pod) and DATABASE_URL.
apiVersion: v1
kind: Secret
metadata:
  name: hhccia-core-secrets
  namespace: hhccia-v2
type: Opaque
stringData:
  PG_USER: "hhccia"
  PG_PASSWORD: "REPLACE_ME"
  DATABASE_URL: "postgresql+asyncpg://hhccia:REPLACE_ME@hhccia-core-pg:5432/hhccia_core"
  # AI engine (set AI_MODE=gemini in the core deployment to use it)
  GEMINI_API_KEY: "REPLACE_ME"
  # Real Datatech (adapter, SOURCE_MODE=datatech)
  MSSQL_USER: "REPLACE_ME"
  MSSQL_PASSWORD: "REPLACE_ME"
