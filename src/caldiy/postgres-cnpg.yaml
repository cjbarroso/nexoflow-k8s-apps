# Cal.diy's database — CloudNativePG operator-managed cluster, same pattern as
# src/planka/postgres-cnpg.yaml and src/authentik/postgres-cnpg.yaml.
#
# Uses a known bootstrap password (SealedSecret `caldiy-db-bootstrap` in this
# directory) so the Helm chart's `secretRef: caldiy` can build DATABASE_URL
# from the same credentials — the calcom chart reads EVERYTHING from one secret
# and has no existingDburlSecret / separate-DB-cred mechanism.
#
# 1 primary + 1 hot standby (streaming replication), continuous WAL archiving to
# R2 (PITR) + daily base backup.
apiVersion: postgresql.cnpg.io/v1
kind: Cluster
metadata:
  name: caldiy-db
  namespace: caldiy
spec:
  instances: 2
  imageName: ghcr.io/cloudnative-pg/postgresql:16
  primaryUpdateStrategy: unsupervised
  inheritedMetadata:
    labels:
      logs.cjbarroso.com/collect: "true"
    annotations:
      prometheus.io/scrape: "true"
      prometheus.io/port: "9187"
      prometheus.io/path: "/metrics"
      backup.velero.io/backup-volumes-excludes: pgdata
  affinity:
    enablePodAntiAffinity: true
  resources:
    requests: { cpu: 100m, memory: 256Mi }
    limits: { memory: 1Gi }
  plugins:
    - name: barman-cloud.cloudnative-pg.io
      isWALArchiver: true
      parameters:
        barmanObjectName: caldiy-db-store
  bootstrap:
    initdb:
      database: caldiy
      owner: caldiy
      # Known credentials from SealedSecret `caldiy-db-bootstrap` — the same
      # password goes into the `caldiy` Secret's DATABASE_URL.
      secret:
        name: caldiy-db-bootstrap
      encoding: UTF8
      localeCollate: C
      localeCType: C
  storage:
    size: 5Gi
    storageClass: local-path
---
# Backups: R2 bucket `velero-backups`, prefix `cnpg/caldiy-db` (same bucket-scoped
# R2 token as the other backup systems). Credentials from the SealedSecret
# `caldiy-db-backup-creds`.
apiVersion: barmancloud.cnpg.io/v1
kind: ObjectStore
metadata:
  name: caldiy-db-store
  namespace: caldiy
spec:
  retentionPolicy: "30d"
  configuration:
    destinationPath: s3://velero-backups/cnpg/caldiy-db
    endpointURL: https://77df3d66af9eb572fe180d800d44127b.r2.cloudflarestorage.com
    s3Credentials:
      accessKeyId:
        name: caldiy-db-backup-creds
        key: accessKeyId
      secretAccessKey:
        name: caldiy-db-backup-creds
        key: secretAccessKey
    wal:
      compression: gzip
    data:
      compression: gzip
---
apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: caldiy-db-daily
  namespace: caldiy
spec:
  # 6-field CNPG cron: 04:00:00 daily — staggered after planka (03:45).
  schedule: "0 0 4 * * *"
  backupOwnerReference: self
  immediate: true
  cluster:
    name: caldiy-db
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
