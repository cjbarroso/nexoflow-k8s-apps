# Network segmentation for the caldiy namespace. Default-deny ingress, then only
# the flows the app actually uses. Same pattern as src/planka/networkpolicies.yaml
# (kube-router enforcement on this single-node k3s; kubelet probes arrive from the
# CNI bridge 10.42.0.1; PSS labels surface stricter-profile violations).
#
# Egress is intentionally unrestricted: Cal.com resolves and reaches external
# services (calendar providers, email, OIDC, etc.) over the public internet,
# whose IPs cannot be pinned in a NetworkPolicy.
apiVersion: v1
kind: Namespace
metadata:
  name: caldiy
  annotations:
    # Never let an Argo prune delete the namespace (and everything in it).
    argocd.argoproj.io/sync-options: Prune=false
  labels:
    pod-security.kubernetes.io/enforce: baseline
    pod-security.kubernetes.io/warn: restricted
    pod-security.kubernetes.io/audit: restricted
---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: default-deny-ingress
  namespace: caldiy
spec:
  podSelector: {}
  policyTypes: [Ingress]
---
# Cal.com <-> CNPG (5432), CNPG replication between instances.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-intra-namespace
  namespace: caldiy
spec:
  podSelector: {}
  ingress:
    - from:
        - podSelector: {}
---
# Kubelet readiness/liveness probes (seen by pods as the CNI bridge IP).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-kubelet-probes
  namespace: caldiy
spec:
  podSelector: {}
  ingress:
    - from:
        - ipBlock: { cidr: 10.42.0.1/32 }
---
# Cloudflare tunnel connectors terminate caldiy.irupeconsultores.com and connect
# straight to the Cal.com web pods on 80 — and only to them (a compromised
# connector must not reach Postgres directly).
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-tunnel-to-web
  namespace: caldiy
spec:
  podSelector:
    matchLabels: { app.kubernetes.io/name: calcom }
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: cloudflared }
      ports:
        - { protocol: TCP, port: 80 }
---
# Prometheus scrapes the CNPG instance metrics.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: caldiy
spec:
  podSelector: {}
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: observability }
      ports:
        - { protocol: TCP, port: 9187 }
---
# The CNPG operator manages the database pods via their status port.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-cnpg-operator
  namespace: caldiy
spec:
  podSelector:
    matchLabels: { cnpg.io/cluster: caldiy-db }
  ingress:
    - from:
        - namespaceSelector:
            matchLabels: { kubernetes.io/metadata.name: cnpg-system }
      ports:
        - { protocol: TCP, port: 8000 }
