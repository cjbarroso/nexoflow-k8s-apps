apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-front
  namespace: hhccia
  labels:
    app: hhccia-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hhccia-front
  template:
    metadata:
      labels:
        app: hhccia-front
    spec:
      automountServiceAccountToken: false
      imagePullSecrets:
        - name: github-auth
      containers:
        - name: hhccia-front
          # Pinned to the last commit BEFORE the Clerk -> Authentik migration
          # (cf86124 = entrypoint forwards CORE_API_URL, still has Clerk).
          # The v2 deployment in hhccia-v2 ns uses `:latest` and is the place
          # to validate new front builds. Move v1 forward only when its env
          # vars (AUTHENTIK_AUTHORITY etc.) are also set on this deployment.
          image: ghcr.io/irupe-consultores/hhccia-front:cf86124ae14f064e696e3d428733183ffde1ce08
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              name: http
          env:
            - name: API_URL
              value: "https://flow.cjbarroso.com/webhook/HHCCIA"
            - name: CLERK_PUBLISHABLE_KEY
              value: "pk_test_Z2VudGxlLWZsZWEtMzcuY2xlcmsuYWNjb3VudHMuZGV2JA"
---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-front
  namespace: hhccia
  labels:
    app: hhccia-front
spec:
  selector:
    app: hhccia-front
  ports:
    - protocol: TCP
      port: 8080
      targetPort: 8080
  type: ClusterIP
