apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-front
  namespace: hhccia
  labels:
    app: hhccia-front
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hhccia-front
  template:
    metadata:
      labels:
        app: hhccia-front
    spec:
      imagePullSecrets:
        - name: github-auth
      containers:
        - name: hhccia-front
          image: ghcr.io/irupe-consultores/hhccia-front:093e29899421e9933b23e9e15eeb2c23e3cdebaf
          ports:
            - containerPort: 80
              name: http
---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-front
  namespace: hhccia
  labels:
    app: hhccia-front
spec:
  selector:
    app: hhccia-front
  ports:
    - protocol: TCP
      port: 80
      targetPort: 80
  type: ClusterIP
