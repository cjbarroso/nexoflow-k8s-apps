apiVersion: v1
kind: Secret
metadata:
  name: pgadmin-secret
  namespace: hhccia
type: Opaque
stringData:
  # IMPORTANT: Change these default credentials for pgAdmin login
  PGADMIN_DEFAULT_EMAIL: "admin@example.com"
  PGADMIN_DEFAULT_PASSWORD: "caquita00"

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgadmin-config
  namespace: hhccia
data:
  # This startup script securely configures the database connection for pgAdmin
  setup.sh: |
    #!/bin/sh
    set -e

    PGPASS_FILE="/var/lib/pgadmin/pgpassfile"

    # Read the database password from the secret mounted by Kubernetes
    DB_PASSWORD=$(cat /etc/pgpass/password)

    # Create the pgpass file required by pgAdmin for password-less login
    # Format: hostname:port:database:username:password
    echo "hhccia-cluster-rw.hhccia.svc.cluster.local:5432:*:app:${DB_PASSWORD}" > ${PGPASS_FILE}

    # Set strict permissions on the pgpass file for security
    chmod 600 ${PGPASS_FILE}

    # Copy the pre-configured server list to a writable location
    cp /etc/pgadmin/servers.json /var/lib/pgadmin/servers.json

    # Ensure the pgadmin user owns all its files
    # chown -R pgadmin:pgadmin /var/lib/pgadmin

    # Execute the original pgAdmin entrypoint
    exec /entrypoint.sh

  # This JSON file tells pgAdmin which database server to connect to on startup.
  servers.json: |
    {
      "Servers": {
        "1": {
          "Name": "hhccia-cluster",
          "Group": "Databases",
          "Host": "hhccia-cluster-rw.hhccia.svc.cluster.local",
          "Port": 5432,
          "MaintenanceDB": "app",
          "Username": "app",
          "PassFile": "/var/lib/pgadmin/pgpassfile",
          "SSLMode": "prefer"
        }
      }
    }

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: hhccia-cluster-pgadmin
  namespace: hhccia
spec:
  replicas: 1
  selector:
    matchLabels:
      app: pgadmin
  template:
    metadata:
      labels:
        app: pgadmin
    spec:
      containers:
      - name: pgadmin
        image: dpage/pgadmin4:8 # Using a specific, recent version is recommended
        envFrom:
        - secretRef:
            name: pgadmin-secret
        command: ["/bin/sh", "/etc/pgadmin/setup.sh"]
        ports:
        - containerPort: 80
          name: http
        volumeMounts:
        - name: pgadmin-config
          mountPath: /etc/pgadmin
        - name: pg-app-password
          mountPath: /etc/pgpass
          readOnly: true
        - name: pgadmin-data
          mountPath: /var/lib/pgadmin
        resources:
          requests:
            cpu: 100m
            memory: 256Mi
          limits:
            cpu: 500m
            memory: 512Mi
      volumes:
      - name: pgadmin-config
        configMap:
          name: pgadmin-config
          defaultMode: 0755 # Make the setup script executable
      - name: pg-app-password
        secret:
          secretName: hhccia-cluster-app # Secret created by CNPG for the 'app' user
          items:
          - key: password
            path: password
      - name: pgadmin-data
        emptyDir: {} # For persistent settings, replace with a PersistentVolumeClaim

---
apiVersion: v1
kind: Service
metadata:
  name: hhccia-cluster-pgadmin
  namespace: hhccia
spec:
  type: ClusterIP
  selector:
    app: pgadmin
  ports:
  - port: 80
    targetPort: http
    protocol: TCP

