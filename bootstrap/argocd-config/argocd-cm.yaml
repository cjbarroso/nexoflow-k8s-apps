apiVersion: v1
kind: ConfigMap
metadata:
  name: argocd-cm
  namespace: argocd
  labels:
    app.kubernetes.io/name: argocd-cm
    app.kubernetes.io/part-of: argocd
data:
  # Stop Argo CD from tracking Velero's runtime-generated CRs. The Velero Helm
  # chart labels its Schedule with app.kubernetes.io/instance=velero, and Velero
  # copies that label onto every Backup it creates from the schedule. Argo's
  # default (label) tracking then treats each daily Backup as owned by the
  # `velero` app but absent from the desired state -> permanent OutOfSync, and
  # with prune enabled Argo could delete Backups (which deletes backup data in
  # object storage). Excluding only the dynamic kinds keeps Schedule /
  # BackupStorageLocation / VolumeSnapshotLocation under Argo management.
  resource.exclusions: |
    - apiGroups:
      - velero.io
      kinds:
      - Backup
      - Restore
      - PodVolumeBackup
      - PodVolumeRestore
      - BackupRepository
      - DownloadRequest
      - ServerStatusRequest
      - DataUpload
      - DataDownload
      - DeleteBackupRequest
