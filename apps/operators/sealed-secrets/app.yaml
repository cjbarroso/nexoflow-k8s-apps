apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sealed-secrets
  namespace: argocd
spec:
  project: operators
  source:
    repoURL: https://bitnami-labs.github.io/sealed-secrets
    chart: sealed-secrets
    targetRevision: "2.18.6" # controller appVersion 0.37.0
    helm:
      # Name the controller "sealed-secrets-controller" in kube-system so it
      # matches kubeseal's defaults (--controller-namespace kube-system,
      # --controller-name sealed-secrets-controller) — sealing needs no flags.
      values: |
        fullnameOverride: sealed-secrets-controller
  destination:
    server: https://kubernetes.default.svc
    # kube-system (sealed-secrets' upstream default): a brand-new namespace on
    # this single-node k3s wedges the kubelet's kube-root-ca.crt mount, blocking
    # the controller pod. kube-system's CA configmap is long-stable.
    namespace: kube-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
