apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cloudflared
spec:
  project: operators
  sources:
  - repoURL: https://helm.strrl.dev
    chart: cloudflare-tunnel-ingress-controller
    targetRevision: 0.0.23
    helm:
      valueFiles:
      - $values/src/cloudflared/cloudflared-values-production.yaml
  - repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    targetRevision: master
    ref: values
  # Applies the SealedSecret holding the Cloudflare credentials; the chart
  # reads it via cloudflare.secretRef (see the values file).
  - repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    targetRevision: master
    path: src/cloudflared
    directory:
      include: 'cloudflared-api-sealedsecret.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: cloudflared
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
