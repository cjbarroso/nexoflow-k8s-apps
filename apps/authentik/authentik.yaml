apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: authentik
  namespace: argocd
spec:
  project: support
  source:
    repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    path: src/authentik
    targetRevision: master
    directory:
      # The OIDC config export is documentation/backup, not a deployable manifest —
      # keep Argo from trying to apply it.
      exclude: 'authentik-oidc-export.*'
  destination:
    server: https://kubernetes.default.svc
    namespace: authentik
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # No ServerSideApply: with SSA, the CNPG webhook-defaulted Cluster fields
      # are attributed to Argo's field manager and the app reads permanently
      # OutOfSync. Client-side apply (same as hhccia-v2, whose identical CNPG
      # Cluster syncs clean) diffs via last-applied and ignores live-only
      # defaulted fields.
