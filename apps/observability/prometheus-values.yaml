# Prometheus Helm values — the metric store. Deliberately minimal, to match the
# light log stack alongside it (Loki SingleBinary + Alloy). It scrapes node +
# cluster metrics and keeps 15 days.
#
# 3-node cluster (since 2026-07-08): the scrape layer needs no per-node config —
# node-exporter is a DaemonSet (one pod/node) and scraping is endpoint/annotation
# based, so all 3 nodes' node-exporters + kubelets are discovered automatically.
# The Prometheus server itself is still a single replica (not multi-replica HA),
# but its PVC now lives on Longhorn (replicated across the roomy nodes), so on a
# node loss the pod reschedules onto a survivor with its TSDB intact instead of
# dying with homestation. Resources/storage were resized for ~3x the series.
#
# Footprint trims: Pushgateway is OFF; Alertmanager + kube-state-metrics are ON.
# Node CPU/mem/disk comes from the node-exporter DaemonSet; per-pod CPU/mem comes
# from the kubelet/cAdvisor scrape (already wired by the chart's default
# scrape_configs — no extra pod). Helm ignores unknown keys, so the disable-flags
# are safe across minor chart drift.

# --- Trim the optional sub-charts ---
prometheus-pushgateway:
  enabled: false
# Cluster-object metrics (pod restarts, job status, deployment replicas).
# Enabled 2026-06-11: without it a crashlooping pod or a failed backup CronJob
# is invisible to alerting (the `workloads` rules below depend on it). One
# small pod — worth it for a production posture.
kube-state-metrics:
  enabled: true
  resources:
    requests:
      cpu: 10m
      memory: 32Mi
    limits:
      memory: 96Mi

# --- Node metrics: the source of node_cpu_*, node_memory_*, node_filesystem_* ---
# Tiny DaemonSet, one pod per node. Auto-discovered by the server's
# kubernetes-service-endpoints job via the subchart's prometheus.io annotations.
prometheus-node-exporter:
  enabled: true
  resources:
    requests:
      cpu: 20m
      memory: 24Mi
    limits:
      memory: 64Mi

# --- The single Prometheus server ---
# Service `prometheus-server` :80 is the query entrypoint (release name = the Argo
# app name `prometheus`). Datasource URL used by Grafana:
#   http://prometheus-server.observability.svc.cluster.local
server:
  retention: "15d"
  global:
    scrape_interval: 60s          # 60s keeps sample volume (RAM + disk) low
    scrape_timeout: 15s
    evaluation_interval: 60s
  persistentVolume:
    enabled: true
    # Longhorn (replica 2) so the TSDB survives + reschedules on a node loss,
    # instead of being pinned to one node's local-path disk. Sized for a 3-node
    # cluster: ~3x the node/kubelet/cAdvisor series of the old single node.
    storageClass: longhorn
    size: 16Gi                    # was 8Gi (1 node) — 15d retention at ~3x series
  resources:
    requests:
      cpu: 100m
      memory: 400Mi               # was 256Mi
    # ~3x series (3 nodes) + etcd scrape + kube-state pushed head memory past the
    # old 700Mi ceiling. Validate against prometheus_tsdb_head_series and tune.
    limits:
      memory: 1500Mi              # was 700Mi (1 node)
  replicaCount: 1

# --- Extra scrape jobs (appended to the chart's default scrape_configs) ---
# k3s embedded-etcd quorum/leader health for the 3-server control plane. etcd
# metrics are plain HTTP on :2381, but k3s binds them to 127.0.0.1 by default —
# each server needs `etcd-expose-metrics: true` in /etc/rancher/k3s/config.yaml
# (rebinds to 0.0.0.0:2381, no auth/TLS), applied one node at a time with a k3s
# restart. ENABLE THAT ON THE NODES BEFORE MERGING THIS, or the k3s-etcd targets
# scrape 0 until they're reachable (the etcd alerts below are absent-safe, so they
# won't false-fire, but the targets show DOWN). node-role SD → one target/node,
# repointed from the kubelet port to :2381.
extraScrapeConfigs: |
  - job_name: k3s-etcd
    scheme: http
    kubernetes_sd_configs:
      - role: node
    relabel_configs:
      - source_labels: [__meta_kubernetes_node_address_InternalIP]
        target_label: __address__
        replacement: "${1}:2381"
      - source_labels: [__meta_kubernetes_node_name]
        target_label: instance

# --- Alerting rules: a single always-firing Watchdog (dead-man's switch) ---
# `vector(1)` is true forever, so this alert fires continuously while Prometheus
# is evaluating rules. Alertmanager (below) turns that steady firing into a
# periodic ping to healthchecks.io; if Prometheus dies, the rule stops, the
# alert resolves, the pings stop, and healthchecks.io alerts you.
serverFiles:
  alerting_rules.yml:
    groups:
      - name: meta
        rules:
          - alert: Watchdog
            expr: vector(1)
            labels:
              severity: none
            annotations:
              summary: "Prometheus + Alertmanager are alive — heartbeat to healthchecks.io."
      - name: nodes
        rules:
          # Node CPU busy (100 - idle%) sustained above 80% for 5 minutes.
          - alert: NodeHighCpu
            expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[5m])) * 100) > 80
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on {{ $labels.instance }}"
              description: "CPU usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (>80% for >5m)."
              dashboard: "https://logs.cjbarroso.com/d/node-alerts?viewPanel=1&from=now-3h&to=now"
          # Node memory in use (100 - available%) sustained above 85% for 5 minutes.
          - alert: NodeHighMemory
            expr: 100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory on {{ $labels.instance }}"
              description: "Memory usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (>85% for >5m)."
              dashboard: "https://logs.cjbarroso.com/d/node-alerts?viewPanel=2&from=now-3h&to=now"
          # Real (non-pseudo, writable) filesystem under 15% free for 10 minutes.
          - alert: NodeDiskSpaceLow
            expr: |
              (node_filesystem_avail_bytes{fstype!~"tmpfs|overlay|squashfs|ramfs"}
                / node_filesystem_size_bytes{fstype!~"tmpfs|overlay|squashfs|ramfs"} * 100 < 15)
              and node_filesystem_readonly == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Low disk on {{ $labels.instance }}:{{ $labels.mountpoint }}"
              description: "Only {{ $value | printf \"%.1f\" }}% free on {{ $labels.instance }} {{ $labels.mountpoint }} ({{ $labels.fstype }}) — <15% for >10m."
              dashboard: "https://logs.cjbarroso.com/d/node-alerts?viewPanel=3&from=now-3h&to=now"
      # Cluster / node availability (needs kube-state-metrics, enabled above).
      # New for the 3-node cluster: before, a node loss WAS the whole cluster and
      # took Prometheus with it, so there was nothing to alert. Now a single node
      # going away is a survivable, page-worthy event.
      - name: cluster
        rules:
          # A node the API server has marked not-Ready (kubelet stopped heart-
          # beating, node down/rebooting). Critical: on 3 nodes this is degraded
          # capacity + a lost etcd member.
          - alert: NodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Node not Ready: {{ $labels.node }}"
              description: "Node {{ $labels.node }} has been NotReady for >5m — workloads are being rescheduled and the etcd quorum is down a member. Check the node/k3s service."
          # Fewer than the expected 3 nodes are registered at all (a node dropped
          # out of the API entirely, not just NotReady).
          - alert: ClusterNodeCountLow
            expr: count(kube_node_info) < 3
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "Cluster has {{ $value }} nodes (expected 3)"
              description: "Only {{ $value }} nodes are registered with the API server for >10m (expected 3). A node has left the cluster."
          # An infra scrape target (node-exporter / kube-state-metrics, discovered
          # via service endpoints) is unreachable. Per node-exporter pod, so a dead
          # node's exporter trips this too — complements NodeNotReady from the
          # metrics side. Tight matcher (service-endpoints only) to avoid paging on
          # every annotation-scraped app pod restart.
          - alert: ScrapeTargetDown
            expr: up{job="kubernetes-service-endpoints"} == 0
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Scrape target down: {{ $labels.instance }} ({{ $labels.kubernetes_name }})"
              description: "Prometheus cannot scrape {{ $labels.instance }} for >10m. If it's a node-exporter, that node's metrics are dark."
      # k3s embedded etcd — the 3-member quorum that backs the whole control plane.
      # Metrics come from the k3s-etcd scrape job (see extraScrapeConfigs above);
      # needs `etcd-expose-metrics: true` on the nodes. All exprs are ABSENT-SAFE
      # (== 0 / count < 3 yield no result on an empty vector), so they will not
      # false-fire before the node config is applied — the targets simply show
      # DOWN until then.
      - name: etcd
        rules:
          # A member reports it currently has no leader → that member can't serve
          # linearizable reads/writes. Sustained = quorum trouble.
          - alert: EtcdNoLeader
            expr: etcd_server_has_leader == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "etcd member without leader: {{ $labels.instance }}"
              description: "etcd member {{ $labels.instance }} reports no leader for >1m — the control-plane datastore may be losing quorum."
          # Fewer than 3 etcd members are reporting metrics (a member is down or
          # unreachable). Two of three down = quorum lost = API read-only.
          - alert: EtcdMembersDown
            expr: count(etcd_server_has_leader) < 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "etcd quorum degraded ({{ $value }}/3 members reporting)"
              description: "Only {{ $value }} of 3 etcd members are reporting for >5m. Losing one more breaks quorum and makes the API server read-only. Check k3s on the missing node."
          # Frequent leader elections = an unstable/flapping control plane (disk
          # latency, network partitions between the nodes).
          - alert: EtcdLeaderFlapping
            expr: increase(etcd_server_leader_changes_seen_total[15m]) > 3
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "etcd leader elections flapping"
              description: "etcd has seen {{ $value | printf \"%.0f\" }} leader changes in 15m — the control plane is unstable (disk latency or inter-node network issues)."
      # CloudNativePG backup health. Backups = continuous WAL archiving to R2
      # (barman-cloud plugin) + daily base backups → PITR. The plugin does NOT
      # populate CNPG's base-backup *status* metrics (last_available/last_failed
      # backup stay 0), so the reliable signal is the native pg_stat_archiver view
      # on the primary: if its most recent WAL-archive attempt failed and hasn't
      # succeeded since, archiving — and therefore backups/PITR — is broken.
      # (CNPG forces a WAL switch on archive_timeout, so a healthy primary archives
      # regularly even when idle; a sustained failure is a real problem.)
      - name: cnpg
        rules:
          - alert: CNPGWALArchivingFailing
            expr: |
              (cnpg_pg_stat_archiver_seconds_since_last_failure{cnpg_io_instanceRole="primary"} >= 0)
              and
              (cnpg_pg_stat_archiver_seconds_since_last_failure{cnpg_io_instanceRole="primary"}
                 < ignoring(__name__) cnpg_pg_stat_archiver_seconds_since_last_archival{cnpg_io_instanceRole="primary"})
            for: 15m
            labels:
              severity: critical
            annotations:
              summary: "Postgres WAL archiving / backups failing ({{ $labels.cnpg_io_cluster }})"
              description: "CNPG cluster {{ $labels.cnpg_io_cluster }} (ns {{ $labels.namespace }}): the primary's latest WAL-archive attempt to R2 failed and has not succeeded for >15m — backups & point-in-time recovery are at risk. Check the R2 credentials (sealed secret hhccia-core-db-backup-creds) and the barman ObjectStore."
              logs: "https://logs.cjbarroso.com/d/cnpg-backup-logs?from=now-3h&to=now"
          # Streaming replication lag on any standby. Since the 3-node HA move the
          # standby lives on a DIFFERENT node than the primary (CNPG pod anti-
          # affinity), so it's a genuine cross-node failover copy — if it falls far
          # behind, a node loss / failover loses that much data.
          - alert: CNPGReplicationLagHigh
            expr: cnpg_pg_replication_lag > 300
            for: 10m
            labels:
              severity: warning
            annotations:
              summary: "Postgres replication lag high ({{ $labels.cnpg_io_cluster }})"
              description: "CNPG cluster {{ $labels.cnpg_io_cluster }} (ns {{ $labels.namespace }}): standby is {{ $value | printf \"%.0f\" }}s behind the primary (>300s for >10m)."
      # NATS / JetStream consumer health. The core binds 4 durable push consumers on
      # stream HHCCIA (core-ingestor, core-wb-applied, core-wb-failed, core-wb-stale).
      # If NATS restarts and loses JetStream, or the core fails to re-subscribe after
      # a reconnect, these vanish server-side and the whole CONSUME side of the
      # pipeline silently halts: ingestion stops and approved write-back results never
      # reconcile (records stuck `approved`, never `applied`) — while publish keeps
      # working so nothing else trips. This alert closes that gap (incident 2026-06-05).
      # The exporter only emits per-consumer series for consumers that exist, so
      # `count(...) or vector(0)` makes the rule fire even when ALL 4 are gone (empty
      # set → 0 < 4). `for: 10m` rides out normal core/NATS restarts (durables persist
      # across a core restart; only a NATS store loss or failed resubscribe drops them).
      - name: nats
        rules:
          - alert: HHCCIACoreConsumersMissing
            expr: |
              (count(jetstream_consumer_num_pending{stream_name="HHCCIA", consumer_name=~"core-.*"})
                or vector(0)) < 4
            for: 10m
            labels:
              severity: critical
            annotations:
              summary: "MedAudit core JetStream consumers missing ({{ $value }}/4 present)"
              description: "Fewer than the 4 expected core-* durable consumers are bound to stream HHCCIA for >10m. The core's consume side (ingestion + write-back reconciliation) is halted while publish still works — symptom: clinical records stuck in pending_review and approved changes never advancing to applied. Likely a NATS restart lost JetStream or the core lost its subscriptions. Recovery: kubectl -n hhccia-v2 rollout restart deploy/hhccia-core (recreates the consumers; replay is idempotent)."
              dashboard: "https://logs.cjbarroso.com/d/pipeline-consumers"
          # App-level dead-letter signal (hhccia_bus_messages_total comes from the
          # core's own /metrics on :9100). ANY parked message is a record that
          # stopped flowing: poison payload, schema-invalid Gemini output after
          # retries, or a permanent 4xx (billing/quota). The metric complements
          # the log-based GeminiRecordsDeadLettered rule (Loki) with a path that
          # doesn't depend on log shipping.
          - alert: HHCCIACoreDeadLetters
            expr: |
              sum by (subject, outcome)
              (increase(hhccia_bus_messages_total{outcome=~"dead_letter|permanent|non_json"}[15m])) > 0
            labels:
              severity: warning
            annotations:
              summary: "MedAudit core dead-lettered messages ({{ $labels.subject }}, {{ $labels.outcome }})"
              description: "El core parqueó mensajes en {{ $labels.subject }}.deadletter (outcome={{ $labels.outcome }}) en los últimos 15m. permanent = 4xx de Gemini (billing/quota) — revisar facturación; dead_letter = reintentos agotados; non_json = payload corrupto. Los registros afectados vuelven solos vía el re-feed del adapter una vez resuelta la causa."
              dashboard: "https://logs.cjbarroso.com/d/core-app-metrics"
      # Workload health (needs kube-state-metrics, enabled above). Catches the
      # failure modes probes can't: crashloops and failed Jobs (e.g. the
      # vaultwarden sqlite backup CronJob silently failing every night).
      - name: workloads
        rules:
          - alert: KubePodCrashLooping
            expr: increase(kube_pod_container_status_restarts_total[30m]) > 3
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod crashlooping: {{ $labels.namespace }}/{{ $labels.pod }}"
              description: "Container {{ $labels.container }} in {{ $labels.namespace }}/{{ $labels.pod }} restarted {{ $value | printf \"%.0f\" }} times in 30m — it is not recovering on its own."
          - alert: KubeJobFailed
            expr: kube_job_status_failed > 0
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Job failed: {{ $labels.namespace }}/{{ $labels.job_name }}"
              description: "Job {{ $labels.namespace }}/{{ $labels.job_name }} has failed pods. If this is a backup job (vaultwarden-sqlite-backup, CNPG backup), tonight's backup may be missing."
      # Storage: PVCs are a mix of node-local local-path (CNPG DBs, some apps) and
      # replicated Longhorn (grafana/prometheus/loki, vaultwarden). Either way,
      # running a volume to 100% is an outage AND a recovery problem. kubelet
      # volume stats need no extra exporter.
      - name: storage
        rules:
          - alert: PVCSpaceLow
            expr: |
              kubelet_volume_stats_available_bytes / kubelet_volume_stats_capacity_bytes * 100 < 15
            for: 15m
            labels:
              severity: warning
            annotations:
              summary: "PVC almost full: {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }}"
              description: "Only {{ $value | printf \"%.1f\" }}% free on PVC {{ $labels.namespace }}/{{ $labels.persistentvolumeclaim }} for >15m."
      # Velero: the daily stateful-daily backup failing means authentik +
      # vaultwarden have no fresh file-system backup. Metrics come from the
      # velero server pod (scrape annotation set in apps/velero/values-production.yaml).
      - name: velero
        rules:
          - alert: VeleroBackupFailed
            expr: velero_backup_last_status{schedule!=""} == 0
            labels:
              severity: critical
            annotations:
              summary: "Velero backup failing (schedule {{ $labels.schedule }})"
              description: "The last run of Velero schedule {{ $labels.schedule }} did not succeed — authentik/vaultwarden file backups are stale. Check: kubectl -n velero get backups, then velero backup logs <name>."

# --- Alertmanager: minimal, exists only to drive the healthchecks.io heartbeat ---
# Stateless (no PVC), tiny. The server auto-discovers it via kubernetes_sd.
# The healthchecks.io ping URL is a credential, so it is NOT in Git: it is mounted
# from the sealed Secret `prometheus-hc-ping` (key `url`) and referenced via
# `url_file`. Until that Secret exists this pod stays pending — that's expected
# (same model as grafana-secrets; see src/observability/README.md).
alertmanager:
  enabled: true
  persistence:
    enabled: false
  resources:
    requests:
      cpu: 10m
      memory: 24Mi
    limits:
      memory: 48Mi
  extraSecretMounts:
    - name: hc-ping
      mountPath: /etc/hc
      secretName: prometheus-hc-ping
      readOnly: true
    # Telegram bot token for the `notify` receiver. Sealed; read via bot_token_file
    # (see receivers below). Until this Secret exists the alertmanager pod stays
    # pending. (The non-secret chat_id lives in this values file, below.)
    - name: am-notify
      mountPath: /etc/am-notify
      secretName: alertmanager-notify
      readOnly: true
  config:
    route:
      # Default: blackhole. Alerts reach a channel only via an explicit route.
      receiver: "null"
      group_wait: 0s
      group_interval: 5m
      repeat_interval: 5m
      routes:
        - matchers:
            - alertname="Watchdog"
          receiver: healthchecks
          group_wait: 0s
          repeat_interval: 5m       # ping healthchecks.io every 5 min while alive
        # Real alerts (NodeHighCpu et al.) → Telegram + email.
        - matchers:
            - severity=~"warning|critical"
          receiver: notify
          group_by: ['alertname', 'instance']
          group_wait: 30s
          group_interval: 5m
          repeat_interval: 4h       # re-notify every 4h while still firing
    receivers:
      - name: "null"
      - name: healthchecks
        webhook_configs:
          # url_file keeps the secret URL off disk-in-Git; the file is the mounted Secret.
          - url_file: /etc/hc/url
            send_resolved: false    # only heartbeat while firing; silence == outage
      - name: notify
        telegram_configs:
          - bot_token_file: /etc/am-notify/telegram-bot-token
            chat_id: 1142335836
            parse_mode: HTML
            send_resolved: true
            # Custom body: name + status, description, and the dashboard deep-link
            # (from each alert's `dashboard` annotation). parse_mode HTML renders
            # the <b>/<a> tags.
            message: |-
              {{ range .Alerts }}<b>{{ .Labels.alertname }}</b> — {{ .Status | toUpper }}
              {{ .Annotations.description }}
              {{ with .Annotations.dashboard }}📊 <a href="{{ . }}">Open dashboard</a>
              {{ end }}{{ with .Annotations.logs }}📋 <a href="{{ . }}">View logs</a>
              {{ end }}{{ end }}
