              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT coalesce(service_code,'(sin servicio)') AS metric, count(*) AS value FROM clinical_record_report WHERE $__timeFilter(reviewed_at) AND status = 'rejected' AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring}) GROUP BY 1 ORDER BY 2 DESC" } ]
