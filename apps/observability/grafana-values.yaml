              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT coalesce(service_code,'(sin servicio)') AS \"Servicio\", count(*) FILTER (WHERE status IN ('approved','applied')) AS \"Aceptados\", count(*) FILTER (WHERE status = 'rejected') AS \"Rechazados\", round(100.0 * count(*) FILTER (WHERE status IN ('approved','applied')) / NULLIF(count(*) FILTER (WHERE status IN ('approved','applied','rejected')),0),1) AS \"Tasa aprob. %\" FROM clinical_record_report WHERE $__timeFilter(reviewed_at) AND status IN ('approved','applied','rejected') AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring}) GROUP BY 1 ORDER BY 2 DESC" } ]
