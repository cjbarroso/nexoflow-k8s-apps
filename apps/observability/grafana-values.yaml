# Grafana Helm values — Loki datasource, Cloudflare-tunnel ingress, Authentik
# SSO. Admin password + OIDC client id/secret come from the `grafana-secrets`
# Secret (sealed; see src/observability/). No secrets in Git.

# Drop the chart's helm-test Pod — Argo skips test hooks anyway, no need to ship it.
testFramework:
  enabled: false

# The data PVC is Longhorn ReadWriteOnce, so the default RollingUpdate deadlocks
# on every rollout: the new pod can't attach the volume while the old pod still
# holds it (Kubernetes "Multi-Attach error"), and RollingUpdate won't kill the
# old pod until the new one is Ready — so the roll hangs indefinitely (hit when
# the Tempo datasource was added, 2026-07-09). Recreate terminates the old pod
# first; a few seconds of Grafana downtime on a config change is fine for a
# monitoring UI, and it's the correct strategy for a single RWO-backed pod.
deploymentStrategy:
  type: Recreate

# Small PVC so dashboards/state survive restarts. Migrated (3-node HA move) from
# local-path to Longhorn (replicated) so the pod is node-mobile — its SQLite state
# (OIDC users, annotations; datasources/dashboards/rules are provisioned anyway)
# reschedules onto a surviving node instead of being pinned to homestation.
# Same pattern as vaultwarden: a PVC's storageClass is immutable, so the Longhorn
# PVC `grafana-data-lh` is pre-created out-of-band and the old `grafana` volume's
# contents are copied into it, then mounted here via existingClaim (size/
# storageClassName are ignored). See the migration runbook. The old local-path
# `grafana` PVC is kept (annotate Prune=false) as a fallback until verified.
persistence:
  enabled: true
  existingClaim: grafana-data-lh
  accessModes:
    - ReadWriteOnce

# The chart's init-chown-data container runs `chown -R` as uid 0 but with all
# caps dropped except CHOWN — so it can't traverse the 472-owned png/pdf/csv
# dirs (no DAC_OVERRIDE) and dies with "Permission denied" on pod re-create.
# fsGroup: 472 already fixes volume ownership at mount and the data is already
# 472:472, so the chown is redundant. Disable it.
initChownData:
  enabled: false

# Grafana 13 + the BigQuery plugin + 5 datasources need more than the original
# 256Mi: at idle it already sits ~210Mi, so loading a multi-panel dashboard spiked
# past the limit and the container was OOMKilled (exitCode 137) → every panel showed
# "no data" until raised. 512Mi limit gives ~2.4x idle headroom for query/render bursts.
resources:
  requests:
    cpu: 50m
    memory: 256Mi
  limits:
    memory: 512Mi

# Local admin credentials sourced from the sealed Secret.
admin:
  existingSecret: grafana-secrets
  userKey: admin-user
  passwordKey: admin-password

# OIDC client id/secret injected as env (Grafana maps GF_<SECTION>_<KEY> over
# grafana.ini), so they never appear in this file.
envValueFrom:
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
    secretKeyRef:
      name: grafana-secrets
      key: oidc-client-id
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-secrets
      key: oidc-client-secret
  # Read-only Postgres password for the Gemini-cost datasource. Lives in the
  # PLAIN (un-sealed) Secret `gemini-cost-ro` in this namespace — recreate it by
  # hand if the cluster is rebuilt (see Reports/2026-05-17 Estimacion de costos
  # API Gemini.md §9). No GF_ prefix so Grafana doesn't map it onto grafana.ini.
  GEMINI_COST_DB_PASSWORD:
    secretKeyRef:
      name: gemini-cost-ro
      key: postgres-password
  # Read-only Postgres password for the Authentik datasource (users + login
  # events dashboard). Lives in the SealedSecret `authentik-grafana-ro` in this
  # namespace (src/observability/authentik-grafana-ro-sealedsecret.yaml). The
  # matching DB role `grafana_ro` on the Authentik Postgres has column-level
  # SELECT (never the `password` hash) — see the "Authentik — Usuarios y accesos"
  # dashboard notes / SIF. No GF_ prefix so Grafana doesn't map it onto grafana.ini.
  AUTHENTIK_DB_PASSWORD:
    secretKeyRef:
      name: authentik-grafana-ro
      key: db-password
  # Telegram bot token for the Gemini-cost alert contact point. REUSES the
  # existing `alertmanager-notify` Secret (same bot Alertmanager uses), so the
  # token is never duplicated — only referenced. chat_id is non-secret (in the
  # contact point below; same chat as the Alertmanager `notify` receiver).
  GF_TELEGRAM_BOT_TOKEN:
    secretKeyRef:
      name: alertmanager-notify
      key: telegram-bot-token

# --- GCP BigQuery via Workload Identity Federation (keyless) ---------------
# No service-account JSON key lives in the cluster. The pod gets a short-lived
# projected KSA token (aud=gcp-wif-grafana) which GCP STS exchanges for a token
# impersonating grafana-bq@gen-lang-client-0005670378. GOOGLE_APPLICATION_CREDENTIALS
# points the Google client lib (ADC) at the external_account cred-config below.
# Full setup + gcloud runbook: SIF "Grafana BigQuery via Workload Identity Federation".
env:
  GOOGLE_APPLICATION_CREDENTIALS: /etc/gcp/cred-config.json

# Install the BigQuery datasource plugin at startup.
plugins:
  - grafana-bigquery-datasource

# Projected KSA token for WIF — mirrors the chart's documented EKS IRSA pattern
# (extraSecretMounts + projected serviceAccountToken). The kubelet rotates it;
# the Google lib re-reads the file. `audience` must match the provider's
# --allowed-audiences. Mounts the token at /var/run/secrets/gcp/token.
extraSecretMounts:
  - name: gcp-wif-token
    mountPath: /var/run/secrets/gcp
    readOnly: true
    projected:
      defaultMode: 420
      sources:
        - serviceAccountToken:
            audience: gcp-wif-grafana
            expirationSeconds: 3600
            path: token

# The external_account credential config (non-secret) from the gcp-bq-cred-config
# ConfigMap (src/observability/grafana-gcp-cred-config.yaml) at /etc/gcp/cred-config.json.
extraConfigmapMounts:
  - name: gcp-cred-config
    mountPath: /etc/gcp
    configMap: gcp-bq-cred-config
    readOnly: true

# Pre-provisioned datasources (in-cluster). Loki stays default so existing log
# workflows are unchanged; Prometheus is the metric store (svc prometheus-server).
datasources:
  datasources.yaml:
    apiVersion: 1
    # GeminiCost was first provisioned (PR #22) with an auto-generated uid and is
    # persisted on the PVC; pinning uid=geminicost (for the alert rule to
    # reference) collides with that name unless we delete the old one first.
    deleteDatasources:
      - name: GeminiCost
        orgId: 1
      # Same reason as GeminiCost: pin uid=prometheus (so the pipeline-backlog
      # alert rule can reference it) without colliding with the auto-uid copy
      # persisted on the PVC.
      - name: Prometheus
        orgId: 1
      # Same reason: pin uid=loki so dashboards can reference it by a stable uid
      # ({type:loki,uid:loki}); without deleting the auto-uid copy on the PVC first,
      # provisioning errors with "data source not found" and Grafana crashloops.
      - name: Loki
        orgId: 1
      # Remove the orphaned Alertmanager datasource provisioned by an earlier
      # revision (dd53fff). Its backend plugin is NOT available in this
      # grafana-community image (queries fail `plugin.unavailable`), so the
      # alerts-overview dashboard no longer uses it. Grafana does NOT auto-delete a
      # provisioned datasource just because it disappears from this file — it lingers
      # in the PVC's SQLite — so it must be deleted by name here (same mechanism as
      # the entries above). Safe to leave in place permanently (deletes by name;
      # no-op once it's gone).
      - name: Alertmanager
        orgId: 1
    datasources:
      - name: Loki
        uid: loki                  # pinned so dashboards can reference {type:loki,uid:loki}
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 1000
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.observability.svc.cluster.local
        isDefault: false
        jsonData:
          timeInterval: 60s        # match Prometheus scrape_interval
          # Exemplars: when a Prometheus series carries a `trace_id` label (the
          # apps attach one to their histograms once instrumented), Grafana renders
          # a clickable dot that jumps straight to that trace in Tempo. Harmless
          # before the apps emit exemplars — it just does nothing until then.
          exemplarTraceIdDestinations:
            - name: trace_id
              datasourceUid: tempo
      # Tempo — the distributed-trace store (single-binary, ns observability).
      # Ingest is apps -> Alloy (OTLP gateway) -> Tempo; THIS datasource is the
      # READ side (Grafana Explore + trace panels), querying Tempo's API on :3200.
      # Correlations tie traces into the rest of the stack:
      #   tracesToLogsV2  -> Loki       (span -> that pod's logs)
      #   tracesToMetrics -> Prometheus (span -> RED metrics)
      #   nodeGraph                     (service topology from the trace)
      # uid pinned `tempo` so panels/other datasources reference it
      # ({type:tempo,uid:tempo}). It's a FRESH datasource (never persisted on the
      # PVC with an auto uid), so unlike Loki/Prometheus it needs NO
      # deleteDatasources entry above.
      - name: Tempo
        uid: tempo
        type: tempo
        access: proxy
        url: http://tempo.observability.svc.cluster.local:3200
        isDefault: false
        jsonData:
          # Span -> logs: filter Loki by the emitting service. The span's
          # `service.name` (hhccia-core / hhccia-adapter-datatech) maps onto the
          # Loki stream label `app` (the pods' `app` label), which Alloy already
          # sets. Time shifts widen the log window around the span.
          tracesToLogsV2:
            datasourceUid: loki
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
            filterByTraceID: false
            filterBySpanID: false
            tags:
              - key: 'service.name'
                value: 'app'
          # Span -> metrics: land in Prometheus scoped to the same time window.
          tracesToMetrics:
            datasourceUid: prometheus
            spanStartTimeShift: '-1h'
            spanEndTimeShift: '1h'
          # Build the service graph straight from the trace spans (no
          # metrics-generator needed for the node graph in a trace view).
          nodeGraph:
            enabled: true
      # Gemini cost ledger (v2 core DB). Read-only role `grafana_ro` over the
      # READ-ONLY CNPG service; it can SELECT only the sanitized view
      # `gemini_usage_report` (cost + service code, NO clinical text). Password
      # from the gemini-cost-ro Secret via env (see envValueFrom). Used by the
      # "Gemini — Costo" dashboard.
      - name: GeminiCost
        uid: geminicost
        type: postgres
        access: proxy
        url: hhccia-core-db-ro.hhccia-v2.svc.cluster.local:5432
        database: hhccia_core
        user: grafana_ro
        isDefault: false
        jsonData:
          # Grafana 12 reads the DB name from jsonData.database for the SQL query
          # editor/scene rendering; the top-level `database` is legacy and leaving
          # jsonData.database empty causes "no default database configured".
          database: hhccia_core
          sslmode: require
          postgresVersion: 1600
        secureJsonData:
          password: $__env{GEMINI_COST_DB_PASSWORD}
      # HHCCIA core record store (same v2 core DB as GeminiCost, same read-only
      # role `grafana_ro`, same RO service). Reads ONLY the sanitized view
      # `clinical_record_report` (status + service code + author name + reviewer +
      # timestamps — NO patient identity, NO clinical text, NO review notes; the
      # view + GRANT are created idempotently by hhccia-core app/migrations.py).
      # Reuses the grafana_ro password env from the gemini-cost-ro Secret — it's
      # the same DB login. Used by the "Registros aceptados / rechazados" dashboard.
      - name: HhcciaCore
        uid: hhcciacore
        type: postgres
        access: proxy
        url: hhccia-core-db-ro.hhccia-v2.svc.cluster.local:5432
        database: hhccia_core
        user: grafana_ro
        isDefault: false
        jsonData:
          database: hhccia_core
          sslmode: require
          postgresVersion: 1600
        secureJsonData:
          password: $__env{GEMINI_COST_DB_PASSWORD}
      # GCP BigQuery — Cloud Billing export dataset `all_billing_data_1` (US).
      # Keyless auth via Workload Identity Federation: authenticationType `gce`
      # makes the plugin use Application Default Credentials, which read
      # GOOGLE_APPLICATION_CREDENTIALS (the external_account cred-config) and do
      # the STS token exchange — no SA key. defaultProject is the AI-Studio GCP
      # project; processingLocation must match the dataset region (US). Verify
      # with the datasource's "Save & test" after first sync.
      - name: BigQuery
        uid: bigquery
        type: grafana-bigquery-datasource
        access: proxy
        isDefault: false
        jsonData:
          authenticationType: gce
          defaultProject: gen-lang-client-0005670378
          processingLocation: US
      # Authentik identity DB (users + login events). Read-only role `grafana_ro`
      # on the Authentik Postgres. The DB was migrated to a CloudNativePG cluster
      # `authentik-db` (svc authentik-db-ro, ns authentik) ~2026-06-11 — the old
      # plain `authentik-pg` Deployment is GONE. The CNPG pg_hba has a plain
      # `host all all all scram-sha-256` line, so sslmode=disable still works.
      # The role has column-level SELECT on authentik_core_user (everything EXCEPT
      # the `password` hash) + SELECT on authentik_events_event. Password from the
      # authentik-grafana-ro SealedSecret via env. Used by "Authentik — Usuarios y
      # accesos". NOTE: the role + grants are applied by hand on the Authentik DB
      # (Authentik owns its own migrations); the CNPG rebuild DROPPED them, so they
      # were recreated by hand — recreate again if that DB is ever rebuilt/restored.
      - name: Authentik
        uid: authentik
        type: postgres
        access: proxy
        url: authentik-db-ro.authentik.svc.cluster.local:5432
        database: authentik
        user: grafana_ro
        isDefault: false
        jsonData:
          database: authentik
          sslmode: disable
          postgresVersion: 1600
        secureJsonData:
          password: $__env{AUTHENTIK_DB_PASSWORD}

# Auto-provision the "Node Exporter Full" dashboard (grafana.com id 1860) so node
# CPU/memory/disk is visible out of the box. The chart's download-dashboards init
# container fetches it from grafana.com (Grafana already has egress for OIDC).
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 45               # pinned (latest as of 2026-05-30)
      datasource: Prometheus
    # Community "kube-state-metrics-v2" (grafana.com id 13332) — cluster OBJECT
    # state (nodes, pods, deployments, jobs, PVCs) from raw kube_* metrics ONLY.
    # Picked deliberately because it needs NO kube-prometheus recording rules
    # (this standalone Prometheus ships none — verified 0 recording-rule series),
    # unlike the popular "Kubernetes / Views / *" dashboards (15757/15759) which
    # would render empty here. Complements node-exporter-full (per-node hardware)
    # and the custom cluster-nodes (per-node comparison). Pinned revision.
    kube-state-metrics-v2:
      gnetId: 13332
      revision: 12
      datasource: Prometheus
    # Custom cluster-health "fleet" dashboard — all 3 nodes on ONE screen for
    # side-by-side comparison (CPU/mem/disk/net/load/pods/etcd). Fills the gap:
    # node-exporter-full (1860) is a one-node-at-a-time drill-down; this shows
    # every node as a series/bar at once. node-exporter series carry a `node`
    # label (=hostname) in addition to `instance` (=IP:9100), so panels use
    # {{node}} for friendly legends without a node_uname_info join (verified via
    # the Prometheus API). Disk uses the root mountpoint "/"; network sums the
    # physical NICs (en*/eth*), excluding veth/cni/flannel/bridges. etcd/Ready
    # come from kube-state-metrics + the k3s-etcd :2381 scrape. Stable uid
    # `cluster-nodes` for deep-linking. All targets reference uid `prometheus`.
    cluster-nodes:
      json: |
        {
          "uid": "cluster-nodes",
          "title": "Cluster — Nodos (comparativa)",
          "tags": ["cluster", "nodes", "health"],
          "schemaVersion": 39,
          "refresh": "30s",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 100, "type": "row", "title": "Resumen del cluster",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 0 }
            },
            {
              "id": 1, "type": "stat", "title": "Nodos Ready (esperado 3)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 5, "x": 0, "y": 1 },
              "fieldConfig": { "defaults": {
                "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [
                  { "color": "red", "value": null }, { "color": "green", "value": 3 } ] }
              }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})" } ]
            },
            {
              "id": 2, "type": "stat", "title": "Pods (cluster)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 5, "x": 5, "y": 1 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "count(kube_pod_info)" } ]
            },
            {
              "id": 3, "type": "stat", "title": "CPU cluster %",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 5, "x": 10, "y": 1 },
              "fieldConfig": { "defaults": {
                "unit": "percent", "decimals": 1, "min": 0, "max": 100,
                "thresholds": { "mode": "absolute", "steps": [
                  { "color": "green", "value": null }, { "color": "orange", "value": 70 }, { "color": "red", "value": 85 } ] }
              }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "100 * (1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m])))" } ]
            },
            {
              "id": 4, "type": "stat", "title": "Memoria cluster %",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 5, "x": 15, "y": 1 },
              "fieldConfig": { "defaults": {
                "unit": "percent", "decimals": 1, "min": 0, "max": 100,
                "thresholds": { "mode": "absolute", "steps": [
                  { "color": "green", "value": null }, { "color": "orange", "value": 75 }, { "color": "red", "value": 90 } ] }
              }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "100 * (1 - sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))" } ]
            },
            {
              "id": 5, "type": "stat", "title": "etcd con líder (esperado 3)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 4, "x": 20, "y": 1 },
              "fieldConfig": { "defaults": {
                "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [
                  { "color": "red", "value": null }, { "color": "green", "value": 3 } ] }
              }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "sum(etcd_server_has_leader)" } ]
            },
            {
              "id": 101, "type": "row", "title": "Comparativa por nodo (ahora)",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 5 }
            },
            {
              "id": 10, "type": "bargauge", "title": "CPU % por nodo",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 8, "x": 0, "y": 6 },
              "fieldConfig": { "defaults": {
                "unit": "percent", "min": 0, "max": 100,
                "thresholds": { "mode": "absolute", "steps": [
                  { "color": "green", "value": null }, { "color": "orange", "value": 80 }, { "color": "red", "value": 90 } ] }
              }, "overrides": [] },
              "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{node}}",
                "expr": "100 - (avg by (node) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)" } ]
            },
            {
              "id": 11, "type": "bargauge", "title": "Memoria % por nodo",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 8, "x": 8, "y": 6 },
              "fieldConfig": { "defaults": {
                "unit": "percent", "min": 0, "max": 100,
                "thresholds": { "mode": "absolute", "steps": [
                  { "color": "green", "value": null }, { "color": "orange", "value": 75 }, { "color": "red", "value": 90 } ] }
              }, "overrides": [] },
              "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{node}}",
                "expr": "100 * (1 - node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)" } ]
            },
            {
              "id": 12, "type": "bargauge", "title": "Disco raíz (/) % por nodo",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 8, "x": 16, "y": 6 },
              "fieldConfig": { "defaults": {
                "unit": "percent", "min": 0, "max": 100,
                "thresholds": { "mode": "absolute", "steps": [
                  { "color": "green", "value": null }, { "color": "orange", "value": 80 }, { "color": "red", "value": 90 } ] }
              }, "overrides": [] },
              "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{node}}",
                "expr": "100 - (node_filesystem_avail_bytes{mountpoint=\"/\",fstype!~\"tmpfs|overlay|squashfs|ramfs\"} / node_filesystem_size_bytes{mountpoint=\"/\"} * 100)" } ]
            },
            {
              "id": 102, "type": "row", "title": "Series temporales por nodo",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 14 }
            },
            {
              "id": 20, "type": "timeseries", "title": "CPU % por nodo",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 15 },
              "fieldConfig": { "defaults": { "unit": "percent", "min": 0, "max": 100,
                "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{node}}",
