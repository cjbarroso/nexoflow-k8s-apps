            },
            {
              "id": 103, "type": "row", "title": "Red y estado",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 31 }
            },
            {
              "id": 30, "type": "timeseries", "title": "Red recibida (RX) por nodo",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 32 },
              "fieldConfig": { "defaults": { "unit": "Bps", "min": 0,
                "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{node}}",
                "expr": "sum by (node) (rate(node_network_receive_bytes_total{device=~\"en.*|eth.*\"}[5m]))" } ]
            },
            {
              "id": 31, "type": "timeseries", "title": "Red transmitida (TX) por nodo",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 32 },
              "fieldConfig": { "defaults": { "unit": "Bps", "min": 0,
                "custom": { "drawStyle": "line", "fillOpacity": 10 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{node}}",
                "expr": "sum by (node) (rate(node_network_transmit_bytes_total{device=~\"en.*|eth.*\"}[5m]))" } ]
            },
            {
              "id": 32, "type": "bargauge", "title": "Pods por nodo",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 12, "x": 0, "y": 40 },
              "fieldConfig": { "defaults": { "unit": "short", "min": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "blue", "value": null } ] } }, "overrides": [] },
              "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true, "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{node}}",
                "expr": "count by (node) (kube_pod_info)" } ]
            },
            {
              "id": 33, "type": "timeseries", "title": "etcd: líder por nodo (1 = ok)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 12, "x": 12, "y": 40 },
              "fieldConfig": { "defaults": { "unit": "short", "min": 0, "max": 1.2, "decimals": 0,
                "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "lineWidth": 2, "fillOpacity": 10, "pointSize": 7, "showPoints": "always", "spanNulls": false } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{instance}}",
                "expr": "etcd_server_has_leader" } ]
            }
          ]
        }
    # Custom dashboard with exactly the 3 metrics we alert on (CPU/mem/disk),
    # each panel carrying the alert threshold as a marker line. Stable uid
    # `node-alerts` so the Alertmanager Telegram messages can deep-link to it
    # (https://logs.cjbarroso.com/d/node-alerts). Panels reference the
    # Prometheus datasource by name (resolved by Grafana at load).
    node-alerts:
      json: |
        {
          "uid": "node-alerts",
          "title": "Node Alerts — CPU / Memory / Disk",
          "tags": ["nodes", "alerts"],
          "schemaVersion": 39,
          "refresh": "1m",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1,
              "type": "timeseries",
              "title": "CPU usage % — alert: NodeHighCpu (> 80% for 5m)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "custom": { "thresholdsStyle": { "mode": "line" }, "fillOpacity": 10 },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 80 }
                  ] }
                },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
                  "legendFormat": "{{instance}}"
                }
              ]
            },
            {
              "id": 2,
              "type": "timeseries",
              "title": "Memory usage % — alert: NodeHighMemory (> 85% for 5m)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "custom": { "thresholdsStyle": { "mode": "line" }, "fillOpacity": 10 },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 85 }
                  ] }
                },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
                  "legendFormat": "{{instance}}"
                }
              ]
            },
            {
              "id": 3,
              "type": "timeseries",
              "title": "Disk free % — alert: NodeDiskSpaceLow (< 15% for 10m)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "custom": { "thresholdsStyle": { "mode": "line" }, "fillOpacity": 10 },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "red", "value": null },
                    { "color": "green", "value": 15 }
                  ] }
                },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\"} * 100 and node_filesystem_readonly == 0",
                  "legendFormat": "{{instance}} {{mountpoint}}"
                }
              ]
            }
          ]
        }
    # Single pane of glass for alert STATUS — one place to manually inspect every
    # infra alert and whether it's firing. Built ONLY on datasources that work in
    # this Grafana build (Prometheus + Loki). NOTE: an Alertmanager datasource would
    # be the natural "all active alerts" source, but its backend plugin is NOT
    # available in the grafana-community image (queries fail `plugin.unavailable`,
    # /api/plugins/alertmanager → 404), so we don't use it. Instead:
    #   - ACTIVE-ALERTS TABLE + summary counters + history → the Prometheus `ALERTS`
    #     metric (every Prometheus-rule alert, firing/pending, with labels). The
    #     table excludes the always-firing Watchdog (shown as its own heartbeat stat).
    #   - LOKI LOG-ALERTS section → 4 stat panels + a trend, each running the SAME
    #     LogQL the Loki ruler alert uses (CNPGBackupFailed, CNPGWalArchiveErrorsLog,
    #     GeminiAccessErrors, GeminiRecordsDeadLettered), so the log alerts' live
    #     signal is visible here too (same technique as the gemini-health dashboard).
    # Neither source exposes a series for an alert in the OK state — "OK" is the
    # ABSENCE of an active alert — so this renders "active list + history"; anything
    # not listed is OK. Grafana-managed rules (Gemini cost, pipeline backlog) are NOT
    # here — they live in Grafana's own Alerting. Stable uid `alerts-overview`.
    alerts-overview:
      json: |
        {
          "uid": "alerts-overview",
          "title": "Alertas — Estado de infraestructura",
          "description": "Estado de todas las alertas de infraestructura en un solo lugar. Tabla de alertas activas + contadores + historial vía métrica ALERTS (reglas Prometheus); sección de alertas de logs vía Loki (las 4 alertas del ruler). Lo que no aparece está OK.",
          "tags": ["alerts", "infraestructura", "prometheus", "loki"],
          "schemaVersion": 39,
          "refresh": "30s",
          "time": { "from": "now-24h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 9, "type": "text", "title": "",
              "gridPos": { "h": 3, "w": 24, "x": 0, "y": 0 },
              "options": { "mode": "markdown", "content": "**Cómo leer este tablero** — **Watchdog** debe estar siempre *activo* (es el dead-man's switch; si se apaga, Prometheus/Alertmanager están caídos). La tabla **Alertas activas** lista toda alerta de Prometheus firing/pending (sin el Watchdog): **vacía = infraestructura sana**. La sección **Alertas de logs** muestra la señal en vivo de las 4 alertas del ruler de Loki (cada panel se pone rojo cuando alcanzaría su umbral). Una alerta en estado **OK** no aparece: su ausencia significa que está sana. Las alertas gestionadas por Grafana (costo Gemini, backlog del pipeline) viven en *Alerting* de Grafana, no aquí." }
            },
            {
              "id": 100, "type": "row", "title": "Resumen (reglas Prometheus)",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 3 }
            },
            {
              "id": 1, "type": "stat", "title": "Watchdog (heartbeat)",
              "description": "Dead-man's switch (vector(1)): DEBE estar siempre activo. Si marca AUSENTE, Prometheus o Alertmanager están caídos (healthchecks.io te avisa).",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 6, "x": 0, "y": 4 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "mappings": [ { "type": "value", "options": { "1": { "text": "activo", "color": "green" }, "0": { "text": "AUSENTE", "color": "red" } } } ],
                "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "green", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "max(ALERTS{alertname=\"Watchdog\",alertstate=\"firing\"}) or vector(0)" } ]
            },
            {
              "id": 2, "type": "stat", "title": "Críticas firing",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 6, "x": 6, "y": 4 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "count(ALERTS{alertstate=\"firing\",severity=\"critical\"}) or vector(0)" } ]
            },
            {
              "id": 3, "type": "stat", "title": "Warnings firing",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 6, "x": 12, "y": 4 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "count(ALERTS{alertstate=\"firing\",severity=\"warning\"}) or vector(0)" } ]
            },
            {
              "id": 4, "type": "stat", "title": "Alertas pending",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 4, "w": 6, "x": 18, "y": 4 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "yellow", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "expr": "count(ALERTS{alertstate=\"pending\"}) or vector(0)" } ]
            },
            {
              "id": 101, "type": "row", "title": "Alertas activas — reglas Prometheus (métrica ALERTS, sin Watchdog)",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 8 }
            },
            {
              "id": 5, "type": "table", "title": "Alertas activas ahora (firing / pending)",
              "description": "Toda alerta de Prometheus actualmente firing o pending, con sus etiquetas (alertname, severity, alertstate, instance, …). Excluye el Watchdog. Vacía = ninguna alerta real activa = infraestructura sana.",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 12, "w": 24, "x": 0, "y": 9 },
              "fieldConfig": { "defaults": {}, "overrides": [
                { "matcher": { "id": "byName", "options": "Value" }, "properties": [ { "id": "custom.hidden", "value": true } ] },
                { "matcher": { "id": "byName", "options": "Time" }, "properties": [ { "id": "custom.hidden", "value": true } ] }
              ] },
              "options": { "showHeader": true, "sortBy": [ { "displayName": "alertname", "desc": false } ] },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                "format": "table", "instant": true,
                "expr": "ALERTS{alertstate=~\"firing|pending\", alertname!=\"Watchdog\"}" } ]
            },
            {
              "id": 104, "type": "row", "title": "Alertas de logs (ruler de Loki) — señal en vivo",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 21 }
            },
            {
              "id": 11, "type": "stat", "title": "CNPGBackupFailed (10m) — alerta > 0",
              "description": "Errores del plugin barman-cloud (critical). Mismo LogQL que la alerta CNPGBackupFailed del ruler de Loki. Rojo = alcanzaría el umbral.",
              "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 4, "w": 6, "x": 0, "y": 22 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant",
                "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"plugin-barman-cloud\"} | json | level=\"error\" [10m]))" } ]
            },
            {
              "id": 12, "type": "stat", "title": "CNPGWalArchiveErrorsLog (10m) — alerta > 0",
              "description": "'archive command failed' en postgres (warning). Mismo LogQL que la alerta CNPGWalArchiveErrorsLog.",
              "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 4, "w": 6, "x": 6, "y": 22 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant",
                "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"postgres\"} |= \"archive command failed\" [10m]))" } ]
            },
            {
              "id": 13, "type": "stat", "title": "GeminiAccessErrors (5m) — alerta > 3",
              "description": "Respuestas HTTP 4xx/5xx de Gemini (warning). Mismo LogQL que la alerta GeminiAccessErrors (>3 en 5m).",
              "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 4, "w": 6, "x": 12, "y": 22 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "orange", "value": 4 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant",
                "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"generativelanguage.googleapis.com\" |~ \"HTTP/1.1 [45]\" [5m]))" } ]
            },
            {
              "id": 14, "type": "stat", "title": "GeminiRecordsDeadLettered (10m) — alerta > 0",
              "description": "Registros enviados a dead-letter (critical). Mismo LogQL que la alerta GeminiRecordsDeadLettered.",
              "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 4, "w": 6, "x": 18, "y": 22 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0,
                "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant",
                "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"dead-lettering\" [10m]))" } ]
            },
            {
              "id": 15, "type": "timeseries", "title": "Señal de las alertas de logs en el tiempo",
              "description": "Evolución de las 4 señales de las alertas del ruler de Loki (cuenta por ventana). Deben vivir en 0; un pico es lo que dispara la alerta correspondiente.",
              "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 6, "w": 24, "x": 0, "y": 26 },
              "fieldConfig": { "defaults": { "unit": "short", "min": 0, "decimals": 0,
                "custom": { "drawStyle": "bars", "fillOpacity": 60, "lineWidth": 1, "stacking": { "mode": "none" } } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [
                { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "range", "legendFormat": "CNPG backup errors",
                  "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"plugin-barman-cloud\"} | json | level=\"error\" [$__auto]))" },
                { "refId": "B", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "range", "legendFormat": "WAL archive failed",
                  "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"postgres\"} |= \"archive command failed\" [$__auto]))" },
                { "refId": "C", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "range", "legendFormat": "Gemini 4xx/5xx",
                  "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"generativelanguage.googleapis.com\" |~ \"HTTP/1.1 [45]\" [$__auto]))" },
                { "refId": "D", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "range", "legendFormat": "dead-letters",
                  "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"dead-lettering\" [$__auto]))" }
              ]
            },
            {
              "id": 102, "type": "row", "title": "Historial (reglas Prometheus)",
              "gridPos": { "h": 1, "w": 24, "x": 0, "y": 32 }
            },
            {
              "id": 6, "type": "timeseries", "title": "Alertas firing en el tiempo (por alerta)",
              "description": "Cuántas instancias de cada alerta de Prometheus estuvieron firing a lo largo del rango. Un escalón arriba = la alerta se disparó; vuelve a 0 al resolverse.",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 33 },
              "fieldConfig": { "defaults": { "unit": "short", "min": 0, "decimals": 0,
                "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "lineWidth": 2, "fillOpacity": 15, "pointSize": 6, "showPoints": "never", "spanNulls": false } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{alertname}}",
                "expr": "count by (alertname) (ALERTS{alertstate=\"firing\"})" } ]
            },
            {
              "id": 7, "type": "timeseries", "title": "Firing por severidad (críticas vs warnings)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 42 },
              "fieldConfig": { "defaults": { "unit": "short", "min": 0, "decimals": 0,
                "custom": { "drawStyle": "line", "lineInterpolation": "stepAfter", "lineWidth": 2, "fillOpacity": 15, "spanNulls": false } }, "overrides": [
                { "matcher": { "id": "byFrameRefID", "options": "A" }, "properties": [ { "id": "displayName", "value": "críticas" }, { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } } ] },
                { "matcher": { "id": "byFrameRefID", "options": "B" }, "properties": [ { "id": "displayName", "value": "warnings" }, { "id": "color", "value": { "mode": "fixed", "fixedColor": "orange" } } ] }
              ] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "count(ALERTS{alertstate=\"firing\",severity=\"critical\"}) or vector(0)" },
                { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "count(ALERTS{alertstate=\"firing\",severity=\"warning\"}) or vector(0)" }
              ]
            }
          ]
        }
    # HHCCIA pipeline backlog: JetStream consumer metrics from nats-exporter
    # (src/hhccia-v2/nats-exporter.yaml). num_pending = mensajes que el core
    # todavía no procesó (se atrasa); num_ack_pending = en vuelo; num_redelivered
    # = reintentos/poison. Stable uid `pipeline-backlog` so the backlog alert can
    # deep-link to it. Panels reference the Prometheus datasource by name.
    pipeline-backlog:
      json: |
        {
          "uid": "pipeline-backlog",
          "title": "HHCCIA — Backlog del ingestor (NATS JetStream)",
          "tags": ["hhccia", "pipeline", "nats"],
          "schemaVersion": 39,
          "refresh": "30s",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1,
              "type": "stat",
              "title": "Backlog ahora (num_pending) — alerta > 10",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 5, "w": 8, "x": 0, "y": 0 },
              "fieldConfig": {
                "defaults": {
                  "unit": "short", "decimals": 0,
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 10 }
                  ] }
                },
                "overrides": []
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "max(jetstream_consumer_num_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
              ]
            },
            {
              "id": 2,
              "type": "stat",
              "title": "En vuelo (num_ack_pending)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 5, "w": 8, "x": 8, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "max(jetstream_consumer_num_ack_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
              ]
            },
            {
              "id": 3,
              "type": "stat",
              "title": "Reintentos (num_redelivered)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 5, "w": 8, "x": 16, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" },
                  "expr": "max(jetstream_consumer_num_redelivered{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
              ]
            },
            {
              "id": 4,
              "type": "timeseries",
              "title": "Backlog del ingestor en el tiempo — línea de alerta en 10",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 10, "w": 24, "x": 0, "y": 5 },
              "fieldConfig": {
                "defaults": {
                  "unit": "short", "min": 0,
                  "custom": { "drawStyle": "line", "fillOpacity": 15, "thresholdsStyle": { "mode": "line" } },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 10 }
                  ] }
                },
                "overrides": []
              },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "num_pending (backlog)",
                  "expr": "max(jetstream_consumer_num_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" },
                { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "num_ack_pending (en vuelo)",
                  "expr": "max(jetstream_consumer_num_ack_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" },
                { "refId": "C", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "num_redelivered (reintentos)",
                  "expr": "max(jetstream_consumer_num_redelivered{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
