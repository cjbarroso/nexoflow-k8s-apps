              "targets": [ { "refId": "A", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" }, "rawQuery": true, "editorMode": "code", "location": "US", "project": "gen-lang-client-0005670378", "format": 1, "rawSql": "SELECT CONCAT('gemini ', REGEXP_EXTRACT(LOWER(sku.description), r'gemini[ _]?([0-9.]+ ?(?:pro|flash)(?: lite)?(?: preview)?)')) AS metric, ROUND(SUM(cost) + SUM(IFNULL((SELECT SUM(c.amount) FROM UNNEST(credits) c),0)),6) AS value FROM `gen-lang-client-0005670378.all_billing_data_1.gcp_billing_export_v1_01878F_0656E4_1C5C89` WHERE service.description='Gemini API' AND $__timeFilter(usage_start_time) GROUP BY metric ORDER BY value DESC" } ]
