# Grafana Helm values — Loki datasource, Cloudflare-tunnel ingress, Authentik
# SSO. Admin password + OIDC client id/secret come from the `grafana-secrets`
# Secret (sealed; see src/observability/). No secrets in Git.

# Drop the chart's helm-test Pod — Argo skips test hooks anyway, no need to ship it.
testFramework:
  enabled: false

# Small PVC so dashboards/state survive restarts.
persistence:
  enabled: true
  size: 2Gi

# The chart's init-chown-data container runs `chown -R` as uid 0 but with all
# caps dropped except CHOWN — so it can't traverse the 472-owned png/pdf/csv
# dirs (no DAC_OVERRIDE) and dies with "Permission denied" on pod re-create.
# fsGroup: 472 already fixes volume ownership at mount and the data is already
# 472:472, so the chown is redundant. Disable it.
initChownData:
  enabled: false

resources:
  requests:
    cpu: 50m
    memory: 128Mi
  limits:
    memory: 256Mi

# Local admin credentials sourced from the sealed Secret.
admin:
  existingSecret: grafana-secrets
  userKey: admin-user
  passwordKey: admin-password

# OIDC client id/secret injected as env (Grafana maps GF_<SECTION>_<KEY> over
# grafana.ini), so they never appear in this file.
envValueFrom:
  GF_AUTH_GENERIC_OAUTH_CLIENT_ID:
    secretKeyRef:
      name: grafana-secrets
      key: oidc-client-id
  GF_AUTH_GENERIC_OAUTH_CLIENT_SECRET:
    secretKeyRef:
      name: grafana-secrets
      key: oidc-client-secret
  # Read-only Postgres password for the Gemini-cost datasource. Lives in the
  # PLAIN (un-sealed) Secret `gemini-cost-ro` in this namespace — recreate it by
  # hand if the cluster is rebuilt (see Reports/2026-05-17 Estimacion de costos
  # API Gemini.md §9). No GF_ prefix so Grafana doesn't map it onto grafana.ini.
  GEMINI_COST_DB_PASSWORD:
    secretKeyRef:
      name: gemini-cost-ro
      key: postgres-password
  # Telegram bot token for the Gemini-cost alert contact point. REUSES the
  # existing `alertmanager-notify` Secret (same bot Alertmanager uses), so the
  # token is never duplicated — only referenced. chat_id is non-secret (in the
  # contact point below; same chat as the Alertmanager `notify` receiver).
  GF_TELEGRAM_BOT_TOKEN:
    secretKeyRef:
      name: alertmanager-notify
      key: telegram-bot-token

# Pre-provisioned datasources (in-cluster). Loki stays default so existing log
# workflows are unchanged; Prometheus is the metric store (svc prometheus-server).
datasources:
  datasources.yaml:
    apiVersion: 1
    # GeminiCost was first provisioned (PR #22) with an auto-generated uid and is
    # persisted on the PVC; pinning uid=geminicost (for the alert rule to
    # reference) collides with that name unless we delete the old one first.
    deleteDatasources:
      - name: GeminiCost
        orgId: 1
      # Same reason as GeminiCost: pin uid=prometheus (so the pipeline-backlog
      # alert rule can reference it) without colliding with the auto-uid copy
      # persisted on the PVC.
      - name: Prometheus
        orgId: 1
    datasources:
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        isDefault: true
        jsonData:
          maxLines: 1000
      - name: Prometheus
        uid: prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.observability.svc.cluster.local
        isDefault: false
        jsonData:
          timeInterval: 60s        # match Prometheus scrape_interval
      # Gemini cost ledger (v2 core DB). Read-only role `grafana_ro` over the
      # READ-ONLY CNPG service; it can SELECT only the sanitized view
      # `gemini_usage_report` (cost + service code, NO clinical text). Password
      # from the gemini-cost-ro Secret via env (see envValueFrom). Used by the
      # "Gemini — Costo" dashboard.
      - name: GeminiCost
        uid: geminicost
        type: postgres
        access: proxy
        url: hhccia-core-db-ro.hhccia-v2.svc.cluster.local:5432
        database: hhccia_core
        user: grafana_ro
        isDefault: false
        jsonData:
          sslmode: require
          postgresVersion: 1600
        secureJsonData:
          password: $__env{GEMINI_COST_DB_PASSWORD}

# Auto-provision the "Node Exporter Full" dashboard (grafana.com id 1860) so node
# CPU/memory/disk is visible out of the box. The chart's download-dashboards init
# container fetches it from grafana.com (Grafana already has egress for OIDC).
dashboardProviders:
  dashboardproviders.yaml:
    apiVersion: 1
    providers:
      - name: default
        orgId: 1
        folder: ""
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /var/lib/grafana/dashboards/default
dashboards:
  default:
    node-exporter-full:
      gnetId: 1860
      revision: 45               # pinned (latest as of 2026-05-30)
      datasource: Prometheus
    # Custom dashboard with exactly the 3 metrics we alert on (CPU/mem/disk),
    # each panel carrying the alert threshold as a marker line. Stable uid
    # `node-alerts` so the Alertmanager Telegram messages can deep-link to it
    # (https://logs.cjbarroso.com/d/node-alerts). Panels reference the
    # Prometheus datasource by name (resolved by Grafana at load).
    node-alerts:
      json: |
        {
          "uid": "node-alerts",
          "title": "Node Alerts — CPU / Memory / Disk",
          "tags": ["nodes", "alerts"],
          "schemaVersion": 39,
          "refresh": "1m",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1,
              "type": "timeseries",
              "title": "CPU usage % — alert: NodeHighCpu (> 80% for 5m)",
              "datasource": "Prometheus",
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 0 },
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "custom": { "thresholdsStyle": { "mode": "line" }, "fillOpacity": 10 },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 80 }
                  ] }
                },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": "Prometheus",
                  "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
                  "legendFormat": "{{instance}}"
                }
              ]
            },
            {
              "id": 2,
              "type": "timeseries",
              "title": "Memory usage % — alert: NodeHighMemory (> 85% for 5m)",
              "datasource": "Prometheus",
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 8 },
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "custom": { "thresholdsStyle": { "mode": "line" }, "fillOpacity": 10 },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 85 }
                  ] }
                },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": "Prometheus",
                  "expr": "100 * (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes))",
                  "legendFormat": "{{instance}}"
                }
              ]
            },
            {
              "id": 3,
              "type": "timeseries",
              "title": "Disk free % — alert: NodeDiskSpaceLow (< 15% for 10m)",
              "datasource": "Prometheus",
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 16 },
              "fieldConfig": {
                "defaults": {
                  "unit": "percent", "min": 0, "max": 100,
                  "custom": { "thresholdsStyle": { "mode": "line" }, "fillOpacity": 10 },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "red", "value": null },
                    { "color": "green", "value": 15 }
                  ] }
                },
                "overrides": []
              },
              "targets": [
                {
                  "refId": "A",
                  "datasource": "Prometheus",
                  "expr": "node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs|ramfs\"} * 100 and node_filesystem_readonly == 0",
                  "legendFormat": "{{instance}} {{mountpoint}}"
                }
              ]
            }
          ]
        }
    # HHCCIA pipeline backlog: JetStream consumer metrics from nats-exporter
    # (src/hhccia-v2/nats-exporter.yaml). num_pending = mensajes que el core
    # todavía no procesó (se atrasa); num_ack_pending = en vuelo; num_redelivered
    # = reintentos/poison. Stable uid `pipeline-backlog` so the backlog alert can
    # deep-link to it. Panels reference the Prometheus datasource by name.
    pipeline-backlog:
      json: |
        {
          "uid": "pipeline-backlog",
          "title": "HHCCIA — Backlog del ingestor (NATS JetStream)",
          "tags": ["hhccia", "pipeline", "nats"],
          "schemaVersion": 39,
          "refresh": "30s",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1,
              "type": "stat",
              "title": "Backlog ahora (num_pending) — alerta > 10",
              "datasource": "Prometheus",
              "gridPos": { "h": 5, "w": 8, "x": 0, "y": 0 },
              "fieldConfig": {
                "defaults": {
                  "unit": "short", "decimals": 0,
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 10 }
                  ] }
                },
                "overrides": []
              },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [
                { "refId": "A", "datasource": "Prometheus",
                  "expr": "max(jetstream_consumer_num_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
              ]
            },
            {
              "id": 2,
              "type": "stat",
              "title": "En vuelo (num_ack_pending)",
              "datasource": "Prometheus",
              "gridPos": { "h": 5, "w": 8, "x": 8, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [
                { "refId": "A", "datasource": "Prometheus",
                  "expr": "max(jetstream_consumer_num_ack_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
              ]
            },
            {
              "id": 3,
              "type": "stat",
              "title": "Reintentos (num_redelivered)",
              "datasource": "Prometheus",
              "gridPos": { "h": 5, "w": 8, "x": 16, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [
                { "refId": "A", "datasource": "Prometheus",
                  "expr": "max(jetstream_consumer_num_redelivered{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
              ]
            },
            {
              "id": 4,
              "type": "timeseries",
              "title": "Backlog del ingestor en el tiempo — línea de alerta en 10",
              "datasource": "Prometheus",
              "gridPos": { "h": 10, "w": 24, "x": 0, "y": 5 },
              "fieldConfig": {
                "defaults": {
                  "unit": "short", "min": 0,
                  "custom": { "drawStyle": "line", "fillOpacity": 15, "thresholdsStyle": { "mode": "line" } },
                  "thresholds": { "mode": "absolute", "steps": [
                    { "color": "green", "value": null },
                    { "color": "red", "value": 10 }
                  ] }
                },
                "overrides": []
              },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [
                { "refId": "A", "datasource": "Prometheus", "legendFormat": "num_pending (backlog)",
                  "expr": "max(jetstream_consumer_num_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" },
                { "refId": "B", "datasource": "Prometheus", "legendFormat": "num_ack_pending (en vuelo)",
                  "expr": "max(jetstream_consumer_num_ack_pending{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" },
                { "refId": "C", "datasource": "Prometheus", "legendFormat": "num_redelivered (reintentos)",
                  "expr": "max(jetstream_consumer_num_redelivered{stream_name=\"HHCCIA\", consumer_name=\"core-ingestor\"})" }
              ]
            }
          ]
        }
    # Curated log view for the CNPG backup alerts. Stable uid `cnpg-backup-logs`
    # so the Alertmanager Telegram messages deep-link to it via the alerts'
    # `logs` annotation (https://logs.cjbarroso.com/d/cnpg-backup-logs). Panels
    # reference the Loki datasource by name (resolved by Grafana at load).
    cnpg-backup-logs:
      json: |
        {
          "uid": "cnpg-backup-logs",
          "title": "CNPG Backups — hhccia-core-db logs",
          "tags": ["cnpg", "backup", "logs"],
          "schemaVersion": 39,
          "refresh": "1m",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1,
              "type": "logs",
              "title": "Barman plugin errors — backup / WAL / retention (alert: CNPGBackupFailed)",
              "datasource": "Loki",
              "gridPos": { "h": 11, "w": 24, "x": 0, "y": 0 },
              "options": { "showTime": true, "wrapLogMessage": true, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending" },
              "targets": [
                {
                  "refId": "A",
                  "datasource": "Loki",
                  "expr": "{namespace=\"hhccia-v2\", container=\"plugin-barman-cloud\"} | json | level=\"error\""
                }
              ]
            },
            {
              "id": 2,
              "type": "logs",
              "title": "Postgres WAL archiver failures (alert: CNPGWalArchiveErrorsLog)",
              "datasource": "Loki",
              "gridPos": { "h": 8, "w": 24, "x": 0, "y": 11 },
              "options": { "showTime": true, "wrapLogMessage": true, "dedupStrategy": "none", "sortOrder": "Descending" },
              "targets": [
                {
                  "refId": "A",
                  "datasource": "Loki",
                  "expr": "{namespace=\"hhccia-v2\", container=\"postgres\"} |= \"archive command failed\""
                }
              ]
            },
            {
              "id": 3,
              "type": "logs",
              "title": "All hhccia-core-db logs (context)",
              "datasource": "Loki",
              "gridPos": { "h": 10, "w": 24, "x": 0, "y": 19 },
              "options": { "showTime": true, "wrapLogMessage": true, "dedupStrategy": "none", "sortOrder": "Descending" },
              "targets": [
                {
                  "refId": "A",
                  "datasource": "Loki",
                  "expr": "{namespace=\"hhccia-v2\", pod=~\"hhccia-core-db-.*\"}"
                }
              ]
            }
          ]
        }
    # Gemini API cost (tokens + derived USD), per interaction. Reads the sanitized
    # view `gemini_usage_report` via the read-only GeminiCost datasource (no PII).
    # Stat panels use fixed windows (today UTC / 7d / 30d); the time-series + table
    # + pie honor the dashboard time picker. Service breakdown comes from SER in the
    # canonical source_ref; voice edits have no record -> "sin servicio". uid stable
    # `gemini-cost` (https://logs.cjbarroso.com/d/gemini-cost).
    gemini-cost:
      json: |
        {
          "uid": "gemini-cost",
          "title": "Gemini — Costo (tokens + USD)",
          "tags": ["gemini", "cost", "hhccia"],
          "schemaVersion": 39,
          "refresh": "30m",
          "time": { "from": "now-30d", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1, "type": "stat", "title": "Costo hoy (UTC)", "datasource": "GeminiCost",
              "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "table", "rawQuery": true, "rawSql": "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= date_trunc('day', now())" } ]
            },
            {
              "id": 2, "type": "stat", "title": "Costo últimos 7 días", "datasource": "GeminiCost",
              "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "table", "rawQuery": true, "rawSql": "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= now() - interval '7 days'" } ]
            },
            {
              "id": 3, "type": "stat", "title": "Costo últimos 30 días", "datasource": "GeminiCost",
              "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "table", "rawQuery": true, "rawSql": "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= now() - interval '30 days'" } ]
            },
            {
              "id": 4, "type": "stat", "title": "Interacciones (30 días)", "datasource": "GeminiCost",
              "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "none", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "table", "rawQuery": true, "rawSql": "SELECT count(*) AS value FROM gemini_usage_report WHERE created_at >= now() - interval '30 days'" } ]
            },
            {
              "id": 5, "type": "timeseries", "title": "Costo diario por tipo (evaluation vs voice_edit)", "datasource": "GeminiCost",
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 4 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" }, "fillOpacity": 70, "lineWidth": 0 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "time_series", "rawQuery": true, "rawSql": "SELECT $__timeGroup(created_at,'1d') AS time, kind AS metric, sum(cost_usd) AS value FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY 1, kind ORDER BY 1" } ]
            },
            {
              "id": 6, "type": "timeseries", "title": "Costo diario por servicio", "datasource": "GeminiCost",
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 13 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" }, "fillOpacity": 70, "lineWidth": 0 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "time_series", "rawQuery": true, "rawSql": "SELECT $__timeGroup(created_at,'1d') AS time, coalesce(service_code,'sin servicio') AS metric, sum(cost_usd) AS value FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY 1, 2 ORDER BY 1" } ]
            },
            {
              "id": 7, "type": "piechart", "title": "Costo por servicio (rango seleccionado)", "datasource": "GeminiCost",
              "gridPos": { "h": 9, "w": 10, "x": 0, "y": 22 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD" }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "pieType": "donut", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": true } },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "table", "rawQuery": true, "rawSql": "SELECT coalesce(service_code,'sin servicio') AS metric, sum(cost_usd) AS value FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY 1 ORDER BY 2 DESC" } ]
            },
            {
              "id": 8, "type": "table", "title": "Costo por modelo y tipo (rango seleccionado)", "datasource": "GeminiCost",
              "gridPos": { "h": 9, "w": 14, "x": 10, "y": 22 },
              "fieldConfig": { "defaults": {}, "overrides": [ { "matcher": { "id": "byName", "options": "costo_usd" }, "properties": [ { "id": "unit", "value": "currencyUSD" }, { "id": "decimals", "value": 4 } ] } ] },
              "options": { "showHeader": true },
              "targets": [ { "refId": "A", "datasource": "GeminiCost", "format": "table", "rawQuery": true, "rawSql": "SELECT model, kind, count(*) AS interacciones, coalesce(sum(total_tokens),0) AS tokens, round(coalesce(sum(cost_usd),0)::numeric,4) AS costo_usd FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY model, kind ORDER BY costo_usd DESC" } ]
            }
          ]
        }

# Grafana-managed alerting: notify on Gemini daily spend > 6 USD. Queries the
# GeminiCost (Postgres) datasource — Prometheus can't see the cost, it lives only
# in the DB. Notifies via Telegram, REUSING the existing alertmanager-notify bot
# token (env above) and the same chat as the Alertmanager `notify` receiver.
alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: gemini-cost-telegram
        receivers:
          - uid: gemini_cost_tg
            type: telegram
            # File-based provisioning expects secret fields under `settings`
            # (Grafana encrypts them); `secureSettings` is an API-only concept and
            # is ignored here, which made validation fail ("could not find Bot
            # Token"). $__env{} is interpolated at file read.
            settings:
              bottoken: $__env{GF_TELEGRAM_BOT_TOKEN}
              chatid: "1142335836"
  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: gemini-cost-telegram
        group_by: ["grafana_folder", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: gemini-cost
        folder: Gemini
        interval: 30m
        rules:
          - uid: gemini-cost-daily-6usd
            title: "Gemini: gasto diario > 6 USD"
            condition: C
            for: 0m
            noDataState: OK
            execErrState: OK
            labels:
              severity: warning
              purpose: gemini-cost
            annotations:
              summary: "El gasto de Gemini hoy superó 6 USD."
              description: "La suma de cost_usd del día (UTC) en gemini_usage_report superó el umbral de 6 USD. Ver https://logs.cjbarroso.com/d/gemini-cost"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: geminicost
                model:
                  refId: A
                  datasource:
                    type: postgres
                    uid: geminicost
                  format: table
                  rawSql: "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= date_trunc('day', now())"
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  reducer: last
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - evaluator:
                        type: gt
                        params: [6]
      # Pipeline backlog: the ingestor is falling behind if JetStream has > 10
      # messages pending for the core-ingestor consumer. Queries Prometheus (the
      # nats-exporter metric). Routes via the same default policy -> Telegram.
      - orgId: 1
        name: pipeline-backlog
        folder: HHCCIA
        interval: 1m
        rules:
          - uid: pipeline-ingestor-backlog-gt10
            title: "Pipeline: backlog del ingestor > 10"
            condition: C
            for: 5m
            noDataState: NoData
            execErrState: Error
            labels:
              severity: warning
              purpose: pipeline-backlog
            annotations:
              summary: "El ingestor del core acumula >10 mensajes sin procesar."
              description: "jetstream_consumer_num_pending del consumer core-ingestor (stream HHCCIA) superó 10 por 5m — el core se está atrasando frente al adaptador. Ver https://logs.cjbarroso.com/d/pipeline-backlog"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'max(jetstream_consumer_num_pending{stream_name="HHCCIA", consumer_name="core-ingestor"})'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  reducer: last
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - evaluator:
                        type: gt
                        params: [10]

ingress:
  enabled: true
  ingressClassName: cloudflare-tunnel
  hosts:
    - logs.cjbarroso.com
  path: /
  pathType: Prefix

grafana.ini:
  server:
    root_url: https://logs.cjbarroso.com
  # Authentik OIDC. Browser-facing auth_url is the PUBLIC host; token/userinfo
  # use the in-cluster service to dodge the Cloudflare "Python/Go default
  # User-Agent → 403" quirk documented for hhccia-core. These three endpoints
  # are Authentik-global (not app-slug-scoped); only issuer/jwks carry the slug.
  # Verify against https://auth.cjbarroso.com/application/o/grafana/.well-known/openid-configuration
  auth.generic_oauth:
    enabled: true
    name: Authentik
    allow_sign_up: true
    # Authentik's default `profile` scope mapping already includes a `groups`
    # claim (list of the user's group names), so no extra scope is needed for
    # the role mapping below.
    scopes: "openid profile email"
    auth_url: https://auth.cjbarroso.com/application/o/authorize/
    token_url: http://authentik-server.authentik.svc.cluster.local/application/o/token/
    api_url: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
    # Map Authentik group → Grafana org role. Members of "Grafana Admins" get
    # Admin (full org control + Explore); "Grafana Editors" get Editor (enough
    # for Explore + dashboards); everyone else stays Viewer. Non-strict so an
    # unmatched user still logs in as Viewer rather than being rejected.
    role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
    role_attribute_strict: false
    # client_id / client_secret come from env (see envValueFrom above).
  auth:
    # Send users straight to Authentik; keep /login?disableLoginForm for the
    # local admin fallback.
    oauth_auto_login: false
    disable_login_form: false
