              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT coalesce(reviewer,'(sin revisor)') AS \"Revisor\", count(*) FILTER (WHERE status IN ('approved','applied')) AS \"Aceptados\", count(*) FILTER (WHERE status = 'rejected') AS \"Rechazados\", count(*) AS \"Total\" FROM clinical_record_report WHERE $__timeFilter(reviewed_at) AND status IN ('approved','applied','rejected') AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring}) GROUP BY 1 ORDER BY 4 DESC" } ]
