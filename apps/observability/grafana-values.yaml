    # reference the Loki datasource by name (resolved by Grafana at load).
    cnpg-backup-logs:
      json: |
        {
          "uid": "cnpg-backup-logs",
          "title": "CNPG Backups — hhccia-core-db logs",
          "tags": ["cnpg", "backup", "logs"],
          "schemaVersion": 39,
          "refresh": "1m",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1,
