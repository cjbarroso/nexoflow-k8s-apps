# Grafana-managed alerting: notify on Gemini daily spend > 6 USD. Queries the
# GeminiCost (Postgres) datasource — Prometheus can't see the cost, it lives only
# in the DB. Notifies via Telegram, REUSING the existing alertmanager-notify bot
# token (env above) and the same chat as the Alertmanager `notify` receiver.
alerting:
  contactpoints.yaml:
    apiVersion: 1
    contactPoints:
      - orgId: 1
        name: gemini-cost-telegram
        receivers:
          - uid: gemini_cost_tg
            type: telegram
            # File-based provisioning expects secret fields under `settings`
            # (Grafana encrypts them); `secureSettings` is an API-only concept and
            # is ignored here, which made validation fail ("could not find Bot
            # Token"). $__env{} is interpolated at file read.
            settings:
              bottoken: $__env{GF_TELEGRAM_BOT_TOKEN}
              chatid: "8761422375"
  policies.yaml:
    apiVersion: 1
    policies:
      - orgId: 1
        receiver: gemini-cost-telegram
        group_by: ["grafana_folder", "alertname"]
        group_wait: 30s
        group_interval: 5m
        repeat_interval: 12h
  rules.yaml:
    apiVersion: 1
    groups:
      - orgId: 1
        name: gemini-cost
        folder: Gemini
        interval: 30m
        rules:
          - uid: gemini-cost-daily-6usd
            title: "Gemini: gasto diario > 6 USD"
            condition: C
            for: 0m
            noDataState: OK
            execErrState: OK
            labels:
              severity: warning
              purpose: gemini-cost
            annotations:
              summary: "El gasto de Gemini hoy superó 6 USD."
              description: "La suma de cost_usd del día (UTC) en gemini_usage_report superó el umbral de 6 USD. Ver https://logs.cjbarroso.com/d/gemini-cost"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: geminicost
                model:
                  refId: A
                  datasource:
                    type: postgres
                    uid: geminicost
                  format: table
                  rawSql: "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= date_trunc('day', now())"
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  reducer: last
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - evaluator:
                        type: gt
                        params: [6]
      # Pipeline backlog: the ingestor is falling behind if JetStream has > 10
      # messages pending for the core-ingestor consumer. Queries Prometheus (the
      # nats-exporter metric). Routes via the same default policy -> Telegram.
      - orgId: 1
        name: pipeline-backlog
        folder: HHCCIA
        interval: 1m
        rules:
          - uid: pipeline-ingestor-backlog-gt10
            title: "Pipeline: backlog del ingestor > 10"
            condition: C
            for: 5m
            noDataState: NoData
            execErrState: Error
            labels:
              severity: warning
              purpose: pipeline-backlog
            annotations:
              summary: "El ingestor del core acumula >10 mensajes sin procesar."
              description: "jetstream_consumer_num_pending del consumer core-ingestor (stream HHCCIA) superó 10 por 5m — el core se está atrasando frente al adaptador. Ver https://logs.cjbarroso.com/d/pipeline-backlog"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'max(jetstream_consumer_num_pending{stream_name="HHCCIA", consumer_name="core-ingestor"})'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  reducer: last
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - evaluator:
                        type: gt
                        params: [10]
          # Sustained redeliveries = the AI keeps failing (Gemini/dependency
          # outage) or poison messages cycling before the dead-letter kicks in.
          # Healthy steady state is ~0; > 5 for 10m means real churn.
          - uid: pipeline-ingestor-redelivered
            title: "Pipeline: reintentos sostenidos del ingestor"
            condition: C
            for: 10m
            noDataState: NoData
            execErrState: Error
            labels:
              severity: warning
              purpose: pipeline-redelivered
            annotations:
              summary: "El ingestor del core acumula reintentos sostenidos (num_redelivered)."
              description: "jetstream_consumer_num_redelivered del consumer core-ingestor (stream HHCCIA) superó 5 por 10m — fallas sostenidas (p. ej. Gemini/dependencia caída) o poison reciclando antes del dead-letter. Ver https://logs.cjbarroso.com/d/pipeline-backlog"
            data:
              - refId: A
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: prometheus
                model:
                  refId: A
                  datasource:
                    type: prometheus
                    uid: prometheus
                  expr: 'max(jetstream_consumer_num_redelivered{stream_name="HHCCIA", consumer_name="core-ingestor"})'
                  instant: true
                  intervalMs: 1000
                  maxDataPoints: 43200
              - refId: B
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: B
                  type: reduce
                  reducer: last
                  expression: A
                  datasource:
                    type: __expr__
                    uid: __expr__
              - refId: C
                relativeTimeRange:
                  from: 600
                  to: 0
                datasourceUid: __expr__
                model:
                  refId: C
                  type: threshold
                  expression: B
                  datasource:
                    type: __expr__
                    uid: __expr__
                  conditions:
                    - evaluator:
                        type: gt
                        params: [5]

ingress:
  enabled: true
  ingressClassName: cloudflare-tunnel
  hosts:
    - logs.cjbarroso.com
  path: /
  pathType: Prefix

grafana.ini:
  server:
    root_url: https://logs.cjbarroso.com
  # Grafana 13 (security-01 hardening, 2026-02-24) stopped forwarding host env
  # vars to backend plugin subprocesses — they now get only a GF_*/proxy/AWS/Azure
  # allowlist. The BigQuery plugin (grafana-bigquery-datasource) needs
  # GOOGLE_APPLICATION_CREDENTIALS to find the WIF external_account cred-config
  # (/etc/gcp/cred-config.json) for keyless auth; without it ADC reports "could
  # not find default credentials" and every BigQuery call goes out unauthenticated
  # (cloudresourcemanager 401 CREDENTIALS_MISSING). forward_host_env_vars re-enables
  # host-env forwarding for ONLY this plugin id. NOTE: it's all-or-nothing per
  # plugin, so this plugin also receives the OIDC secret / DB passwords / Telegram
  # token set as container env — acceptable for the Grafana-signed BQ plugin.
  # See SIF "Grafana BigQuery via Workload Identity Federation".
  plugins:
    forward_host_env_vars: grafana-bigquery-datasource
  # Authentik OIDC. Browser-facing auth_url is the PUBLIC host; token/userinfo
  # use the in-cluster service to dodge the Cloudflare "Python/Go default
  # User-Agent → 403" quirk documented for hhccia-core. These three endpoints
  # are Authentik-global (not app-slug-scoped); only issuer/jwks carry the slug.
  # Verify against https://auth.cjbarroso.com/application/o/grafana/.well-known/openid-configuration
  auth.generic_oauth:
    enabled: true
    name: Authentik
    allow_sign_up: true
    # Authentik's default `profile` scope mapping already includes a `groups`
    # claim (list of the user's group names), so no extra scope is needed for
    # the role mapping below.
    scopes: "openid profile email"
    auth_url: https://auth.cjbarroso.com/application/o/authorize/
    token_url: http://authentik-server.authentik.svc.cluster.local/application/o/token/
    api_url: http://authentik-server.authentik.svc.cluster.local/application/o/userinfo/
    # Map Authentik group → Grafana org role. Members of "Grafana Admins" get
    # Admin (full org control + Explore); "Grafana Editors" get Editor (enough
    # for Explore + dashboards); everyone else stays Viewer. Non-strict so an
    # unmatched user still logs in as Viewer rather than being rejected.
    role_attribute_path: "contains(groups[*], 'Grafana Admins') && 'Admin' || contains(groups[*], 'Grafana Editors') && 'Editor' || 'Viewer'"
    role_attribute_strict: false
    # client_id / client_secret come from env (see envValueFrom above).
  auth:
    # Send users straight to Authentik; keep /login?disableLoginForm for the
    # local admin fallback.
    oauth_auto_login: false
    disable_login_form: false
