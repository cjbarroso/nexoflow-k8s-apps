              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "none", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" }, "rawQuery": true, "editorMode": "code", "location": "US", "project": "gen-lang-client-0005670378", "format": 1, "rawSql": "SELECT ROUND(SUM(cost) + SUM(IFNULL((SELECT SUM(c.amount) FROM UNNEST(credits) c),0)),4) AS value FROM `gen-lang-client-0005670378.all_billing_data_1.gcp_billing_export_v1_01878F_0656E4_1C5C89` WHERE service.description='Gemini API' AND invoice.month = FORMAT_DATE('%Y%m', DATE_SUB(CURRENT_DATE(), INTERVAL 1 MONTH))" } ]
            },
            {
              "id": 5, "type": "stat", "title": "Tokens facturados (rango)", "description": "Suma de usage.amount (conteo de tokens) para Gemini API en el rango.", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" },
              "gridPos": { "h": 4, "w": 4, "x": 20, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "none", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" }, "rawQuery": true, "editorMode": "code", "location": "US", "project": "gen-lang-client-0005670378", "format": 1, "rawSql": "SELECT ROUND(SUM(usage.amount),0) AS value FROM `gen-lang-client-0005670378.all_billing_data_1.gcp_billing_export_v1_01878F_0656E4_1C5C89` WHERE service.description='Gemini API' AND $__timeFilter(usage_start_time)" } ]
            },
            {
              "id": 6, "type": "timeseries", "title": "Costo diario por modelo", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" },
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 4 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "min": 0, "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" }, "fillOpacity": 80, "lineWidth": 0 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }, "tooltip": { "mode": "multi", "sort": "desc" } },
              "targets": [ { "refId": "A", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" }, "rawQuery": true, "editorMode": "code", "location": "US", "project": "gen-lang-client-0005670378", "format": 0, "rawSql": "SELECT $__timeGroup(usage_start_time,'1d') AS time, CONCAT('gemini ', REGEXP_EXTRACT(LOWER(sku.description), r'gemini[ _]?([0-9.]+ ?(?:pro|flash)(?: lite)?(?: preview)?)')) AS metric, ROUND(SUM(cost) + SUM(IFNULL((SELECT SUM(c.amount) FROM UNNEST(credits) c),0)),6) AS value FROM `gen-lang-client-0005670378.all_billing_data_1.gcp_billing_export_v1_01878F_0656E4_1C5C89` WHERE service.description='Gemini API' AND $__timeFilter(usage_start_time) GROUP BY time, metric ORDER BY time" } ]
            },
            {
              "id": 7, "type": "timeseries", "title": "Costo diario por tipo de token (input / output / cached)", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" },
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 13 },
