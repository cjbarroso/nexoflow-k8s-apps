              "targets": [ { "refId": "A", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" }, "rawQuery": true, "editorMode": "code", "location": "US", "project": "gen-lang-client-0005670378", "format": 0, "rawSql": "SELECT $__timeGroup(usage_start_time,'1d') AS time, CASE WHEN LOWER(sku.description) LIKE '%cached%' THEN 'cached input' WHEN LOWER(sku.description) LIKE '%output%' THEN 'output' WHEN LOWER(sku.description) LIKE '%input%' THEN 'input' ELSE 'other' END AS metric, ROUND(SUM(cost) + SUM(IFNULL((SELECT SUM(c.amount) FROM UNNEST(credits) c),0)),6) AS value FROM `gen-lang-client-0005670378.all_billing_data_1.gcp_billing_export_v1_01878F_0656E4_1C5C89` WHERE service.description='Gemini API' AND $__timeFilter(usage_start_time) GROUP BY time, metric ORDER BY time" } ]
            },
            {
              "id": 8, "type": "barchart", "title": "Costo por modelo (rango)", "description": "Costo neto por modelo en el rango. Barras (no torta) porque gemini 3.5 flash domina ~96-99% del gasto: una torta se ve igual en cualquier rango aunque los valores cambien; las barras muestran el costo absoluto y responden al filtro de fecha.", "datasource": { "type": "grafana-bigquery-datasource", "uid": "bigquery" },
              "gridPos": { "h": 9, "w": 8, "x": 0, "y": 22 },
