    # Gemini API cost (tokens + derived USD), per interaction. Reads the sanitized
    # view `gemini_usage_report` via the read-only GeminiCost datasource (no PII).
    # Stat panels use fixed windows (today UTC / 7d / 30d); the time-series + table
    # + pie honor the dashboard time picker. Service breakdown comes from SER in the
    # canonical source_ref; voice edits have no record -> "sin servicio". uid stable
    # `gemini-cost` (https://logs.cjbarroso.com/d/gemini-cost).
    gemini-cost:
      json: |
        {
          "uid": "gemini-cost",
          "title": "Gemini — Costo (tokens + USD)",
          "tags": ["gemini", "cost", "hhccia"],
          "schemaVersion": 39,
          "refresh": "30m",
          "time": { "from": "now-30d", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1, "type": "stat", "title": "Costo hoy (UTC)", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 4, "w": 6, "x": 0, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= date_trunc('day', now())" } ]
            },
            {
              "id": 2, "type": "stat", "title": "Costo últimos 7 días", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 4, "w": 6, "x": 6, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= now() - interval '7 days'" } ]
            },
            {
              "id": 3, "type": "stat", "title": "Costo últimos 30 días", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 4, "w": 6, "x": 12, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "decimals": 4 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT coalesce(sum(cost_usd),0) AS value FROM gemini_usage_report WHERE created_at >= now() - interval '30 days'" } ]
            },
            {
              "id": 4, "type": "stat", "title": "Interacciones (30 días)", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 4, "w": 6, "x": 18, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "none", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT count(*) AS value FROM gemini_usage_report WHERE created_at >= now() - interval '30 days'" } ]
            },
            {
              "id": 5, "type": "timeseries", "title": "Costo diario por tipo (evaluation vs voice_edit)", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 4 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" }, "fillOpacity": 70, "lineWidth": 0 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "time_series", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT $__timeGroup(created_at,'1d') AS time, kind AS metric, sum(cost_usd) AS value FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY 1, kind ORDER BY 1" } ]
            },
            {
              "id": 6, "type": "timeseries", "title": "Costo diario por servicio", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 13 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD", "custom": { "drawStyle": "bars", "stacking": { "mode": "normal" }, "fillOpacity": 70, "lineWidth": 0 } }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }, "tooltip": { "mode": "multi" } },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "time_series", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT $__timeGroup(created_at,'1d') AS time, coalesce(service_code,'sin servicio') AS metric, sum(cost_usd) AS value FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY 1, 2 ORDER BY 1" } ]
            },
            {
              "id": 7, "type": "piechart", "title": "Costo por servicio (rango seleccionado)", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 9, "w": 10, "x": 0, "y": 22 },
              "fieldConfig": { "defaults": { "unit": "currencyUSD" }, "overrides": [] },
              "options": { "legend": { "displayMode": "table", "placement": "right", "values": ["value", "percent"] }, "pieType": "donut", "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": true } },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT coalesce(service_code,'sin servicio') AS metric, sum(cost_usd) AS value FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY 1 ORDER BY 2 DESC" } ]
            },
            {
              "id": 8, "type": "table", "title": "Costo por modelo y tipo (rango seleccionado)", "datasource": { "type": "postgres", "uid": "geminicost" },
              "gridPos": { "h": 9, "w": 14, "x": 10, "y": 22 },
              "fieldConfig": { "defaults": {}, "overrides": [ { "matcher": { "id": "byName", "options": "costo_usd" }, "properties": [ { "id": "unit", "value": "currencyUSD" }, { "id": "decimals", "value": 4 } ] } ] },
              "options": { "showHeader": true },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "geminicost" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT model, kind, count(*) AS interacciones, coalesce(sum(total_tokens),0) AS tokens, round(coalesce(sum(cost_usd),0)::numeric,4) AS costo_usd FROM gemini_usage_report WHERE $__timeFilter(created_at) GROUP BY model, kind ORDER BY costo_usd DESC" } ]
            }
          ]
        }
    # Gemini API ACCESS health (availability, not cost) — log-derived from the
    # hhccia-core Gemini HTTP results in Loki. Companion to the Loki alerts
    # GeminiAccessErrors (warning) + GeminiRecordsDeadLettered (critical); their
    # Telegram messages deep-link here via the `dashboard` annotation. Stable uid
    # `gemini-health`. Panels reference the Loki datasource by name. Error series
    # match the Gemini host + a 4xx/5xx status; success = "200 OK".
    gemini-health:
      json: |
        {
          "uid": "gemini-health",
          "title": "Gemini — Salud de acceso (errores / éxitos / dead-letter)",
          "tags": ["gemini", "hhccia", "logs", "alerts"],
          "schemaVersion": 39,
          "refresh": "1m",
          "time": { "from": "now-6h", "to": "now" },
          "templating": { "list": [] },
          "panels": [
            {
              "id": 1, "type": "stat", "title": "Errores Gemini 4xx/5xx (15m) — alerta: GeminiAccessErrors", "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 4, "w": 8, "x": 0, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant", "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"generativelanguage.googleapis.com\" |~ \"HTTP/1.1 [45]\" [15m]))" } ]
            },
            {
              "id": 2, "type": "stat", "title": "Registros a dead-letter (1h) — alerta: GeminiRecordsDeadLettered", "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 4, "w": 8, "x": 8, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null }, { "color": "red", "value": 1 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant", "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"dead-lettering\" [1h]))" } ]
            },
            {
              "id": 3, "type": "stat", "title": "Llamadas Gemini OK (15m)", "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 4, "w": 8, "x": 16, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0, "thresholds": { "mode": "absolute", "steps": [ { "color": "green", "value": null } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "instant", "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"generativelanguage.googleapis.com\" |= \"200 OK\" [15m]))" } ]
            },
            {
              "id": 4, "type": "timeseries", "title": "Gemini: errores 4xx/5xx vs éxitos en el tiempo", "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 9, "w": 24, "x": 0, "y": 4 },
              "fieldConfig": {
                "defaults": { "unit": "short", "min": 0, "custom": { "drawStyle": "bars", "fillOpacity": 60, "lineWidth": 1, "stacking": { "mode": "none" } } },
                "overrides": [
                  { "matcher": { "id": "byFrameRefID", "options": "A" }, "properties": [ { "id": "displayName", "value": "errores 4xx/5xx" }, { "id": "color", "value": { "mode": "fixed", "fixedColor": "red" } } ] },
                  { "matcher": { "id": "byFrameRefID", "options": "B" }, "properties": [ { "id": "displayName", "value": "éxitos (200)" }, { "id": "color", "value": { "mode": "fixed", "fixedColor": "green" } } ] }
                ]
              },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["sum"] }, "tooltip": { "mode": "multi" } },
              "targets": [
                { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "range", "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"generativelanguage.googleapis.com\" |~ \"HTTP/1.1 [45]\" [$__auto]))" },
                { "refId": "B", "datasource": { "type": "loki", "uid": "loki" }, "queryType": "range", "expr": "sum(count_over_time({namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"generativelanguage.googleapis.com\" |= \"200 OK\" [$__auto]))" }
              ]
            },
            {
              "id": 5, "type": "logs", "title": "Errores de acceso a Gemini + dead-letters (recientes)", "datasource": { "type": "loki", "uid": "loki" },
              "gridPos": { "h": 11, "w": 24, "x": 0, "y": 13 },
              "options": { "showTime": true, "wrapLogMessage": true, "enableLogDetails": true, "dedupStrategy": "none", "sortOrder": "Descending" },
              "targets": [
                { "refId": "A", "datasource": { "type": "loki", "uid": "loki" }, "expr": "{namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"generativelanguage.googleapis.com\" |~ \"HTTP/1.1 [45]\"" },
                { "refId": "B", "datasource": { "type": "loki", "uid": "loki" }, "expr": "{namespace=\"hhccia-v2\", container=\"hhccia-core\"} |= \"dead-lettering\"" }
              ]
            }
          ]
        }
    # HHCCIA clinical-record review outcomes — accepted vs rejected, sourced from
    # the sanitized `clinical_record_report` view via the read-only HhcciaCore
    # datasource (no patient identity, no clinical text). "Aceptado" = status in
    # (approved, applied); the two are also shown separately. The per-day trend
    # groups by reviewed_at (the decision day); ingest volume groups by created_at.
    # Breakdowns by Service (SER) and by professional (author display name), plus a
    # reviewer-throughput table. Stable uid `clinical-records`
    # (https://logs.cjbarroso.com/d/clinical-records). Panels reference the
    # datasource by uid.
    clinical-records:
      json: |
        {
          "uid": "clinical-records",
          "title": "HHCCIA — Registros aceptados / rechazados",
          "tags": ["hhccia", "records", "auditoria"],
          "schemaVersion": 39,
          "refresh": "30m",
          "time": { "from": "now-30d", "to": "now" },
          "templating": { "list": [
            {
              "name": "service",
              "label": "Servicio",
              "type": "query",
              "datasource": { "type": "postgres", "uid": "hhcciacore" },
              "query": "SELECT DISTINCT coalesce(service_code,'(sin servicio)') FROM clinical_record_report ORDER BY 1",
              "refresh": 2,
              "multi": true,
              "includeAll": true,
              "allValue": null,
              "current": { "selected": true, "text": ["All"], "value": ["$__all"] },
              "sort": 1
            }
          ] },
          "panels": [
            {
              "id": 1, "type": "stat", "title": "Aceptados (rango)", "datasource": { "type": "postgres", "uid": "hhcciacore" },
              "gridPos": { "h": 4, "w": 4, "x": 0, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0, "color": { "mode": "fixed", "fixedColor": "green" } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT count(*) AS value FROM clinical_record_report WHERE status IN ('approved','applied') AND $__timeFilter(reviewed_at) AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring})" } ]
            },
            {
              "id": 2, "type": "stat", "title": "Rechazados (rango)", "datasource": { "type": "postgres", "uid": "hhcciacore" },
              "gridPos": { "h": 4, "w": 4, "x": 4, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0, "color": { "mode": "fixed", "fixedColor": "red" } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "value", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT count(*) AS value FROM clinical_record_report WHERE status = 'rejected' AND $__timeFilter(reviewed_at) AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring})" } ]
            },
            {
              "id": 3, "type": "stat", "title": "Tasa de aprobación (rango)", "datasource": { "type": "postgres", "uid": "hhcciacore" },
              "gridPos": { "h": 4, "w": 4, "x": 8, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "percent", "decimals": 1, "min": 0, "max": 100, "thresholds": { "mode": "absolute", "steps": [ { "color": "red", "value": null }, { "color": "orange", "value": 50 }, { "color": "green", "value": 80 } ] } }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "background", "graphMode": "none", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT round(100.0 * count(*) FILTER (WHERE status IN ('approved','applied')) / NULLIF(count(*) FILTER (WHERE status IN ('approved','applied','rejected')),0), 1) AS value FROM clinical_record_report WHERE $__timeFilter(reviewed_at) AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring})" } ]
            },
            {
              "id": 4, "type": "stat", "title": "Aprobados (approved)", "datasource": { "type": "postgres", "uid": "hhcciacore" },
              "gridPos": { "h": 4, "w": 4, "x": 12, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "none", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT count(*) AS value FROM clinical_record_report WHERE status = 'approved' AND $__timeFilter(reviewed_at) AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring})" } ]
            },
            {
              "id": 5, "type": "stat", "title": "Aplicados (applied)", "datasource": { "type": "postgres", "uid": "hhcciacore" },
              "gridPos": { "h": 4, "w": 4, "x": 16, "y": 0 },
              "fieldConfig": { "defaults": { "unit": "short", "decimals": 0 }, "overrides": [] },
              "options": { "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false }, "colorMode": "none", "graphMode": "area", "textMode": "auto" },
              "targets": [ { "refId": "A", "datasource": { "type": "postgres", "uid": "hhcciacore" }, "format": "table", "editorMode": "code", "rawQuery": true, "rawSql": "SELECT count(*) AS value FROM clinical_record_report WHERE status = 'applied' AND $__timeFilter(reviewed_at) AND coalesce(service_code,'(sin servicio)') IN (${service:sqlstring})" } ]
            },
            {
