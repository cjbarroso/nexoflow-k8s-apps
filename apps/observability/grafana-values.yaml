                  "custom": { "drawStyle": "line", "fillOpacity": 10 } },
                "overrides": []
              },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "{{route}}",
                  "expr": "histogram_quantile(0.95, sum by (le, route) (rate(hhccia_http_request_seconds_bucket[15m])))" }
              ]
            },
            {
              "id": 10,
              "type": "timeseries",
              "title": "DB: pool de conexiones (en uso vs tamaño)",
              "datasource": { "type": "prometheus", "uid": "prometheus" },
              "gridPos": { "h": 9, "w": 12, "x": 12, "y": 23 },
              "fieldConfig": {
                "defaults": { "unit": "short", "min": 0, "decimals": 0,
                  "custom": { "drawStyle": "line", "fillOpacity": 10 } },
                "overrides": []
              },
              "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["last", "max"] }, "tooltip": { "mode": "multi" } },
              "targets": [
                { "refId": "A", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "en uso",
                  "expr": "max(hhccia_db_pool_in_use)" },
                { "refId": "B", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "tamaño del pool",
                  "expr": "max(hhccia_db_pool_size)" },
                { "refId": "C", "datasource": { "type": "prometheus", "uid": "prometheus" }, "legendFormat": "overflow (>0 = saturado)",
                  "expr": "clamp_min(max(hhccia_db_pool_overflow), 0)" }
              ]
            }
          ]
        }
    # Curated log view for the CNPG backup alerts. Stable uid `cnpg-backup-logs`
