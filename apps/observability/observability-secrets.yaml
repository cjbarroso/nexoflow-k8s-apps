# Applies the raw SealedSecret(s) for the observability stack from
# src/observability/. The placeholder template is excluded so Argo never
# applies it. Until grafana-secrets-sealedsecret.yaml exists, this app syncs
# empty and the Grafana pod stays Pending on the missing `grafana-secrets`
# Secret — that's expected (see src/observability/README sealing steps).
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-secrets
  namespace: argocd
spec:
  project: support
  source:
    repoURL: https://github.com/cjbarroso/nexoflow-k8s-apps.git
    path: src/observability
    targetRevision: master
    directory:
      recurse: false
      exclude: 'grafana-secrets.example.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
