# Grafana Loki — the log store. Monolithic (SingleBinary) mode, filesystem
# storage, single replica: the lightest viable deployment for a small
# meta-monitoring stack (Grafana's own recommendation for monolithic).
#
# Multi-source pattern (see docs/06-APP-STRUCTURE.md): the upstream Helm chart +
# this repo as `ref: values` so Argo loads loki-values.yaml from Git.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: loki
  namespace: argocd
spec:
  project: support
  sources:
    # Migrated to the community fork (2026-06-03): the OSS Loki chart moved to
    # grafana-community/helm-charts on 2026-03-16; grafana/loki is now GEL-only.
    - repoURL: https://grafana-community.github.io/helm-charts
      chart: loki
      # Pinned + validated with `helm template` against loki-values.yaml (2026-06-03):
      # renders exactly one Monolithic StatefulSet, ruler + rule mounts intact, no
      # read/write/backend Deployments. deploymentMode renamed SingleBinary->Monolithic
      # (community 12.0.0) — done in loki-values.yaml. Loki server appVersion 3.7.2.
      targetRevision: "17.3.1"
      helm:
        valueFiles:
          - $values/apps/observability/loki-values.yaml
    - repoURL: https://github.com/cjbarroso/nexoflow-k8s-apps.git
      targetRevision: master
      ref: values
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true
