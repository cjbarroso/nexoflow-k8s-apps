# Loki Helm values — Monolithic, filesystem, 30-day retention.
# Kept deliberately minimal/light. Extra disable-flags are over-specified on
# purpose: Helm ignores unknown value keys, so this survives minor chart drift.
#
# Community chart (grafana-community/loki, fork of the frozen grafana/loki OSS
# chart): the deploymentMode value `SingleBinary` was renamed to `Monolithic`
# at community chart 12.0.0. The config block below is still `singleBinary:`
# (the chart did NOT rename the block) — Monolithic mode reads from it.
deploymentMode: Monolithic

loki:
  auth_enabled: false           # single-tenant; no X-Scope-OrgID needed
  commonConfig:
    replication_factor: 1
  storage:
    type: filesystem
  # tsdb schema is mandatory in chart 6.x (no built-in default).
  schemaConfig:
    configs:
      - from: "2024-04-01"
        store: tsdb
        object_store: filesystem
        schema: v13
        index:
          prefix: index_
          period: 24h
  # 30-day retention (720h), enforced by the compactor.
  limits_config:
    retention_period: 720h
    reject_old_samples: true
    reject_old_samples_max_age: 168h
    max_query_lookback: 720h
  compactor:
    retention_enabled: true
    delete_request_store: filesystem
  # Disable the experimental pattern ingester — not needed, extra moving part.
  pattern_ingester:
    enabled: false
  # Ruler: evaluate LogQL alerting rules and push to the Prometheus Alertmanager
  # (so log-based alerts share the same Telegram pipeline as the metric alerts).
  # Rules are read from a local dir; single-tenant Loki (auth_enabled:false) uses
  # the tenant id `fake`, so rule files live under <directory>/fake/ — mounted
  # from the `loki-alerting-rules` ConfigMap via singleBinary.extraVolume* below.
  rulerConfig:
    wal:
      dir: /var/loki/ruler-wal
    storage:
      type: local
      local:
        directory: /rules
    rule_path: /var/loki/ruler-temp
    alertmanager_url: http://prometheus-alertmanager.observability.svc.cluster.local:9093
    enable_alertmanager_v2: true
    enable_api: true
    evaluation_interval: 1m
    poll_interval: 1m

# The single Loki process. Service `loki` :3100 is the read/write entrypoint
# (gateway disabled below). Push URL used by Alloy + Grafana datasource:
#   http://loki.observability.svc.cluster.local:3100
singleBinary:
  replicas: 1
  persistence:
    enabled: true
    size: 40Gi          # ~30d headroom for this stack; bump if it fills
  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      memory: 1Gi
  # Mount the ruler rule files (tenant `fake`) from the ConfigMap. Matches
  # rulerConfig.storage.local.directory=/rules above.
  extraVolumes:
    - name: loki-alerting-rules
      configMap:
        name: loki-alerting-rules
  extraVolumeMounts:
    - name: loki-alerting-rules
      mountPath: /rules/fake
      readOnly: true

# Force every scalable/microservices component off — Monolithic only.
read:
  replicas: 0
write:
  replicas: 0
backend:
  replicas: 0

# Trim the heavy/optional extras to stay light.
gateway:
  enabled: false
chunksCache:
  enabled: false
resultsCache:
  enabled: false
lokiCanary:
  enabled: false
test:
  enabled: false
minio:
  enabled: false          # we use filesystem, never the bundled MinIO
monitoring:
  selfMonitoring:
    enabled: false
    grafanaAgent:
      installOperator: false
  serviceMonitor:
    enabled: false
  rules:
    enabled: false
  dashboards:
    enabled: false
