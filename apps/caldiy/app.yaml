# Cal.diy — open-source scheduling platform (https://github.com/calcom/cal.diy).
#
# Multi-source app (see docs/06-APP-STRUCTURE.md):
#   1. upstream Helm chart `calcom/calcom`, pinned 0.8.6;
#   2. this repo as `ref: values` so Argo loads caldiy-values.yaml from Git;
#   3. this repo at `path: src/caldiy` for the raw manifests the chart doesn't
#      own — the CloudNativePG cluster + backups, and the SealedSecrets the
#      chart consumes by name.
#
# PostgreSQL uses CNPG (src/caldiy/postgres-cnpg.yaml) for the same
# WAL-archiving + R2-backup posture as planka / authentik / hhccia. The Helm
# chart's secretRef points at a Secret that carries DATABASE_URL built from
# known credentials matching the CNPG bootstrap secret.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: caldiy
  namespace: argocd
spec:
  project: caldiy
  sources:
    - chart: calcom
      repoURL: https://pyrrha.github.io/calcom-helm
      targetRevision: 0.8.6
      helm:
        valueFiles:
          - $values/apps/caldiy/caldiy-values.yaml
    - repoURL: https://github.com/cjbarroso/nexoflow-k8s-apps.git
      targetRevision: master
      ref: values
    - repoURL: https://github.com/cjbarroso/nexoflow-k8s-apps.git
      targetRevision: master
      path: src/caldiy
      directory:
        exclude: '*.example.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: caldiy
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
