# Helm values for the upstream calcom/calcom chart (0.8.6). Loaded by Argo via
# `ref: values` from apps/caldiy/app.yaml. Secrets stay out of Git — every
# credential lives in the `caldiy` Secret (decrypted from a SealedSecret in
# src/caldiy/caldiy-sealedsecret.yaml.example).

image:
  # Built and published by the cal.diy fork CI pipeline to the irupe-consultores
  # GHCR. Pin to the latest green commit SHA after the first CI run:
  #   ghcr.io/irupe-consultores/caldiy:sha-<full-commit-sha>
  repository: ghcr.io/irupe-consultores/caldiy
  tag: sha-2843f51df4d9d76cae91d0b7a4e98b504b18ee8cd
  pullPolicy: IfNotPresent

imagePullSecrets:
  - name: github-auth

secretRef: caldiy

service:
  type: ClusterIP
  port: 80

ingress:
  enabled: true
  className: cloudflare-tunnel
  hosts:
    - host: caldiy.irupeconsultores.com
      paths:
        - path: /
          pathType: Prefix

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    memory: 2Gi
