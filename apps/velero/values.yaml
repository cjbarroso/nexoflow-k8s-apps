deployNodeAgent: true

# Expose the server's Prometheus metrics to the cluster-wide kubernetes-pods
# scrape job — feeds the VeleroBackupFailed alert (prometheus-values.yaml).
podAnnotations:
  prometheus.io/scrape: "true"
  prometheus.io/port: "8085"
  prometheus.io/path: "/metrics"

initContainers:
  - name: velero-plugin-for-aws
    # Pinned to v1.13.0, NOT the v1.14.x that matches velero 1.18: v1.14 bumped
    # aws-sdk-go-v2 (s3 v1.48.0 -> v1.97.3), and the newer SDK emits an empty
    # `x-amz-tagging` header on PutObject that Cloudflare R2 rejects (501
    # NotImplemented) — breaking backup-metadata upload. v1.13.0 is the newest
    # plugin still on the R2-compatible s3 v1.48.0 SDK (same as the long-working
    # v1.10.0). 1-minor skew under server 1.18.1, fine for object-store ops
    # (we previously ran v1.10.0 under 1.17.1 — a 3-minor skew — without issue).
    image: velero/velero-plugin-for-aws:v1.13.0
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      # Store Velero data under a `velero/` prefix. The CNPG barman backups share
      # this bucket under `cnpg/` (the R2 token is bucket-scoped), and Velero's BSL
      # validation rejects unexpected top-level dirs ("invalid top-level
      # directories: [cnpg]") — so confining Velero to its own prefix keeps the BSL
      # Available while the two backup systems coexist.
      prefix: velero
      config:
        s3Url: https://77df3d66af9eb572fe180d800d44127b.r2.cloudflarestorage.com
        region: auto
        s3ForcePathStyle: true

  # Empty because we use Node Agent for file-level backups
  volumeSnapshotLocation: []

credentials:
  useSecret: true
  existingSecret: cloud-credentials

# Daily file-system backup of the cluster's stateful namespaces → R2 (bucket
# `velero-backups`), 30-day retention. Covers the irreproducible state that is
# NOT in Git: Authentik Postgres (SSO/OIDC config) and Vaultwarden (password
# vault). Everything else is redeployable from Git, so it's intentionally out of
# scope (see `Reference/Disaster Preparedness - full backup coverage plan.md`).
#
# NOTE: `default` (Gitea) was dropped 2026-05-31 — Gitea is decommissioned (no
# running pods; only orphaned PVCs remain), so there's no live volume data to
# FS-back-up there. Re-add it here if Gitea is ever redeployed.
#
# Volumes are FS-backed-up via the node-agent. The Authentik DB moved to CNPG
# (2026-06-11) with its own barman WAL archiving + base backups to R2 (PITR) —
# the old `pg_dumpall` pre-hook is gone with the legacy Deployment, and the
# CNPG data volumes are excluded from FS backup via pod annotation (set in
# src/authentik/postgres-cnpg.yaml). Vaultwarden gets a consistent
# `sqlite3 .backup` from its own CronJob (src/vaultwarden/) before this runs.
# hermes2 contains the operational agent state and shared Cognee knowledge PVC;
# both are included in the same daily filesystem backup and 30-day retention.
schedules:
  stateful-daily:
    schedule: "0 2 * * *"          # 02:00 daily
    template:
      includedNamespaces:
        - authentik
        - hermes2
        - vaultwarden
      defaultVolumesToFsBackup: true
      ttl: 720h                     # 30 days

# CRDs are applied directly by Argo (helm rendered with --include-crds), so the
# chart's CRD-upgrade hook-job stays off. The old docker.io/bitnami/kubectl:latest
# override was removed — Bitnami's public catalog was sunset; chart 12.x defaults
# the kubectl image to registry.k8s.io/kubectl.
upgradeCRDs: false
