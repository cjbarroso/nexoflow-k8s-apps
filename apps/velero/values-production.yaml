# apps/velero/values-production.yaml

# 1. Enable Node Agent (Essential for PV backups via file system)
deployNodeAgent: true

# 2. Install AWS Plugin (Required for S3/R2 compatibility)
initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  # REMOVED: provider: aws (This was the cause of your error)
  
  # 3. Configure Backup Location (R2)
  backupStorageLocation:
    - name: default
      provider: aws  # <--- It is correctly defined here
      bucket: velero-backups
      config:
        s3Url: https://[YOUR_ACCOUNT_ID].r2.cloudflarestorage.com
        region: us-east-1
        s3ForcePathStyle: true

  # 4. Configure Snapshot Location 
  # Since you are using R2 (Object Storage), you cannot do native cloud volume snapshots.
  # We leave this empty/disabled so Velero relies on the Node Agent (Restic) instead.
  volumeSnapshotLocation: []

# 5. Credentials
credentials:
  useSecret: true
  name: cloud-credentials
  secretContents: {}

# 6. Schedule
schedules:
  nexoflow-daily:
    schedule: "0 2 * * *"
    template:
      includedNamespaces:
        - nexoflow
      defaultVolumesToFsBackup: true
      ttl: 720h