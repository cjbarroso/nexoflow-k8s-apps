deployNodeAgent: true

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.14.1
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      # Store Velero data under a `velero/` prefix. The CNPG barman backups share
      # this bucket under `cnpg/` (the R2 token is bucket-scoped), and Velero's BSL
      # validation rejects unexpected top-level dirs ("invalid top-level
      # directories: [cnpg]") — so confining Velero to its own prefix keeps the BSL
      # Available while the two backup systems coexist.
      prefix: velero
      config:
        s3Url: https://77df3d66af9eb572fe180d800d44127b.r2.cloudflarestorage.com
        region: auto
        s3ForcePathStyle: true
  
  # Empty because we use Node Agent for file-level backups
  volumeSnapshotLocation: []

credentials:
  useSecret: true
  existingSecret: cloud-credentials

# Daily file-system backup of the cluster's stateful namespaces → R2 (bucket
# `velero-backups`), 30-day retention. Covers the irreproducible state that is
# NOT in Git: Authentik Postgres (SSO/OIDC config) and Vaultwarden (password
# vault). Everything else is redeployable from Git, so it's intentionally out of
# scope (see `Reference/Disaster Preparedness - full backup coverage plan.md`).
#
# NOTE: `default` (Gitea) was dropped 2026-05-31 — Gitea is decommissioned (no
# running pods; only orphaned PVCs remain), so there's no live volume data to
# FS-back-up there. Re-add it here if Gitea is ever redeployed.
#
# Volumes are FS-backed-up via the node-agent. The Authentik DB also gets a
# logical `pg_dumpall` via the pre-hook below; Vaultwarden gets a consistent
# `sqlite3 .backup` from its own CronJob (src/vaultwarden/) before this runs.
schedules:
  stateful-daily:
    schedule: "0 2 * * *"          # 02:00 daily
    template:
      includedNamespaces:
        - authentik
        - vaultwarden
      defaultVolumesToFsBackup: true
      ttl: 720h                     # 30 days
      hooks:
        resources:
          # Logically-clean dump of the Authentik DB (SSO/OIDC config) just before
          # the file-system backup, written onto the backed-up data PVC. Gives a
          # restorable `pg_dumpall` alongside the crash-consistent data dir.
          - name: authentik-pg-dump
            includedNamespaces: [authentik]
            labelSelector:
              matchLabels:
                app: authentik-pg
            pre:
              - exec:
                  container: postgres
                  command:
                    - /bin/sh
                    - -c
                    - 'pg_dumpall -U "$POSTGRES_USER" -f /var/lib/postgresql/data/velero-dump.sql'
                  onError: Continue   # never let a hook failure abort the FS backup
                  timeout: 10m

# CRDs are applied directly by Argo (helm rendered with --include-crds), so the
# chart's CRD-upgrade hook-job stays off. The old docker.io/bitnami/kubectl:latest
# override was removed — Bitnami's public catalog was sunset; chart 12.x defaults
# the kubectl image to registry.k8s.io/kubectl.
upgradeCRDs: false