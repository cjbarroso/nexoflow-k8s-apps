deployNodeAgent: true

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      config:
        s3Url: https://77df3d66af9eb572fe180d800d44127b.r2.cloudflarestorage.com
        region: auto
        s3ForcePathStyle: true
  
  # Empty because we use Node Agent for file-level backups
  volumeSnapshotLocation: []

credentials:
  useSecret: true
  existingSecret: cloud-credentials

# nexoflow-daily schedule removed 2026-05-30: n8n/nexoflow stack decommissioned.
schedules: {}

upgradeCRDs: false # Do not upgrade CRDs. Fixes installation issues.
kubectl:
  image:
    repository: docker.io/bitnami/kubectl
    tag: latest
    pullPolicy: IfNotPresent