deployNodeAgent: true

initContainers:
  - name: velero-plugin-for-aws
    image: velero/velero-plugin-for-aws:v1.10.0
    volumeMounts:
      - mountPath: /target
        name: plugins

configuration:
  backupStorageLocation:
    - name: default
      provider: aws
      bucket: velero-backups
      config:
        s3Url: https://[YOUR_ACCOUNT_ID].r2.cloudflarestorage.com
        region: us-east-1
        s3ForcePathStyle: true
  
  volumeSnapshotLocation: []

credentials:
  useSecret: true
  name: cloud-credentials
  secretContents: {}

schedules:
  nexoflow-daily:
    schedule: "0 2 * * *"
    template:
      includedNamespaces:
        - nexoflow
      defaultVolumesToFsBackup: true
      ttl: 720h

# ADD THIS SECTION
kubectl:
  image:
    repository: registry.k8s.io/kubectl
    tag: v1.32.0