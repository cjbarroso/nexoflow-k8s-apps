apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: velero
  namespace: argocd
spec:
  project: support
  sources:
  # Source 1: Official Velero Helm Chart
  - chart: velero
    repoURL: https://vmware-tanzu.github.io/helm-charts
    targetRevision: 12.0.2 # Velero server appVersion 1.18.1 (was 11.2.0 / 1.17.1)
    helm:
      valueFiles:
      # References the file in Source 2
      - $values/apps/velero/values.yaml
  
  # Source 2: Your Private Config Repo
  - repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    targetRevision: master
    ref: values

  destination:
    server: 'https://kubernetes.default.svc'
    namespace: 'velero' # Recommended to keep Velero in its own namespace
  
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      # Velero 1.18 CRDs are large; client-side apply hits the 262KB annotation
      # limit. SSA applies them cleanly (Argo renders helm with --include-crds).
      - ServerSideApply=true