apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexoflow
spec:
  project: nexoflow
  sources:
  - chart: n8n
    repoURL: 8gears.container-registry.com/library
    targetRevision: 2.0.1
    helm:
      valueFiles:
        - $manifests/manifests/nexoflow/n8n-values-production.yaml
  - repoURL: 'ssh://git@192.168.5.80:23231/nexoflow-k8s-apps'
    targetRevision: HEAD
    ref: manifests
  - repoURL: 'ssh://git@192.168.5.80:23231/nexoflow-k8s-apps'
    targetRevision: HEAD
    ref: others
    path: manifests/nexoflow
  destination:
    server: 'https://kubernetes.default.svc' # Deploy to the local cluster
    namespace: 'nexoflow' 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
