apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: nexoflow
spec:
  project: nexoflow
  sources:
  - chart: n8n
    repoURL: 8gears.container-registry.com/library
    targetRevision: 1.1.0
    helm:
      valueFiles:
        - $manifests/n8n-values-production.yaml
      # - $values/apps/nexoflow/n8n-values-production.yaml
  - repoURL: 'ssh://192.168.5.80:23231/nexoflow-k8s-apps'
    targetRevision: HEAD
    path: manifests/nexoflow
    ref: manifests
  destination:
    server: 'https://kubernetes.default.svc' # Deploy to the local cluster
    namespace: 'nexoflow' 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
