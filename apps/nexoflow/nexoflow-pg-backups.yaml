apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nexoflow-cluster-daily
  namespace: nexoflow
  annotations:
    force-update: "deleteme"
spec:
  schedule: "0 20 16 * * *"
  cluster:
    name: nexoflow-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  backupOwnerReference: none