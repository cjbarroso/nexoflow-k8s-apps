apiVersion: postgresql.cnpg.io/v1
kind: ScheduledBackup
metadata:
  name: nexoflow-cluster-daily
  namespace: nexoflow
  annotations:
    force-update: "attempt-2"
spec:
  schedule: "55 1 * * *"
  cluster:
    name: nexoflow-cluster
  method: plugin
  pluginConfiguration:
    name: barman-cloud.cloudnative-pg.io
  backupOwnerReference: none