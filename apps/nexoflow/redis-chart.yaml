apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: redis
spec:
  project: default
  sources:
  - chart: redis
    repoURL: registry-1.docker.io/bitnamicharts
    targetRevision: 21.2.3
    helm:
      valueFiles:
      - $values/apps/nexoflow/redis-values-production.yaml
  - repoURL: 'ssh://192.168.1.10:23231/nexoflow-k8s-apps'
    targetRevision: HEAD
    ref: values
  destination:
    server: 'https://kubernetes.default.svc' # Deploy to the local cluster
    namespace: 'nexoflow' 
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
