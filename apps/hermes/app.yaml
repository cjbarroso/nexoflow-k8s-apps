apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes
  namespace: argocd
spec:
  project: hermes
  source:
    repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    path: src/hermes
    targetRevision: master
    directory:
      recurse: false
      # The placeholder secret template is never applied by Argo — the real
      # OPENAI_API_KEY lives in hermes-secrets-sealedsecret.yaml.
      exclude: 'secrets.example.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: hermes
  syncPolicy:
    # The deployment pins an upstream release tag + digest — upgrades are a
    # tag/digest bump in src/hermes/deployment.yaml; Argo rolls it on sync.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
