apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: monitoring
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  project: default
  source:
    repoURL: https://prometheus-community.github.io/helm-charts
    chart: kube-prometheus-stack
    targetRevision: 65.x.x
    helm:
      values: |
        # --- DIET RESOURCE CONFIGURATION (Unchanged) ---
        alertmanager:
          alertmanagerSpec:
            replicas: 1
            resources:
              limits: { memory: 200Mi }
              requests: { cpu: 50m, memory: 100Mi }

        prometheus:
          prometheusSpec:
            replicas: 1
            retention: 2d
            resources:
              limits: { memory: 500Mi }
              requests: { cpu: 100m, memory: 250Mi }
          
          # --- PROMETHEUS INGRESS ---
          ingress:
            enabled: true
            # usage of annotation instead of ingressClassName
            annotations:
              kubernetes.io/ingress.class: cloudflare-tunnel
            hosts:
              - prometheus.cjbarroso.com
            paths:
              - /
            # TLS block is often required for the controller to register the host
            tls:
              - hosts:
                  - prometheus.cjbarroso.com

        grafana:
          resources:
            limits: { memory: 256Mi }
            requests: { cpu: 50m, memory: 100Mi }
          sidecar:
            dashboards:
              enabled: true
              label: grafana_dashboard
          
          # --- GRAFANA INGRESS ---
          ingress:
            enabled: true
            annotations:
              kubernetes.io/ingress.class: cloudflare-tunnel
            hosts:
              - grafana.cjbarroso.com
            path: /
            tls:
              - hosts:
                  - grafana.cjbarroso.com

        nodeExporter:
          enabled: true
          resources:
            limits: { memory: 50Mi, cpu: 50m }

  destination:
    server: https://kubernetes.default.svc
    namespace: monitoring
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - ServerSideApply=true