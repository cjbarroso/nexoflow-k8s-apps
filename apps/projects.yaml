apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: support
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: System infrastructure and support services
  sourceRepos:
    - '*'
  destinations:
