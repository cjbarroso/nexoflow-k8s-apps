# Argo CD projects. Tightened 2026-06-11: each project may only deploy into
# its own namespaces, and only the app projects' actually-needed cluster-scoped
# kinds are whitelisted (previously every project allowed */* everywhere — any
# app could have written ClusterRoleBindings or CRDs anywhere).
#
# If a sync fails with "resource ... is not permitted in project ...", a chart
# grew a new cluster-scoped kind: add it here deliberately.
#
# Note: the built-in `default` project (used by bootstrap/root-app.yaml) is not
# defined here and keeps Argo's defaults.
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: support
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: System infrastructure and support services
  sourceRepos:
    - 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    # Helm repos used by support apps (velero, observability stack, cert-manager):
    - 'https://vmware-tanzu.github.io/helm-charts'
    - 'https://prometheus-community.github.io/helm-charts'
    - 'https://grafana.github.io/helm-charts'            # alloy
    - 'https://grafana-community.github.io/helm-charts'  # loki + grafana (community fork)
    - 'https://charts.jetstack.io'
  destinations:
    - { server: 'https://kubernetes.default.svc', namespace: argocd }
    - { server: 'https://kubernetes.default.svc', namespace: authentik }
    - { server: 'https://kubernetes.default.svc', namespace: cert-manager }
    - { server: 'https://kubernetes.default.svc', namespace: cnpg-system }
    - { server: 'https://kubernetes.default.svc', namespace: observability }
    - { server: 'https://kubernetes.default.svc', namespace: velero }
    # cert-manager's leader-election Roles/RoleBindings live in kube-system.
    - { server: 'https://kubernetes.default.svc', namespace: kube-system }
  # Support apps legitimately install CRDs/RBAC/webhooks (cert-manager, velero,
  # barman-cloud, prometheus/alloy ClusterRoles).
  clusterResourceWhitelist:
    - { group: '', kind: Namespace }
    - { group: 'apiextensions.k8s.io', kind: CustomResourceDefinition }
    - { group: 'rbac.authorization.k8s.io', kind: ClusterRole }
    - { group: 'rbac.authorization.k8s.io', kind: ClusterRoleBinding }
    - { group: 'admissionregistration.k8s.io', kind: MutatingWebhookConfiguration }
    - { group: 'admissionregistration.k8s.io', kind: ValidatingWebhookConfiguration }
    - { group: 'apiregistration.k8s.io', kind: APIService }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: operators
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Kubernetes Operators
  sourceRepos:
    - 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    - 'https://cloudnative-pg.github.io/charts'
    - 'https://bitnami.github.io/sealed-secrets'
    - 'https://helm.strrl.dev'
    - 'https://charts.longhorn.io'
  destinations:
    - { server: 'https://kubernetes.default.svc', namespace: cloudflared }
    - { server: 'https://kubernetes.default.svc', namespace: cnpg-system }
    - { server: 'https://kubernetes.default.svc', namespace: kube-system }
    - { server: 'https://kubernetes.default.svc', namespace: longhorn-system }
  # Operators install the full cluster-scoped surface (CRDs, webhooks,
  # IngressClass, aggregated APIs) — keep this one broad.
  clusterResourceWhitelist:
    - { group: '*', kind: '*' }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hhccia
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: HHCCIA applications
  sourceRepos:
    - 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
  destinations:
    - { server: 'https://kubernetes.default.svc', namespace: hhccia-v2 }
    # Staging environment — same project, isolated namespace (apps/hhccia-staging).
    - { server: 'https://kubernetes.default.svc', namespace: hhccia-staging }
  # Namespace only (CreateNamespace + the PSS-labelled Namespace manifest).
  clusterResourceWhitelist:
    - { group: '', kind: Namespace }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: personales
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Personal applications
  sourceRepos:
    - 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    - 'https://charts.gabe565.com'
  destinations:
    - { server: 'https://kubernetes.default.svc', namespace: vaultwarden }
    - { server: 'https://kubernetes.default.svc', namespace: calibre-web-automated }
  clusterResourceWhitelist:
    - { group: '', kind: Namespace }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: hermes2
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Hermes Agent — second instance (Hannibal/Discord). Independent of the hermes project.
  sourceRepos:
    - 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
  destinations:
    - { server: 'https://kubernetes.default.svc', namespace: hermes2 }
  clusterResourceWhitelist:
    - { group: '', kind: Namespace }
    # The isolated Incident Response runtime binds its dedicated ServiceAccount
    # to read-only cluster roles (view + infrastructure-view) and a pod-manager
    # role that grants pod mutation verbs (create, delete, patch, update).
    - { group: 'rbac.authorization.k8s.io', kind: ClusterRole }
    - { group: 'rbac.authorization.k8s.io', kind: ClusterRoleBinding }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: planka
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: Planka kanban board
  sourceRepos:
    - 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    # Upstream Planka Helm chart:
    - 'http://plankanban.github.io/planka'
  destinations:
    - { server: 'https://kubernetes.default.svc', namespace: planka }
  # Namespace only (CreateNamespace + the PSS-labelled Namespace manifest). The
  # CNPG Cluster/ObjectStore/ScheduledBackup and SealedSecrets are all namespaced.
  clusterResourceWhitelist:
    - { group: '', kind: Namespace }
---
apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: pami
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  description: PAMI downloader — on-demand scraper (own namespace, internet egress)
  sourceRepos:
    - 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
  destinations:
    - { server: 'https://kubernetes.default.svc', namespace: pami }
  # Namespace only (CreateNamespace). Everything else (CronJob, NetworkPolicy,
  # SealedSecrets) is namespaced.
  clusterResourceWhitelist:
    - { group: '', kind: Namespace }
