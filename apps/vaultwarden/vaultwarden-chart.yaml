apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  # Name of the Argo CD Application
  name: vaultwarden
  # Namespace where Argo CD is running
  namespace: argocd
spec:
  # The project this application belongs to
  project: default
  source:
    # The URL of the Helm repository for Vaultwarden
    repoURL: https://guerzon.github.io/charts
    # The name of the chart to deploy
    chart: vaultwarden
    # The version of the chart to use
    targetRevision: 2.12.0
    helm:
      values: |
        # IMPORTANT: Set the external domain for Vaultwarden.
        # This must match the hostname used in your Cloudflare Tunnel.
        domain: "https://vaultwarden.cjbarroso.com"

        ingress:
          enabled: true

          # Set the ingress class to 'cloudflare-tunnel'.
          # The Cloudflare Tunnel connector, when acting as an ingress controller,
          # will look for this class.
          class: "cloudflare-tunnel"

          # Hostname that will be exposed via the Cloudflare Tunnel.
          # This must be a domain you manage in your Cloudflare account.
          hostname: "vaultwarden.cjbarroso.com"

          # Enable the TLS section in the Ingress object.
          # We don't provide a secret, as Cloudflare automatically manages the certificates.
          tls: true

          # Additional annotations for the Ingress resource.
          additionalAnnotations:
            # This annotation explicitly tells which ingress controller should handle this.
            # It's crucial for the Cloudflare Tunnel Ingress controller to pick it up.
            kubernetes.io/ingress.class: "cloudflare-tunnel"

        # Configure persistent storage for Vaultwarden data.
        # This is essential to ensure your data is not lost when the pod restarts.
        storage:
          data:
            # The name for the PersistentVolumeClaim (PVC) that will be created.
            name: "vaultwarden-data"
            # The size of the persistent volume.
            size: "10Gi"
            # The StorageClass for the persistent volume. For home labs, 'local-path'
            # is a common choice. If you have a different provisioner (like Longhorn,
            # NFS, etc.), change this value to match your setup.
            class: "local-path"

        # It is critical to set a secure admin token to protect the /admin page.
        adminToken:
          # This is a placeholder. You MUST generate your own secure hashed token.
          # Run the following command in your terminal to generate a token,
          # replacing "YourSuperSecretPassword" with a strong password.
          #
          # echo -n "YourSuperSecretPassword" | argon2 "$(openssl rand -base64 32)" -e -id -k 19456 -t 2 -p 1
          #
          # Then, paste the entire output string below.
          value: "$argon2id$v=19$m=19456,t=2,p=1$eS93V1cwVEJJZnJQU1pmRnNlSk56UG9SVFBSUnU5WWJ0YmpoM09tWU83RT0$hBWgl1UeIYuNWewU7F3AsomDNQrWOGq1+BKdda7iN6M"

  destination:
    # The Kubernetes server URL where the application will be deployed.
    # 'https://kubernetes.default.svc' is the default for in-cluster deployment.
    server: https://kubernetes.default.svc
    # The namespace to deploy Vaultwarden into.
    # It's good practice to use a dedicated namespace.
    namespace: vaultwarden

  syncPolicy:
    automated:
      # Allows Argo CD to delete resources that are no longer in the Helm chart.
      prune: true
      # Allows Argo CD to automatically sync the application when it detects changes.
      selfHeal: true
    syncOptions:
      # This will create the 'vaultwarden' namespace if it doesn't exist.
      - CreateNamespace=true
