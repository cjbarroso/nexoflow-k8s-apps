app-template:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: devlikeapro/waha
            tag: latest
            pullPolicy: IfNotPresent
          env:
            WAHA_HTTP_HOST: 0.0.0.0
            WAHA_HTTP_PORT: "3000"
            WAHA_LOG_LEVEL: info
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          probes:
            liveness:
              enabled: false
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 30
            readiness:
              enabled: false
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom: []
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
  service:
    main:
      controller: main
      ports:
        http:
          port: 3000
          targetPort: http
          protocol: TCP

  ingress:
    main:
      enabled: true
      className: "cloudflare-tunnel"
      annotations:
        kubernetes.io/ingress.class: "cloudflare-tunnel"
      hosts:
        - host: waha.cjbarroso.com
          paths:
            - path: /
              pathType: Prefix

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: local-path
      retain: true
      globalMounts:
        - path: /app/.waha
