app-template:
  controllers:
    main:
      type: deployment
      replicas: 1
      strategy: RollingUpdate
      containers:
        main:
          image:
            repository: devlikeapro/waha
            tag: latest
            pullPolicy: IfNotPresent
          env:
            WAHA_HTTP_HOST: 0.0.0.0
            WAHA_HTTP_PORT: "3000"
            WAHA_LOG_LEVEL: info
            WHATSAPP_API_HOSTNAME: waha.cjbarroso.com
            WAHA_PUBLIC_URL: https://waha.cjbarroso.com
            # WAHA_APPS_ENABLED: true
            #WAHA_APPS_URL: https://waha.cjbarroso.com/apps
            WAHA_WEBHOOKS_ENABLED: true
            #WAHA_WEBHOOKS_URL: https://waha.cjbarroso.com/webhooks
            WAHA_API_KEY: a7a30edde27f41f18813cd4f6f679010
            WAHA_API_KEY_PLAIN: a7a30edde27f41f18813cd4f6f679010
            WAHA_DASHBOARD_ENABLED: true
            WAHA_DASHBOARD_USERNAME: waha
            WAHA_DASHBOARD_PASSWORD: 229fedaff9254101a1e0335b7ec77c6d
            WHATSAPP_SWAGGER_USERNAME: waha
            WHATSAPP_SWAGGER_PASSWORD: 229fedaff9254101a1e0335b7ec77c6d
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          probes:
            liveness:
              enabled: false
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: http
                initialDelaySeconds: 10
                periodSeconds: 30
            readiness:
              enabled: false
              custom: true
              spec:
                httpGet:
                  path: /health
                  port: http
                initialDelaySeconds: 5
                periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          envFrom: []
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false
  service:
    main:
      controller: main
      ports:
        http:
          port: 3000
          targetPort: http
          protocol: TCP

  ingress:
    main:
      enabled: true
      className: "cloudflare-tunnel"
      annotations:
        kubernetes.io/ingress.class: "cloudflare-tunnel"
      hosts:
        - host: waha.cjbarroso.com
          paths:
            - path: /
              pathType: Prefix
              service:
                identifier: main
                port: http

  persistence:
    data:
      enabled: true
      type: persistentVolumeClaim
      accessMode: ReadWriteOnce
      size: 5Gi
      storageClass: local-path
      retain: true
      globalMounts:
        - path: /app/.waha
