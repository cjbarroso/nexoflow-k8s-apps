apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: waha
  namespace: argocd
spec:
  project: default
  source:
    repoURL: 'ssh://192.168.5.80:23231/nexoflow-k8s-apps'
    path: apps/waha
    targetRevision: HEAD
  destination:
    server: https://kubernetes.default.svc
    namespace: waha
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
