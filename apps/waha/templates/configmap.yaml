apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "waha.fullname" . }}
  labels:
    {{- include "waha.labels" . | nindent 4 }}
data:
  # Base URL for the API
  {{- if .Values.config.baseUrl }}
  WAHA_BASE_URL: {{ .Values.config.baseUrl | quote }}
  {{- end }}

  # Security settings
  {{- if .Values.config.security.apiKey }}
  WAHA_API_KEY: {{ .Values.config.security.apiKey | quote }}
  {{- end }}
  {{- if .Values.config.security.apiKeyExcludePath }}
  WAHA_API_KEY_EXCLUDE_PATH: {{ .Values.config.security.apiKeyExcludePath | quote }}
  {{- end }}

  {{- if .Values.config.security.dashboard.enabled }}
  WAHA_DASHBOARD_ENABLED: {{ .Values.config.security.dashboard.enabled | quote }}
  {{- end }}
  {{- if .Values.config.security.dashboard.username }}
  WAHA_DASHBOARD_USERNAME: {{ .Values.config.security.dashboard.username | quote }}
  {{- end }}
  # WAHA_DASHBOARD_PASSWORD is typically handled as a Secret, not a ConfigMap.
  # If you need it here for some reason, ensure it's not sensitive.

  {{- if .Values.config.security.swagger.enabled }}
  WHATSAPP_SWAGGER_ENABLED: {{ .Values.config.security.swagger.enabled | quote }}
  {{- end }}
  {{- if .Values.config.security.swagger.username }}
  WHATSAPP_SWAGGER_USERNAME: {{ .Values.config.security.swagger.username | quote }}
  {{- end }}
  # WHATSAPP_SWAGGER_PASSWORD is typically handled as a Secret.

  # WhatsApp engine
  {{- if .Values.config.engine }}
  WHATSAPP_DEFAULT_ENGINE: {{ .Values.config.engine | quote }}
  {{- end }}

  # Logging configuration
  {{- if .Values.config.logging.format }}
  WAHA_LOG_FORMAT: {{ .Values.config.logging.format | quote }}
  {{- end }}
  {{- if .Values.config.logging.level }}
  WAHA_LOG_LEVEL: {{ .Values.config.logging.level | quote }}
  {{- end }}
  {{- if hasKey .Values.config.logging "printQr" }}
  WAHA_PRINT_QR: {{ .Values.config.logging.printQr | quote }}
  {{- end }}

  # Media storage configuration
  {{- if .Values.config.mediaStorage.type }}
  WAHA_MEDIA_STORAGE: {{ .Values.config.mediaStorage.type | quote }}
  {{- end }}
  {{- if hasKey .Values.config.mediaStorage "download" }}
  WHATSAPP_DOWNLOAD_MEDIA: {{ .Values.config.mediaStorage.download | quote }}
  {{- end }}
  {{- if .Values.config.mediaStorage.mimetypes }}
  WHATSAPP_FILES_MIMETYPES: {{ .Values.config.mediaStorage.mimetypes | quote }}
  {{- end }}

  # Local media storage specific settings
  {{- if eq .Values.config.mediaStorage.type "LOCAL" }}
  {{- if .Values.config.mediaStorage.local.filesLifetime }}
  WHATSAPP_FILES_LIFETIME: {{ .Values.config.mediaStorage.local.filesLifetime | quote }}
  {{- end }}
  {{- if .Values.config.mediaStorage.local.folder }}
  WHATSAPP_FILES_FOLDER: {{ .Values.config.mediaStorage.local.folder | quote }}
  {{- end }}
  {{- end }}

  # S3 media storage specific settings
  {{- if and (eq .Values.config.mediaStorage.type "S3") .Values.config.mediaStorage.s3.enabled }}
  {{- if .Values.config.mediaStorage.s3.region }}
  WAHA_S3_REGION: {{ .Values.config.mediaStorage.s3.region | quote }}
  {{- end }}
  {{- if .Values.config.mediaStorage.s3.bucket }}
  WAHA_S3_BUCKET: {{ .Values.config.mediaStorage.s3.bucket | quote }}
  {{- end }}
  {{- if .Values.config.mediaStorage.s3.accessKeyId }}
  WAHA_S3_ACCESS_KEY_ID: {{ .Values.config.mediaStorage.s3.accessKeyId | quote }}
  {{- end }}
  # WAHA_S3_SECRET_ACCESS_KEY is typically handled as a Secret.
  {{- if .Values.config.mediaStorage.s3.endpoint }}
  WAHA_S3_ENDPOINT: {{ .Values.config.mediaStorage.s3.endpoint | quote }}
  {{- end }}
  {{- if hasKey .Values.config.mediaStorage.s3 "forcePathStyle" }}
  WAHA_S3_FORCE_PATH_STYLE: {{ .Values.config.mediaStorage.s3.forcePathStyle | quote }}
  {{- end }}
  {{- if hasKey .Values.config.mediaStorage.s3 "proxyFiles" }}
  WAHA_S3_PROXY_FILES: {{ .Values.config.mediaStorage.s3.proxyFiles | quote }}
  {{- end }}
  {{- end }}

  # Session storage configuration
  {{- if .Values.config.sessionStorage.folder }}
  WAHA_SESSION_FOLDER: {{ .Values.config.sessionStorage.folder | quote }}
  {{- end }}
  {{- if .Values.config.sessionStorage.postgresqlUrl }}
  WAHA_POSTGRESQL_URL: {{ .Values.config.sessionStorage.postgresqlUrl | quote }}
  {{- end }}
  {{- if .Values.config.sessionStorage.mongodbUrl }}
  WAHA_MONGODB_URL: {{ .Values.config.sessionStorage.mongodbUrl | quote }}
  {{- end }}

  # Advanced configuration
  {{- if .Values.config.advanced.timezone }}
  TZ: {{ .Values.config.advanced.timezone | quote }}
  {{- end }}
  {{- if .Values.config.advanced.startSessions }}
  WHATSAPP_START_SESSION: {{ .Values.config.advanced.startSessions | quote }}
  {{- end }}
  {{- if hasKey .Values.config.advanced "restartAllSessions" }}
  WHATSAPP_RESTART_ALL_SESSIONS: {{ .Values.config.advanced.restartAllSessions | quote }}
  {{- end }}

  # Webhook configuration
  {{- if .Values.config.advanced.webhook.url }}
  WHATSAPP_HOOK_URL: {{ .Values.config.advanced.webhook.url | quote }}
  {{- end }}
  {{- if .Values.config.advanced.webhook.events }}
  WHATSAPP_HOOK_EVENTS: {{ .Values.config.advanced.webhook.events | quote }}
  {{- end }}

  # Proxy configuration
  {{- if .Values.config.advanced.proxy.server }}
  WHATSAPP_PROXY_SERVER: {{ .Values.config.advanced.proxy.server | quote }}
  {{- end }}
  {{- if .Values.config.advanced.proxy.username }}
  WHATSAPP_PROXY_SERVER_USERNAME: {{ .Values.config.advanced.proxy.username | quote }}
  {{- end }}
  # WHATSAPP_PROXY_PASSWORD is typically handled as a Secret.
