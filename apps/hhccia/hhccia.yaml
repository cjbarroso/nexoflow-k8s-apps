apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hhccia
  namespace: argocd
spec:
  project: hhccia
  source:
    repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    path: src/hhccia
    targetRevision: master
  destination:
    server: https://kubernetes.default.svc
    namespace: hhccia
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
