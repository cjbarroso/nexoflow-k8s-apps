apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hhccia-v2
  namespace: argocd
spec:
  project: hhccia
  source:
    repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    path: src/hhccia-v2
    targetRevision: master
    directory:
      recurse: false
      # The placeholder secret template is never applied by Argo.
      exclude: 'secrets.example.yaml'
  destination:
    server: https://kubernetes.default.svc
    namespace: hhccia-v2
  syncPolicy:
    # v2 is the only live stack now — automated like every other app in this repo.
    # selfHeal reverts manual drift; prune removes resources dropped from Git.
    # Note: deployments pin :latest, so Argo won't auto-deploy new images (the
    # manifest digest is unchanged) — a code rollout still needs a
    # `kubectl -n hhccia-v2 rollout restart`.
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
