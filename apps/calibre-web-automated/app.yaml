# Calibre-Web-Automated -- all-in-one digital library solution.
# See https://github.com/crocodilestick/Calibre-Web-Automated
#
# Pattern B (raw manifests): no upstream Helm chart. All Kubernetes resources
# live in src/calibre-web-automated/ -- Deployment, Service, Ingress,
# NetworkPolicies, and 3 Longhorn PVCs (config, library, ingest).
#
# No PostgreSQL -- CWA uses SQLite (metadata.db + app.db) on persistent volumes.
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: calibre-web-automated
  namespace: argocd
spec:
  project: personales
  source:
    repoURL: 'https://github.com/cjbarroso/nexoflow-k8s-apps.git'
    path: src/calibre-web-automated
    targetRevision: master
    directory:
      recurse: false
  destination:
    server: https://kubernetes.default.svc
    namespace: calibre-web-automated
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
